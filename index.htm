<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .coin { width: 200px; height: 200px; background: radial-gradient(circle, #ffcc00, #ff9900); border-radius: 50%; box-shadow: 0 0 30px #ff9900; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 80px; user-select: none; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .coin:active { transform: scale(0.9); }
        h1 { font-size: 60px; margin: 20px 0; color: gold; }
    </style>
</head>
<body>
    <h1 id="score">0</h1>
    <div class="coin" id="tap">💰</div>
    <p>Tangani bosing!</p>
    <script>
        let tg = window.Telegram.WebApp;
        let score = 0;
        tg.expand();
        document.getElementById('tap').onclick = () => {
            score++;
            document.getElementById('score').innerText = score;
            tg.HapticFeedback.impactOccurred('medium');
        };
    </script>
</body>
</html>
