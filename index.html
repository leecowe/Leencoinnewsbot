<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Evolution</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff007f;
            --bg: #050a10;
            --border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Stats Section */
        .header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .bal-val { font-family: 'Orbitron'; font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--cyan); }
        .level-info { font-family: 'Orbitron'; font-size: 12px; color: var(--pink); margin-top: 5px; }

        /* Game Board */
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 280px; }
        .tile {
            aspect-ratio: 1; background: rgba(0, 242, 255, 0.05); border: 2px solid var(--border);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 20px; transition: 0.2s; cursor: pointer;
        }
        .tile.blink { background: var(--cyan); box-shadow: 0 0 25px var(--cyan); border-color: #fff; }

        /* Reward Modal */
        #reward-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: #0a1a25; border: 2px solid var(--cyan); padding: 20px;
            border-radius: 20px; z-index: 100; text-align: center; backdrop-filter: blur(10px);
        }
        .opt-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: var(--glass); border: 1px solid var(--cyan); color: #fff;
            border-radius: 10px; font-family: 'Orbitron'; cursor: pointer;
        }

        /* Nav */
        .nav { height: 80px; background: #000; display: flex; border-top: 1px solid var(--border); }
        .n-item { flex: 1; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 10px; color: #444; }
        .n-item.active { color: var(--cyan); border-top: 3px solid var(--cyan); }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-val" id="score">0</div>
        <div class="level-info" id="lvl-display">PROTOCOL LEVEL: 1</div>
    </div>

    <div class="game-area">
        <div class="grid" id="board"></div>
        <div id="reward-modal">
            <h3 style="font-family:'Orbitron'; color:var(--cyan)">MUKOFOTNI TANLANG</h3>
            <button class="opt-btn" onclick="claim(1)">+50 DATA COINS</button>
            <button class="opt-btn" onclick="claim(2)">+1.5x MULTIPLIER</button>
        </div>
        <p id="msg" style="margin-top:20px; font-family:'Orbitron'; font-size:12px; color:var(--cyan)">TAYYOR TURING...</p>
    </div>

    <div class="nav">
        <div class="n-item active">HACK</div>
        <div class="n-item">MARKET</div>
        <div class="n-item">WALLET</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    let state = {
        score: parseInt(localStorage.getItem('a_sc')) || 0,
        level: parseInt(localStorage.getItem('a_lv')) || 1,
        diff: 1000, // boshlang'ich tezlik (ms)
        seqLen: 3
    };

    let sequence = [];
    let userStep = 0;

    function init() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        for(let i=0; i<9; i++) {
            let t = document.createElement('div');
            t.className = 'tile';
            t.onclick = () => handleTap(i, t);
            board.appendChild(t);
        }
        document.getElementById('score').innerText = state.score;
        document.getElementById('lvl-display').innerText = `PROTOCOL LEVEL: ${state.level}`;
        setTimeout(startRound, 2000);
    }

    function startRound() {
        sequence = [];
        userStep = 0;
        document.getElementById('msg').innerText = "ESLAB QOLING!";
        
        for(let i=0; i < state.seqLen; i++) {
            sequence.push(Math.floor(Math.random() * 9));
        }

        let i = 0;
        const interval = setInterval(() => {
            const tiles = document.querySelectorAll('.tile');
            tiles[sequence[i]].classList.add('blink');
            setTimeout(() => tiles[sequence[i]].classList.remove('blink'), state.diff * 0.7);
            i++;
            if(i >= sequence.length) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('msg').innerText = "QAYTARING!";
                }, state.diff);
            }
        }, state.diff);
    }

    function handleTap(id, el) {
        if(id === sequence[userStep]) {
            el.classList.add('blink');
            setTimeout(() => el.classList.remove('blink'), 200);
            userStep++;
            if(userStep === sequence.length) {
                document.getElementById('reward-modal').style.display = 'block';
                tg.HapticFeedback.notificationOccurred('success');
            }
        } else {
            tg.HapticFeedback.notificationOccurred('error');
            document.getElementById('msg').innerText = "XATO! TIZIM QAYTA YUKLANMOQDA...";
            setTimeout(startRound, 2000);
        }
    }

    function claim(type) {
        if(type === 1) state.score += 50;
        else state.score += 100; // Multiplier mantiqi uchun soddalashtirilgan

        state.level++;
        // 20% QIYINLASHISH: Tezlikni oshirish va har 3 levelda uzunlikni qo'shish
        state.diff = Math.max(300, state.diff * 0.8); // 20% tezlashadi
        if(state.level % 3 === 0) state.seqLen++;

        localStorage.setItem('a_sc', state.score);
        localStorage.setItem('a_lv', state.level);
        
        document.getElementById('reward-modal').style.display = 'none';
        document.getElementById('score').innerText = state.score;
        document.getElementById('lvl-display').innerText = `PROTOCOL LEVEL: ${state.level}`;
        startRound();
    }

    init();
</script>
</body>
</html>
