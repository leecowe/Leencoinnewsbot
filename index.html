<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leencoin: Legend Era</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --magic-purple: #bc13fe; --sun-gold: #ffcc00; }
        body { 
            background: #000; color: #fff; text-align: center; font-family: 'Orbitron', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Effektli fon */
        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0033 0%, #000 70%);
            z-index: -1;
        }

        .header { padding: 20px; border-bottom: 1px solid rgba(0, 242, 255, 0.3); background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .score { font-size: 55px; font-weight: 900; color: var(--sun-gold); text-shadow: 0 0 25px var(--sun-gold); margin: 0; }
        .lvl-badge { color: var(--magic-purple); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        /* Asosiy Kristal (Tanga o'rniga) */
        .crystal-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .main-crystal {
            width: 220px; height: 220px; position: relative;
            background: url('https://cdn-icons-png.flaticon.com/512/6530/6530342.png') no-repeat center/contain;
            filter: drop-shadow(0 0 30px var(--neon-cyan));
            cursor: pointer; transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }
        .main-crystal:active { transform: scale(0.8) rotate(5deg); filter: drop-shadow(0 0 60px var(--magic-purple)); }

        /* Aura nurlari */
        .aura { position: absolute; width: 300px; height: 300px; border: 2px solid var(--neon-cyan); border-radius: 50%; opacity: 0.2; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.2; } 100% { transform: scale(1.3); opacity: 0; } }

        /* Shop & Upgrade Panel */
        .panel { padding: 20px; background: rgba(20, 20, 20, 0.9); border-radius: 30px 30px 0 0; border-top: 2px solid var(--magic-purple); }
        .btn-upgrade {
            background: linear-gradient(45deg, var(--neon-cyan), var(--magic-purple));
            color: #fff; border: none; padding: 18px; border-radius: 15px;
            width: 100%; font-weight: 900; font-size: 16px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(188, 19, 254, 0.4); text-transform: uppercase;
        }
        .btn-upgrade:disabled { filter: grayscale(1); opacity: 0.3; }

        /* Mini Kartalar (10-lvl dan keyin) */
        .epic-grid { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon-cyan); 
            padding: 10px; border-radius: 12px; font-size: 10px; cursor: pointer;
        }
        .card h4 { margin: 0; color: var(--sun-gold); }

        .tap-text { position: absolute; color: #fff; font-weight: 900; pointer-events: none; animation: flyUp 0.6s ease-out forwards; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="score" id="score">0</div>
        <div class="lvl-badge">Core Level: <span id="auto-lvl">1</span>/10</div>
        <div style="font-size: 10px; color: #00ffaa; margin-top: 5px;">⚡ Daromad: +<span id="rate">1</span>/s</div>
    </div>

    <div class="crystal-container">
        <div class="aura"></div>
        <div class="main-crystal" id="crystal"></div>
        <div style="position: absolute; bottom: 40px; color: var(--neon-cyan); font-size: 14px;">Tap: +<span id="tap-val">1</span></div>
    </div>

    <div class="panel">
        <button class="btn-upgrade" id="upgrade-btn" onclick="upgrade()">
            FAST UPGRADE (💰 <span id="cost">10</span>)
        </button>

        <div class="epic-grid" id="shop">
            <div class="card" onclick="buyEpic('VIP', 500, 100)">
                <h4>VIP CARD</h4>
                <p>+100/s (💰500)</p>
            </div>
            <div class="card" onclick="buyEpic('EPIC', 1000, 250)">
                <h4>EPIC CARD</h4>
                <p>+250/s (💰1k)</p>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // TEST MODE: Narxlar juda arzon, daromad juda baland
        let score = parseInt(localStorage.getItem('score')) || 0;
        let autoLvl = parseInt(localStorage.getItem('autoLvl')) || 1;
        let tapPower = parseInt(localStorage.getItem('tapPower')) || 1;
        let autoRate = parseInt(localStorage.getItem('autoRate')) || 1;

        function update() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('auto-lvl').innerText = autoLvl;
            document.getElementById('tap-val').innerText = tapPower;
            document.getElementById('rate').innerText = autoRate;
            
            let currentCost = Math.floor(10 * Math.pow(1.5, autoLvl - 1));
            document.getElementById('cost').innerText = currentCost;

            if(autoLvl >= 10) {
                document.getElementById('upgrade-btn').style.display = 'none';
                document.getElementById('shop').style.display = 'grid';
            }
            document.getElementById('upgrade-btn').disabled = score < currentCost;
            save();
        }

        function save() {
            localStorage.setItem('score', score);
            localStorage.setItem('autoLvl', autoLvl);
            localStorage.setItem('tapPower', tapPower);
            localStorage.setItem('autoRate', autoRate);
        }

        document.getElementById('crystal').onclick = (e) => {
            score += tapPower;
            createEffect(e);
            tg.HapticFeedback.impactOccurred('medium');
            update();
        };

        function createEffect(e) {
            const t = document.createElement('div');
            t.className = 'tap-text';
            t.innerText = `+${tapPower}`;
            t.style.left = e.clientX + 'px';
            t.style.top = e.clientY + 'px';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);
        }

        function upgrade() {
            let cost = parseInt(document.getElementById('cost').innerText);
            if(score >= cost && autoLvl < 10) {
                score -= cost;
                autoLvl++;
                tapPower += 5; // Test uchun tez kuchayish
                autoRate += 10;
                update();
            }
        }

        function buyEpic(type, cost, rate) {
            if(score >= cost) {
                score -= cost;
                autoRate += rate;
                tg.HapticFeedback.notificationOccurred('success');
                update();
            }
        }

        setInterval(() => {
            score += autoRate;
            update();
        }, 1000);

        update();
    </script>
</body>
</html>
