<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova: Infinite Evolution</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff007f; /* Anime Pink */
            --neon: #00f2ff;   /* Cyber Cyan */
            --bg: #05050a;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.alphacoders.com/131/1314605.png') no-repeat center center;
            background-size: cover;
        }

        /* Dashboard: Premium Glassmorphism */
        .dashboard {
            padding: 30px 20px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--accent); text-align: center;
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.2);
        }
        .main-score {
            font-family: 'Fredoka One', cursive; font-size: 60px; margin: 0;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--accent));
        }
        .stats-bar { display: flex; justify-content: space-around; margin-top: 10px; font-size: 14px; color: var(--neon); font-weight: 700; }

        /* Central Gameplay Area */
        .click-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .anime-core {
            position: relative; width: 220px; height: 220px;
            background: radial-gradient(circle, var(--accent), #7000ff);
            border-radius: 50%; border: 6px solid #fff;
            box-shadow: 0 0 50px var(--accent), inset 0 0 30px rgba(255,255,255,0.5);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }
        .anime-core:active { transform: scale(0.9) rotate(5deg); filter: hue-rotate(45deg); }
        .anime-core img { width: 130px; pointer-events: none; }

        /* Dynamic Shop System */
        .shop-container {
            background: var(--glass); border-radius: 40px 40px 0 0;
            padding: 25px; border-top: 4px solid var(--neon);
            max-height: 42%; overflow-y: auto;
        }
        .upgrade-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 20px; padding: 18px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .card-meta h3 { margin: 0; font-size: 18px; color: var(--neon); text-transform: uppercase; }
        
        /* Level Progress Bar */
        .progress-track {
            width: 120px; height: 8px; background: #111; border-radius: 4px;
            margin-top: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }
        .progress-fill { height: 100%; background: var(--accent); transition: 0.5s ease; box-shadow: 0 0 10px var(--accent); }

        .buy-btn {
            background: linear-gradient(135deg, var(--accent), #7000ff);
            border: none; padding: 12px 20px; border-radius: 14px;
            color: #fff; font-weight: 900; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3);
        }
        .buy-btn:disabled { filter: grayscale(1); opacity: 0.3; }

        /* Particles & Effects */
        .tap-particle {
            position: absolute; color: #fff; font-weight: 900; font-size: 35px;
            pointer-events: none; animation: animePopUp 0.8s forwards;
            text-shadow: 2px 2px 0 var(--accent), 0 0 10px #fff;
        }
        @keyframes animePopUp { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(1.6) rotate(15deg); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1 class="main-score" id="score-display">0</h1>
        <div class="stats-bar">
            <span>🚀 TAP: +<span id="tap-stat">1</span></span>
            <span>⚡ AUTO: +<span id="auto-stat">0</span>/s</span>
        </div>
    </div>

    <div class="click-area">
        <div class="anime-core" id="main-target">
            <img src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png">
        </div>
    </div>

    <div class="shop-container" id="shop-area">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // 1. ENGINE: MUSTAHKAM MA'LUMOT TIZIMI
        let gameData = {
            balance: 0,
            upgrades: {
                u1: 0, // Neko Strike
                u2: 0, // Bento Bot
                u3: 0, // Cyber Sensei
                u4: 0, // Galactic Goddess
                u5: 0  // Infinite Void
            }
        };

        const config = [
            { id: 'u1', name: 'Neko Strike', desc: 'Tap kuchini oshirish', base: 50, growth: 1.8, val: 2, type: 'tap' },
            { id: 'u2', name: 'Bento Bot', desc: 'Avto-yig‘ish +15/s', base: 450, growth: 1.6, val: 15, type: 'auto' },
            { id: 'u3', name: 'Cyber Sensei', desc: 'Global daromad +120/s', base: 2500, growth: 1.6, val: 120, type: 'auto' },
            { id: 'u4', name: 'Mecha Maid', desc: 'Tap kuchini +50 ga oshirish', base: 10000, growth: 1.7, val: 50, type: 'tap' },
            { id: 'u5', name: 'Infinite Void', desc: 'Soniya: +1000 Energy', base: 50000, growth: 1.8, val: 1000, type: 'auto' }
        ];

        // 2. LOGIC: SAQLASH VA YUKLASH
        function init() {
            const saved = localStorage.getItem('leenova_v3_data');
            if (saved) {
                try {
                    gameData = JSON.parse(saved);
                } catch(e) { console.error("Data error"); }
            }
            refreshUI();
        }

        function save() {
            localStorage.setItem('leenova_v3_data', JSON.stringify(gameData));
        }

        function getPower() {
            let tap = 1, auto = 0;
            config.forEach(item => {
                let lvl = gameData.upgrades[item.id] || 0;
                if(item.type === 'tap') tap += (lvl * item.val);
                if(item.type === 'auto') auto += (lvl * item.val);
            });
            return { tap, auto };
        }

        // 3. RENDER: DINAMIK DO'KON VA ZANJIRLI OCHILISH
        function refreshUI() {
            const stats = getPower();
            document.getElementById('score-display').innerText = Math.floor(gameData.balance).toLocaleString();
            document.getElementById('tap-stat').innerText = stats.tap;
            document.getElementById('auto-stat').innerText = stats.auto;

            const container = document.getElementById('shop-area');
            container.innerHTML = '';

            let canUnlock = true;
            config.forEach(item => {
                if (!canUnlock) return;

                let lvl = gameData.upgrades[item.id] || 0;
                let price = Math.floor(item.base * Math.pow(item.growth, lvl));
                let progress = (lvl / 10) * 100;

                container.innerHTML += `
                    <div class="upgrade-card">
                        <div class="card-meta">
                            <h3>${item.name} [Lvl ${lvl}/10]</h3>
                            <div class="progress-track"><div class="progress-fill" style="width: ${progress}%"></div></div>
                        </div>
                        ${lvl < 10 ? 
                            `<button class="buy-btn" onclick="buyUpgrade('${item.id}', ${price})">💰 ${price.toLocaleString()}</button>` : 
                            `<span style="color:var(--accent); font-weight:900;">MAX LEVEL</span>`
                        }
                    </div>
                `;

                if (lvl < 10) canUnlock = false; // Faqat MAX bo'lganda keyingisi
            });
            save();
        }

        function buyUpgrade(id, price) {
            if (gameData.balance >= price && gameData.upgrades[id] < 10) {
                gameData.balance -= price;
                gameData.upgrades[id]++;
                tg.HapticFeedback.notificationOccurred('success');
                refreshUI();
            }
        }

        // 4. INTERACTION: TAP VA EFFEKTLAR
        document.getElementById('main-target').onclick = (e) => {
            const stats = getPower();
            gameData.balance += stats.tap;

            const p = document.createElement('div');
            p.className = 'tap-particle';
            p.innerText = `+${stats.tap}`;
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 750);

            tg.HapticFeedback.impactOccurred('medium');
            refreshUI();
        };

        // 5. AUTO-LOOP: SILLIQ MINING
        setInterval(() => {
            const stats = getPower();
            if (stats.auto > 0) {
                gameData.balance += (stats.auto / 10);
                refreshUI();
            }
        }, 100);

        init();
    </script>
</body>
</html>
