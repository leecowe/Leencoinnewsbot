<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const storage = tg.CloudStorage;

    // Boshlang'ich holat
    let state = {
        coins: parseFloat(localStorage.getItem('tc_coins')) || 0,
        upgrades: JSON.parse(localStorage.getItem('tc_up')) || { u1:0, u2:0, u3:0 },
        nfts: JSON.parse(localStorage.getItem('tc_nft')) || []
    };

    // Bulutdan yuklashni boshlash
    loadFromCloud();

    const marketMap = [
        { id: 'u1', name: 'Neural Chip', base: 100, bonus: 2, type: 'tap' },
        { id: 'u2', name: 'Nano Drone', base: 500, bonus: 5, type: 'auto' },
        { id: 'u3', name: 'Quantum Core', base: 2000, bonus: 20, type: 'auto' }
    ];

    const nftCatalog = Array.from({length: 100}, (_, i) => ({
        id: 'nft_' + i,
        name: 'Unit-X' + (i + 1),
        price: Math.floor(1000 * Math.pow(1.18, i)),
        power: Math.floor(5 * Math.pow(1.15, i))
    }));

    function getStats() {
        let tap = 1, farm = 0;
        marketMap.forEach(u => {
            const lvl = state.upgrades[u.id] || 0;
            if(u.type === 'tap') tap += lvl * u.bonus;
            else farm += lvl * u.bonus;
        });
        state.nfts.forEach(id => {
            const n = nftCatalog.find(x => x.id === id);
            if(n) farm += n.power;
        });
        return { tap, farm };
    }

    // --- SINXRONIZATSIYA ---
    function saveAll() {
        // 1. Local Storage (Tezkorlik uchun)
        localStorage.setItem('tc_coins', state.coins);
        localStorage.setItem('tc_up', JSON.stringify(state.upgrades));
        localStorage.setItem('tc_nft', JSON.stringify(state.nfts));
        
        // 2. Telegram Cloud Storage (Xavfsizlik uchun)
        saveToCloud();
    }

    function saveToCloud() {
        storage.setItem('aira_protocol_state', JSON.stringify(state));
    }

    function loadFromCloud() {
        storage.getItem('aira_protocol_state', (err, value) => {
            if (!err && value) {
                const cloudData = JSON.parse(value);
                if(cloudData.coins > state.coins) {
                    state = cloudData;
                    updateUI();
                }
            }
        });
    }

    // Xarid funksiyalari (saveAll chaqiriladi)
    window.buyU = (id, c) => { 
        if(state.coins >= c) { 
            state.coins -= c; 
            state.upgrades[id]++; 
            updateUI(); 
            renderMarket();
            saveAll(); 
            tg.HapticFeedback.notificationOccurred('success'); 
        } 
    };

    window.buyN = (id, c) => { 
        if(state.coins >= c) { 
            state.coins -= c; 
            state.nfts.push(id); 
            updateUI(); 
            renderNFTs();
            saveAll(); 
            tg.HapticFeedback.notificationOccurred('success'); 
        } 
    };

    function updateUI() {
        const s = getStats();
        document.getElementById('m-bal').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('t-p').innerText = s.tap;
        document.getElementById('f-p').innerText = s.farm;
    }

    // Auto-save har 30 soniyada
    setInterval(saveAll, 30000);

    // Farming Loop
    setInterval(() => { 
        state.coins += getStats().farm / 10; 
        updateUI(); 
    }, 100);

    // Boshqa barcha dizayn va event listenerlar (tap, nav) o'zgarishsiz qoladi...
</script>
