<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mega Farm 3D - EMPIRE MODE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #f3ba2f; --bg: #050505; --panel: rgba(255, 255, 255, 0.05); --energy: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Progress Bars */
        .top-stats { position: absolute; top: 110px; width: 100%; padding: 0 20px; z-index: 20; }
        .bar-container { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        
        .header { padding: 30px 20px; text-align: center; z-index: 20; }
        .balance-value { font-size: 48px; font-weight: 900; color: var(--gold); text-shadow: 0 0 25px rgba(243, 186, 47, 0.7); }
        .level-badge { background: var(--gold); color: #000; padding: 2px 12px; border-radius: 10px; font-weight: 800; font-size: 12px; }

        #canvas-container { flex-grow: 1; position: relative; touch-action: none; pointer-events: auto; }

        .footer { padding: 20px; pointer-events: auto; background: linear-gradient(to top, rgba(0,0,0,1), transparent); }
        .hud { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--panel); backdrop-filter: blur(10px); padding: 12px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { font-size: 18px; font-weight: 800; display: block; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }

        .upgrade-btn { width: 100%; background: #fff; color: #000; border: none; padding: 18px; border-radius: 20px; font-size: 16px; font-weight: 900; display: flex; justify-content: space-between; align-items: center; }
        .upgrade-btn:active { transform: scale(0.96); }

        .floating-n { position: absolute; font-weight: 900; pointer-events: none; animation: floatUp 0.6s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -120px) scale(2); } }
    </style>
</head>
<body>

    <div class="header">
        <span class="level-badge" id="lvl-text">LVL 1</span>
        <div class="balance-value" id="bal">0</div>
    </div>

    <div class="top-stats">
        <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:4px">
            <span>⚡ ENERGIYA</span>
            <span id="energy-num">1000/1000</span>
        </div>
        <div class="bar-container">
            <div id="energy-bar" class="bar-fill" style="width: 100%; background: var(--energy)"></div>
        </div>
        <div class="bar-container" style="height: 4px">
            <div id="xp-bar" class="bar-fill" style="width: 0%; background: #3498db"></div>
        </div>
    </div>
    
    <div id="canvas-container"></div>

    <div class="footer">
        <div class="hud">
            <div class="stat-card">
                <span class="stat-val" id="pps" style="color:var(--energy)">+0</span>
                <span class="stat-label">Auto Farm</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="pwr">+1</span>
                <span class="stat-label">Tap Power</span>
            </div>
        </div>
        <button class="upgrade-btn" id="buy">
            <span>🏗️ FERMANI KENGAYTIRISH</span>
            <span>1 🪙</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = JSON.parse(localStorage.getItem('megaFarmEmpire')) || {
            coins: 0, pps: 0, pwr: 1, 
            energy: 1000, maxEnergy: 1000,
            xp: 0, nextXp: 100, lvl: 1,
            combo: 0, lastTap: 0
        };

        // --- THREE.JS (Vizuallashtirish) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const geometry = new THREE.TorusKnotGeometry(1.2, 0.4, 100, 16);
        const material = new THREE.MeshPhongMaterial({ color: 0xf3ba2f, shininess: 100 });
        const obj = new THREE.Mesh(geometry, material);
        scene.add(obj);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);
        scene.add(new THREE.AmbientLight(0x444444));
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            obj.rotation.y += 0.01 + (state.combo * 0.002);
            obj.rotation.z += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // --- FARMING TIZIMI ---
        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(state.coins).toLocaleString();
            document.getElementById('pps').innerText = `+${state.pps.toFixed(1)}`;
            document.getElementById('pwr').innerText = `+${state.pwr}`;
            document.getElementById('lvl-text').innerText = `LVL ${state.lvl}`;
            
            // Bars
            document.getElementById('energy-num').innerText = `${Math.floor(state.energy)}/${state.maxEnergy}`;
            document.getElementById('energy-bar').style.width = (state.energy / state.maxEnergy * 100) + "%";
            document.getElementById('xp-bar').style.width = (state.xp / state.nextXp * 100) + "%";
            
            localStorage.setItem('megaFarmEmpire', JSON.stringify(state));
        }

        container.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (state.energy < 1) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            const now = Date.now();
            state.combo = (now - state.lastTap < 300) ? state.combo + 1 : 0;
            state.lastTap = now;

            // Farming hisobi
            const crit = Math.random() < 0.1 ? 3 : 1;
            const gain = state.pwr * crit;
            
            state.coins += gain;
            state.energy -= 1;
            state.xp += 2;

            // Level Up logikasi
            if (state.xp >= state.nextXp) {
                state.lvl++;
                state.xp = 0;
                state.nextXp *= 1.5;
                state.pwr += 1;
                state.maxEnergy += 100;
                state.energy = state.maxEnergy;
                tg.showPopup({ message: `Tabriklaymiz! Siz ${state.lvl}-darajaga chiqdingiz!` });
            }

            // Visual Effect
            obj.scale.set(1.2, 1.2, 1.2);
            setTimeout(() => obj.scale.set(1, 1, 1), 100);
            
            for (let i = 0; i < e.targetTouches.length; i++) {
                const t = e.targetTouches[i];
                const n = document.createElement('div');
                n.className = 'floating-n';
                n.innerText = crit > 1 ? `CRIT +${gain}` : `+${gain}`;
                n.style.color = crit > 1 ? '#ff4747' : '#fff';
                n.style.left = `${t.clientX}px`;
                n.style.top = `${t.clientY}px`;
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 600);
            }

            tg.HapticFeedback.impactOccurred(crit > 1 ? 'heavy' : 'light');
            updateUI();
        });

        // Auto Recovery & Passive Farming
        setInterval(() => {
            // Energiya tiklanishi
            if (state.energy < state.maxEnergy) {
                state.energy = Math.min(state.maxEnergy, state.energy + 1.5);
            }
            // Avto daromad
            if (state.pps > 0) {
                state.coins += (state.pps / 10);
            }
            updateUI();
        }, 100);

        // Upgrade
        document.getElementById('buy').onclick = () => {
            if (state.coins >= 1) {
                state.coins -= 1;
                state.pps += 2;
                state.pwr += 1;
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        };

        updateUI();
    </script>
</body>
</html>
