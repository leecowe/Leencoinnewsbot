<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova NFT Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --gold: #ffcc00; --purple: #bc00ff; --dark: #020b16; }
        body {
            margin: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden;
            background: linear-gradient(rgba(2,11,22,0.8), rgba(2,11,22,0.9)), url('https://images.alphacoders.com/131/1314605.png') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column;
        }

        /* Stats HUD */
        .hud { padding: 25px; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        .balance { font-family: 'Orbitron'; font-size: 28px; text-shadow: 0 0 10px var(--blue); }
        .test-badge { font-size: 10px; background: var(--pink); padding: 2px 8px; border-radius: 4px; animation: blink 1s infinite; }

        /* Navigation */
        .nav { display: flex; background: rgba(0,242,255,0.05); }
        .nav-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; font-family: 'Orbitron'; font-size: 12px; }
        .nav-btn.active { border-color: var(--blue); background: rgba(0,242,255,0.1); }

        /* NFT Grid */
        .content-area { flex-grow: 1; overflow-y: auto; padding: 15px; display: none; }
        .content-area.active { display: block; }
        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 30px; }

        .nft-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,242,255,0.2); border-radius: 12px;
            overflow: hidden; position: relative; transition: 0.3s;
        }
        .nft-img { width: 100%; height: 140px; object-fit: cover; filter: brightness(0.8); }
        .nft-info { padding: 10px; }
        .nft-tier { font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-bottom: 5px; }
        
        /* Tiers */
        .common { background: #555; }
        .rare { background: var(--blue); color: #000; }
        .epic { background: var(--purple); }
        .legend { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); }

        .nft-card h5 { margin: 0; font-size: 13px; color: #fff; }
        .nft-power { font-size: 11px; color: var(--blue); margin: 5px 0; }
        .buy-btn { width: 100%; background: transparent; border: 1px solid var(--blue); color: var(--blue); padding: 6px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; }
        .buy-btn:disabled { border-color: #444; color: #444; }
        .buy-btn:active { background: var(--blue); color: #000; }

        .owned-tag { position: absolute; top: 5px; right: 5px; font-size: 18px; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="hud">
        <div>
            <div style="font-size: 10px; color: var(--blue);">CREDITS <span class="test-badge">TEST MODE: ALL 1 CR</span></div>
            <div class="balance" id="balance">0</div>
        </div>
        <div id="tap-zone" style="cursor:pointer; font-size:30px;">⚡</div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="tab('market')">NFT MARKET</div>
        <div class="nav-btn" onclick="tab('inventory')">MY CARDS</div>
    </div>

    <div id="market" class="content-area active">
        <div class="nft-grid" id="market-list"></div>
    </div>

    <div id="inventory" class="content-area">
        <div class="nft-grid" id="my-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let game = {
            credits: parseFloat(localStorage.getItem('ln_nft_bal')) || 100,
            owned: JSON.parse(localStorage.getItem('ln_nft_owned')) || []
        };

        // 15+ NFT Kartalar Ma'lumotlar Bazasi
        const nfts = [
            { id: 1, name: "Neon Samurai", tier: "rare", power: 15, img: "https://picsum.photos/seed/n1/200/300" },
            { id: 2, name: "Cyber Monk", tier: "epic", power: 45, img: "https://picsum.photos/seed/n2/200/300" },
            { id: 3, name: "Star Voyager", tier: "legend", power: 120, img: "https://picsum.photos/seed/n3/200/300" },
            { id: 4, name: "Data Ghost", tier: "common", power: 5, img: "https://picsum.photos/seed/n4/200/300" },
            { id: 5, name: "Plasma Queen", tier: "epic", power: 55, img: "https://picsum.photos/seed/n5/200/300" },
            { id: 6, name: "Void Runner", tier: "rare", power: 25, img: "https://picsum.photos/seed/n6/200/300" },
            { id: 7, name: "Mecha Titan", tier: "legend", power: 250, img: "https://picsum.photos/seed/n7/200/300" },
            { id: 8, name: "Binary Witch", tier: "rare", power: 30, img: "https://picsum.photos/seed/n8/200/300" },
            { id: 9, name: "Giga Bot", tier: "common", power: 8, img: "https://picsum.photos/seed/n9/200/300" },
            { id: 10, name: "Cyber Dragon", tier: "legend", power: 500, img: "https://picsum.photos/seed/n10/200/300" },
            { id: 11, name: "Chrome Assassin", tier: "epic", power: 70, img: "https://picsum.photos/seed/n11/200/300" },
            { id: 12, name: "Solar Pilot", tier: "rare", power: 20, img: "https://picsum.photos/seed/n12/200/300" },
            { id: 13, name: "Neural Hacker", tier: "epic", power: 90, img: "https://picsum.photos/seed/n13/200/300" },
            { id: 14, name: "Rusty Android", tier: "common", power: 2, img: "https://picsum.photos/seed/n14/200/300" },
            { id: 15, name: "Infinite AI", tier: "legend", power: 1000, img: "https://picsum.photos/seed/n15/200/300" },
            { id: 16, name: "Lava Guardian", tier: "rare", power: 40, img: "https://picsum.photos/seed/n16/200/300" }
        ];

        function save() {
            localStorage.setItem('ln_nft_bal', game.credits);
            localStorage.setItem('ln_nft_owned', JSON.stringify(game.owned));
        }

        function tab(t) {
            document.querySelectorAll('.content-area, .nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
            render();
        }

        function render() {
            document.getElementById('balance').innerText = Math.floor(game.credits).toLocaleString();
            
            // Market render
            const marketList = document.getElementById('market-list');
            marketList.innerHTML = '';
            nfts.forEach(nft => {
                const isOwned = game.owned.includes(nft.id);
                marketList.innerHTML += `
                    <div class="nft-card">
                        <img src="${nft.img}" class="nft-img">
                        ${isOwned ? '<span class="owned-tag">✅</span>' : ''}
                        <div class="nft-info">
                            <span class="nft-tier ${nft.tier}">${nft.tier.toUpperCase()}</span>
                            <h5>${nft.name}</h5>
                            <div class="nft-power">Auto: +${nft.power}/s</div>
                            <button class="buy-btn" onclick="buy(${nft.id})" ${isOwned || game.credits < 1 ? 'disabled' : ''}>
                                ${isOwned ? 'OWNED' : 'BUY (1 CR)'}
                            </button>
                        </div>
                    </div>
                `;
            });

            // Inventory render
            const myList = document.getElementById('my-list');
            myList.innerHTML = '';
            nfts.filter(n => game.owned.includes(n.id)).forEach(nft => {
                myList.innerHTML += `
                    <div class="nft-card">
                        <img src="${nft.img}" class="nft-img">
                        <div class="nft-info">
                            <span class="nft-tier ${nft.tier}">${nft.tier.toUpperCase()}</span>
                            <h5>${nft.name}</h5>
                            <div class="nft-power">Producing: ${nft.power}/s</div>
                        </div>
                    </div>
                `;
            });
            save();
        }

        window.buy = (id) => {
            if(game.credits >= 1 && !game.owned.includes(id)) {
                game.credits -= 1;
                game.owned.push(id);
                tg.HapticFeedback.notificationOccurred('success');
                render();
            }
        };

        document.getElementById('tap-zone').onclick = () => {
            game.credits += 1;
            tg.HapticFeedback.impactOccurred('light');
            render();
        };

        // Avtomatik daromad (NFT power asosida)
        setInterval(() => {
            let totalPower = 0;
            nfts.filter(n => game.owned.includes(n.id)).forEach(n => totalPower += n.power);
            if(totalPower > 0) {
                game.credits += (totalPower / 10);
                render();
            }
        }, 100);

        render();
    </script>
</body>
</html>
