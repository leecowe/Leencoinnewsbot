<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova Clicker Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .header { padding: 20px; background: linear-gradient(to bottom, #1a1a1a, #000); }
        .score { font-size: 55px; font-weight: bold; color: #ffcc00; text-shadow: 0 0 20px rgba(255, 204, 0, 0.5); }
        
        .progress-container { width: 85%; background: #333; height: 12px; border-radius: 6px; margin: 10px auto; overflow: hidden; border: 1px solid #444; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff9900, #ffcc00); transition: width 0.3s; }

        .energy-section { font-size: 14px; color: #aaa; margin-top: 5px; }
        .stats-row { display: flex; justify-content: space-around; font-size: 13px; color: #00ff00; font-weight: bold; margin-top: 10px; }
        
        .main-game { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .coin { 
            width: 220px; height: 220px; background: radial-gradient(circle, #ffcc00, #ff9900); 
            border-radius: 50%; box-shadow: 0 0 50px rgba(255, 153, 0, 0.4);
            display: flex; align-items: center; justify-content: center; font-size: 90px;
            transition: transform 0.05s; border: 8px solid #e6b800; -webkit-tap-highlight-color: transparent;
        }
        .coin:active { transform: scale(0.92); }
        .coin.disabled { filter: grayscale(1); opacity: 0.5; pointer-events: none; }
        
        .tap-anim { position: absolute; color: #fff; font-size: 30px; font-weight: 900; pointer-events: none; animation: fly 0.6s ease-out forwards; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
        
        .footer-menu { padding: 20px; background: #111; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-radius: 25px 25px 0 0; }
        .btn {
            border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s;
        }
        .upgrade-btn { background: #ffcc00; color: #000; }
        .upgrade-btn:disabled { background: #333; color: #777; }
        .invite-btn { background: #248bcf; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <div class="score" id="score">0</div>
        <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
        <div class="energy-section">⚡️ Energiya: <span id="energy">100</span>/100</div>
        <div class="stats-row">
            <span id="tap-power">🚀 Tap: +1</span>
            <span id="auto-rate">⚙️ Auto: +1/s</span>
        </div>
    </div>

    <div class="main-game">
        <div class="coin" id="coin">💰</div>
    </div>

    <div class="footer-menu">
        <button class="btn upgrade-btn" id="upgrade-btn">Level Up (💰 100)</button>
        <button class="btn invite-btn" id="invite-btn">Invite Friends 👥</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseFloat(localStorage.getItem('score')) || 0;
        let tapPower = parseInt(localStorage.getItem('tapPower')) || 1;
        let upgradeCost = parseInt(localStorage.getItem('upgradeCost')) || 100;
        let energy = parseInt(localStorage.getItem('energy')) || 100;

        const scoreEl = document.getElementById('score');
        const energyEl = document.getElementById('energy');
        const progressBar = document.getElementById('progress');
        const upgradeBtn = document.getElementById('upgrade-btn');

        function updateUI() {
            scoreEl.innerText = Math.floor(score).toLocaleString();
            energyEl.innerText = energy;
            document.getElementById('tap-power').innerText = `🚀 Tap: +${tapPower}`;
            upgradeBtn.innerText = `Level Up (💰 ${upgradeCost})`;
            
            let prog = (score / upgradeCost) * 100;
            progressBar.style.width = Math.min(prog, 100) + "%";
            upgradeBtn.disabled = score < upgradeCost;
            
            if(energy <= 0) document.getElementById('coin').classList.add('disabled');
            else document.getElementById('coin').classList.remove('disabled');
        }

        // Auto-daromad va Energiya tiklanishi
        setInterval(() => {
            score += 1;
            if (energy < 100) energy += 1;
            updateUI();
            save();
        }, 1000);

        function save() {
            localStorage.setItem('score', score);
            localStorage.setItem('tapPower', tapPower);
            localStorage.setItem('upgradeCost', upgradeCost);
            localStorage.setItem('energy', energy);
        }

        document.getElementById('coin').onclick = (e) => {
            if (energy >= tapPower) {
                score += tapPower;
                energy -= tapPower;
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');

                const anim = document.createElement('div');
                anim.className = 'tap-anim';
                anim.innerText = `+${tapPower}`;
                anim.style.left = e.clientX + 'px';
                anim.style.top = e.clientY + 'px';
                document.body.appendChild(anim);
                setTimeout(() => anim.remove(), 600);
            }
        };

        upgradeBtn.onclick = () => {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                tapPower += 1;
                upgradeCost = Math.floor(upgradeCost * 2);
                updateUI();
                save();
            }
        };

        document.getElementById('invite-btn').onclick = () => {
            const url = `https://t.me/share/url?url=https://t.me/${tg.initDataUnsafe.bot.username}&text=Bu o'yinda pul ishla!`;
            tg.openTelegramLink(url);
        };

        updateUI();
    </script>
</body>
</html>
