<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Elite Economy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --lvl-color: #00f2ff; --bg: #050505; --border: rgba(255, 255, 255, 0.15); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { padding: 25px 20px; text-align: center; border-bottom: 2px solid var(--border); background: #000; position: relative; }
        .rank-btn { position: absolute; left: 15px; top: 25px; background: #1a1a1a; border: 2px solid var(--lvl-color); padding: 6px 15px; border-radius: 10px; font-size: 13px; font-weight: 700; color: var(--lvl-color); }
        .profit-badge { position: absolute; right: 15px; top: 25px; background: rgba(0,255,0,0.1); border: 1px solid #00ff00; padding: 5px 10px; border-radius: 8px; color: #00ff00; font-size: 12px; font-weight: 700; }
        .bal-val { font-size: 46px; font-weight: 700; color: #fff; }
        .staked-display { font-size: 14px; color: #ffbc00; font-weight: 700; margin-top: 5px; height: 18px; }

        .view-content { flex: 1; display: none; padding: 15px; overflow-y: auto; }
        .view-content.active { display: flex; flex-direction: column; }

        .glass-card { background: #111; border: 1px solid var(--border); border-left: 5px solid var(--lvl-color); border-radius: 14px; padding: 20px; margin-bottom: 15px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cost-tag { color: var(--lvl-color); font-weight: 700; font-size: 14px; margin-bottom: 5px; display: block; text-align: right; }
        
        .btn-main { background: var(--lvl-color); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-main:disabled { background: #333 !important; color: #666 !important; }

        .lock-msg { background: rgba(255, 68, 68, 0.1); color: #ff4444; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; text-align: center; border: 1px solid #ff4444; font-weight: 700; }

        /* NFT STYLES */
        .nft-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .nft-card { background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; }

        .nav { height: 80px; background: #000; display: flex; border-top: 2px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: var(--lvl-color); border-top: 3px solid var(--lvl-color); }
    </style>
</head>
<body>

    <header class="header">
        <div class="rank-btn" onclick="openRank()">RANK</div>
        <div class="profit-badge" id="profit-val">+50/s</div>
        <div class="bal-val" id="total-bal">0</div>
        <div id="staked-info" class="staked-display" style="visibility: hidden;">STAKED: <span id="staked-amt">0</span></div>
        <div id="career-name" style="font-size:12px; letter-spacing:3px; color:var(--lvl-color); font-weight:700;">BOSHLANG'ICH</div>
    </header>

    <div id="view-core" class="view-content active">
        <div class="glass-card">
            <div class="info-row">
                <span style="color:#aaa">STAKING LVL: <b id="stake-lvl" style="color:var(--lvl-color)">0</b></span>
                <span id="stake-timer" style="font-weight:700">TAYYOR</span>
            </div>
            <button class="btn-main" onclick="startStake()" id="stake-btn">STAKE ALL (+%)</button>
            <div style="margin-top:15px">
                <span class="cost-tag" id="stake-cost-tag">Narxi: 500</span>
                <button class="btn-main" onclick="upgradeStake()" id="stake-up-btn" style="background:transparent; border:2px solid var(--lvl-color); color:var(--lvl-color)">KUCHAYTIRISH</button>
            </div>
            <div id="lock-stake" class="lock-msg">O'quvchi darajasi kerak!</div>
        </div>

        <div class="glass-card">
            <div class="info-row">
                <span style="color:#aaa">FARMING LVL: <b id="farm-lvl" style="color:var(--lvl-color)">1</b></span>
                <span style="font-weight:700" id="aps-ui">50 APS</span>
            </div>
            <span class="cost-tag" id="farm-cost-tag">Narxi: 500</span>
            <button class="btn-main" onclick="upgradeFarm()" id="farm-up-btn">FARMINGNI KUCHAYTIRISH</button>
            <div id="lock-farm" class="lock-msg" style="display:none">MAX</div>
        </div>
    </div>

    <div id="view-market" class="view-content">
        <div id="nft-section">
            <h3 style="text-align:center; color:gold;">GOLDEN NFT MARKET</h3>
            <div class="nft-grid">
                <div class="nft-card">
                    <div style="font-size:40px;">💎</div>
                    <div style="font-weight:700;">AIRA ELITE #01</div>
                    <button class="btn-main" style="margin-top:10px;" onclick="buyNFT(1000000)">1M COINS</button>
                </div>
            </div>
            <div id="lock-nft" class="lock-msg">Vazir darajasi kerak!</div>
        </div>

        <div class="glass-card" style="margin-top:20px;">
            <div style="font-weight:700;">AUTO-STAKING</div>
            <button class="btn-main" style="margin-top:10px;" onclick="buyAuto()" id="auto-btn">BUY (15,000)</button>
            <div id="lock-auto" class="lock-msg">Talaba darajasi kerak!</div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('core', this)">CORE</div>
        <div class="nav-item" onclick="switchTab('market', this)">MARKET</div>
        <div class="nav-item" onclick="tg.showAlert('News: Tez kunda...')">NEWS</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    let balance = parseFloat(localStorage.getItem('aira_bal')) || 0;
    let farmLevel = parseInt(localStorage.getItem('aira_farm')) || 1;
    let stakeLevel = parseInt(localStorage.getItem('aira_stake')) || 0;
    let hasAuto = localStorage.getItem('aira_auto') === 'true';

    let isStaking = false;
    let currentStaked = 0;
    let career = { name: "BOSHLANG'ICH", color: "#00f2ff" };

    function checkCareer() {
        let total = balance + currentStaked;
        if (total >= 500000) career = { name: "VAZIR", color: "#FFD700", fMax: 50, sMax: 8, auto: true, stake: true, nft: true };
        else if (total >= 100000) career = { name: "MAGISTR", color: "#ff2e2e", fMax: 25, sMax: 7, auto: true, stake: true, nft: false };
        else if (total >= 10000) career = { name: "TALABA", color: "#26ff26", fMax: 15, sMax: 5, auto: true, stake: true, nft: false };
        else if (total >= 1000) career = { name: "O'QUVCHI", color: "#ffffff", fMax: 10, sMax: 3, auto: false, stake: true, nft: false };
        else career = { name: "BOSHLANG'ICH", color: "#00f2ff", fMax: 1, sMax: 0, auto: false, stake: false, nft: false };

        document.documentElement.style.setProperty('--lvl-color', career.color);
        document.getElementById('career-name').innerText = career.name;
        updateUI();
    }

    // 2x PROGRESSIYA VA PROFIT
    setInterval(() => {
        // Har bir darajada daromad 2x bo'ladi (Boshlang'ich 50 dan boshlanadi)
        let aps = 50 * Math.pow(2, farmLevel - 1);
        balance += (aps / 3.33);
        
        document.getElementById('total-bal').innerText = Math.floor(balance).toLocaleString();
        document.getElementById('profit-val').innerText = "+" + Math.floor(aps).toLocaleString() + "/s";
        document.getElementById('aps-ui').innerText = Math.floor(aps).toLocaleString() + " APS";

        // Auto-Stake 5s
        if(hasAuto && career.auto && !isStaking && balance > 1000) {
            startStake();
        }
        checkCareer();
    }, 300);

    function startStake() {
        if (isStaking || balance <= 0 || !career.stake) return;
        currentStaked = balance; balance = 0; isStaking = true;
        document.getElementById('staked-info').style.visibility = "visible";
        document.getElementById('staked-amt').innerText = Math.floor(currentStaked).toLocaleString();

        let timeLeft = 10;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('stake-timer').innerText = timeLeft + "S";
            if (timeLeft <= 0) {
                clearInterval(countdown);
                balance += Math.floor(currentStaked * (1.05 + (stakeLevel * 0.05)));
                currentStaked = 0; isStaking = false;
                document.getElementById('staked-info').style.visibility = "hidden";
                document.getElementById('stake-timer').innerText = "TAYYOR";
                save();
            }
        }, 1000);
    }

    function upgradeFarm() {
        // Xarajat ham 2x o'sadi: 500 dan boshlab
        let cost = 500 * Math.pow(2, farmLevel - 1);
        if (balance >= cost && farmLevel < career.fMax) {
            balance -= cost; farmLevel++; save();
        }
    }

    function upgradeStake() {
        let cost = 500 * Math.pow(2, stakeLevel);
        if (balance >= cost && stakeLevel < career.sMax) {
            balance -= cost; stakeLevel++; save();
        }
    }

    function updateUI() {
        let fCost = 500 * Math.pow(2, farmLevel - 1);
        let sCost = 500 * Math.pow(2, stakeLevel);
        
        document.getElementById('farm-cost-tag').innerText = "Narxi: " + fCost.toLocaleString();
        document.getElementById('stake-cost-tag').innerText = "Narxi: " + sCost.toLocaleString();
        document.getElementById('farm-lvl').innerText = farmLevel;
        document.getElementById('stake-lvl').innerText = stakeLevel;

        // Locks
        document.getElementById('lock-stake').style.display = career.stake ? "none" : "block";
        document.getElementById('lock-auto').style.display = career.auto ? "none" : "block";
        document.getElementById('lock-nft').style.display = career.nft ? "none" : "block";
        document.getElementById('auto-btn').disabled = !career.auto || hasAuto;
        if(hasAuto) document.getElementById('auto-btn').innerText = "SOTIB OLINGAN";
    }

    function save() { localStorage.setItem('aira_bal', balance); localStorage.setItem('aira_farm', farmLevel); localStorage.setItem('aira_stake', stakeLevel); }
    function switchTab(tab, el) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        el.classList.add('active');
    }
    checkCareer();
</script>
</body>
</html>
