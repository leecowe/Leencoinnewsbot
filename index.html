<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leencoin Legend</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --neon-purple: #bc13fe; --gold: #ffcc00; }
        body { 
            background: #050505; color: #fff; text-align: center; font-family: 'Orbitron', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow-y: auto;
        }
        
        /* Header & Score */
        .header { padding: 20px; background: rgba(0, 0, 0, 0.8); sticky: top; border-bottom: 2px solid var(--neon-blue); }
        .score { font-size: 50px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px var(--gold); }
        
        /* Main Game Area */
        .game-screen { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .main-orb {
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, var(--neon-blue), #000);
            box-shadow: 0 0 50px var(--neon-blue); border: 4px solid #fff;
            display: flex; align-items: center; justify-content: center; font-size: 80px;
            transition: 0.1s; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .main-orb:active { transform: scale(0.9); box-shadow: 0 0 80px var(--neon-purple); }

        /* Shop Section (VIP - EPIC) */
        .shop-overlay { 
            display: none; padding: 20px; background: linear-gradient(to bottom, #000, #1a1a1a);
            border-top: 3px solid var(--neon-purple); border-radius: 30px 30px 0 0; margin-top: 20px;
        }
        .shop-title { color: var(--neon-purple); font-size: 24px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        
        .card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--neon-blue);
            border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .card-info h3 { margin: 0; font-size: 16px; color: var(--neon-blue); }
        .card-info p { margin: 5px 0 0; font-size: 12px; color: #aaa; }
        
        .buy-btn {
            background: var(--neon-blue); color: #000; border: none; padding: 10px 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .buy-btn:disabled { background: #333; color: #666; }

        /* Statuses */
        .lvl-tag { font-size: 14px; color: var(--neon-purple); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="score" id="score">0</div>
        <div class="lvl-tag">AUTO-CLICKER: <span id="auto-lvl">1</span>/10</div>
    </div>

    <div class="game-screen" id="main-ui">
        <div class="main-orb" id="orb">💎</div>
        <p style="color: #00f2ff; margin-top: 20px;">Har bir bosish: +<span id="tap-val">1</span></p>
    </div>

    <div class="shop-overlay" id="epic-shop">
        <div class="shop-title">✨ LEGENDARY SHOP ✨</div>
        
        <div class="card">
            <div class="card-info">
                <h3>VIP LEGEND CARD</h3>
                <p>Har soniyada +50 ochko</p>
            </div>
            <button class="buy-btn" onclick="buyEpic(5000, 50)">💰 5,000</button>
        </div>

        <div class="card">
            <div class="card-info">
                <h3>MYSTIC ARTIFACT</h3>
                <p>Tap kuchini +25 ga oshirish</p>
            </div>
            <button class="buy-btn" onclick="buyTap(10000, 25)">💰 10,000</button>
        </div>
    </div>

    <div style="padding: 20px;">
        <button class="buy-btn" id="auto-btn" style="width: 100%; padding: 20px;" onclick="upgradeAuto()">
            AUTO-CLICKER UPGRADE (💰 <span id="auto-cost">100</span>)
        </button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseInt(localStorage.getItem('score')) || 0;
        let autoLvl = parseInt(localStorage.getItem('autoLvl')) || 1;
        let tapPower = parseInt(localStorage.getItem('tapPower')) || 1;
        let autoRate = parseInt(localStorage.getItem('autoRate')) || 1;

        const scoreEl = document.getElementById('score');
        const autoLvlEl = document.getElementById('auto-lvl');
        const autoBtn = document.getElementById('auto-btn');
        const autoCostEl = document.getElementById('auto-cost');
        const shopEl = document.getElementById('epic-shop');

        function updateUI() {
            scoreEl.innerText = score.toLocaleString();
            autoLvlEl.innerText = autoLvl;
            document.getElementById('tap-val').innerText = tapPower;
            let cost = Math.floor(100 * Math.pow(1.8, autoLvl - 1));
            autoCostEl.innerText = cost;

            if (autoLvl >= 10) {
                autoBtn.style.display = 'none';
                shopEl.style.display = 'block';
            }
            save();
        }

        function save() {
            localStorage.setItem('score', score);
            localStorage.setItem('autoLvl', autoLvl);
            localStorage.setItem('tapPower', tapPower);
            localStorage.setItem('autoRate', autoRate);
        }

        // Tap
        document.getElementById('orb').onclick = (e) => {
            score += tapPower;
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        };

        // Auto Upgrade (Max 10)
        function upgradeAuto() {
            let cost = parseInt(autoCostEl.innerText);
            if (score >= cost && autoLvl < 10) {
                score -= cost;
                autoLvl++;
                autoRate += 2;
                updateUI();
            }
        }

        // Epic Shop Functions
        function buyEpic(cost, rate) {
            if (score >= cost) {
                score -= cost;
                autoRate += rate;
                updateUI();
                alert("LEGEND CARD ACTIVATED!");
            }
        }

        function buyTap(cost, pwr) {
            if (score >= cost) {
                score -= cost;
                tapPower += pwr;
                updateUI();
                alert("MYSTIC POWER UNLOCKED!");
            }
        }

        // Global Loop
        setInterval(() => {
            score += autoRate;
            updateUI();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
