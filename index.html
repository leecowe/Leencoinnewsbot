<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol - Parallax Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --dark: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; background: var(--dark); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column;
            user-select: none;
        }

        /* Parallax uchun bir necha qatlamli Canvas */
        #bg-canvas { 
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; 
            z-index: -1; pointer-events: none; will-change: transform;
            transition: transform 0.1s ease-out; /* Silliq harakat */
        }

        .top-hud { padding: 45px 20px 10px; text-align: center; z-index: 100; flex-shrink: 0; }
        .bot-name { font-family: 'Orbitron'; color: var(--blue); font-size: 13px; letter-spacing: 2px; }
        .balance { font-family: 'Orbitron'; font-size: 52px; text-shadow: 0 0 15px var(--blue); margin: 5px 0; }
        .stats-bar { display: flex; justify-content: center; gap: 15px; font-family: 'Orbitron'; font-size: 11px; }

        .section { display: none; flex-grow: 1; overflow-y: auto; padding: 20px; position: relative; padding-bottom: 100px; }
        .section.active { display: flex; flex-direction: column; }

        .hero-zone { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        /* Robot qahramon animatsiyasi */
        .character-box { 
            width: 260px; height: 260px; border-radius: 50%; border: 2px solid var(--blue); 
            display: flex; align-items: center; justify-content: center; position: relative;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            cursor: pointer; transition: transform 0.05s ease-out;
            animation: float 3s ease-in-out infinite; /* Sekin muallaq turish */
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        .character-box:active { transform: scale(0.92) !important; }
        .character-img { width: 85%; height: 85%; pointer-events: none; filter: drop-shadow(0 0 10px var(--blue)); }

        .nav { display: flex; height: 85px; background: #000; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 10px; color: #444; }
        .nav-item.active { color: var(--blue); border-top: 3px solid var(--blue); background: linear-gradient(to top, rgba(0,242,255,0.05), transparent); }

        .pop { position: absolute; color: var(--blue); font-family: 'Orbitron'; font-weight: bold; font-size: 24px; pointer-events: none; animation: fly 0.4s ease-out forwards; z-index: 1000; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="top-hud">
    <div class="bot-name">AIRA PROTOCOL V1.0</div>
    <div class="balance" id="bal">0</div>
    <div class="stats-bar">
        <div style="color:var(--blue)">TAP: +<span id="t-pow">1</span></div>
        <div style="color:var(--pink)">AUTO: +<span id="a-pow">0</span>/s</div>
    </div>
</div>

<div id="core-sec" class="section active">
    <div class="hero-zone">
        <div class="character-box" id="tap-btn">
            <svg class="character-img" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="#4A90E2" fill-opacity="0.8"/>
                <rect x="25" y="35" width="50" height="30" rx="15" fill="#0D1B2A"/>
                <circle cx="40" cy="50" r="6" fill="#00F2FF"/>
                <circle cx="60" cy="50" r="6" fill="#00F2FF"/>
                <rect x="35" y="70" width="30" height="10" rx="2" fill="#0D1B2A"/>
                <path d="M40 70 L40 80 M45 70 L45 80 M50 70 L50 80 M55 70 L55 80 M60 70 L60 80" stroke="#00F2FF" stroke-width="1"/>
            </svg>
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active">CORE</div>
    <div class="nav-item">MARKET</div>
    <div class="nav-item">NFT</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // --- PARALLAX EFFECT ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d', {alpha: false});
    canvas.width = window.innerWidth * 1.2;
    canvas.height = window.innerHeight * 1.2;

    let stars = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.5 + 0.1
    }));

    function drawStars() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00f2ff66';
        stars.forEach(s => {
            ctx.fillRect(s.x, s.y, s.size, s.size);
            s.y += s.speed;
            if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(drawStars);
    }
    drawStars();

    // Telefon qimirlashini tutish
    window.addEventListener('deviceorientation', (event) => {
        const x = event.gamma; // -90 to 90
        const y = event.beta;  // -180 to 180
        
        // Canvasni qarama-qarshi tomonga sekin surish
        const moveX = x / 2;
        const moveY = (y - 45) / 2; // 45 daraja odatiy ushlash burchagi
        
        canvas.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });

    // --- TAP LOGIC ---
    let balance = parseInt(localStorage.getItem('aira_m')) || 0;
    document.getElementById('bal').innerText = balance.toLocaleString();

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        balance += 1;
        document.getElementById('bal').innerText = balance.toLocaleString();
        localStorage.setItem('aira_m', balance);

        const touch = e.touches[0];
        const p = document.createElement('div');
        p.className = 'pop'; p.innerText = '+1';
        p.style.left = touch.clientX + 'px'; p.style.top = touch.clientY + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 400);

        tg.HapticFeedback.impactOccurred('light');
    });
</script>
</body>
</html>
