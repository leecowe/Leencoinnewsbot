<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leenova | Quantum Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #f3ba2f;
            --accent: #ff0055;
            --bg: #08080c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Animated Background Particles */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #08080c 100%);
            z-index: -1;
        }

        /* Top Bar */
        .top-bar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .user-tag {
            background: var(--glass);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 10px;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* Balance Section */
        .main-display {
            text-align: center;
            padding: 20px 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #ego-chatter {
            font-size: 10px;
            color: var(--secondary);
            margin-bottom: 10px;
            height: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .balance-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .balance-group img { width: 40px; }

        .balance {
            font-family: 'Syncopate', sans-serif;
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Progress Bar */
        .progress-container {
            width: 70%;
            margin: 10px auto;
            background: rgba(255,255,255,0.05);
            height: 6px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        #xp-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.4s ease;
        }

        /* Tap Zone */
        .tap-zone {
            position: relative;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-outer {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .main-avatar {
            width: 180px;
            height: 180px;
            z-index: 2;
            transition: transform 0.05s;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.2));
        }

        .main-avatar:active { transform: scale(0.92); }

        /* Bottom Nav */
        .nav-bar {
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(15px);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 15px 10px 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .nav-item.active { opacity: 1; color: var(--primary); }

        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* Floating Tap Text */
        .tap-pop {
            position: fixed;
            color: #fff;
            font-weight: 900;
            font-size: 24px;
            pointer-events: none;
            animation: moveUp 0.8s ease-out forwards;
            z-index: 1000;
            font-family: 'Syncopate', sans-serif;
        }

        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-150px); opacity: 0; }
        }

        /* Sections */
        .page { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .page.active { display: block; }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .admin-panel {
            background: rgba(255, 0, 85, 0.05);
            border: 1px dashed var(--accent);
            border-radius: 16px;
            padding: 15px;
            margin-top: 20px;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary), #00a2ff);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: 700;
            font-family: 'Syncopate';
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="bg-particles"></div>

    <div class="top-bar">
        <div class="user-tag" id="role-ui">Neural User</div>
        <div class="user-tag" style="color: var(--secondary)" id="lvl-ui">LVL 1</div>
    </div>

    <div id="game-page" class="page active">
        <div class="main-display">
            <div id="ego-chatter">QUANTUM LINK ESTABLISHED</div>
            <div class="balance-group">
                <img src="https://cdn-icons-png.flaticon.com/512/8015/8015437.png" alt="coin">
                <div class="balance" id="bal-ui">0.0</div>
            </div>
            <div class="progress-container">
                <div id="xp-progress"></div>
            </div>
            <div style="font-size: 9px; color: #555; margin-top: 5px;">NEXT EVOLUTION AT 100.0</div>
        </div>

        <div class="tap-zone">
            <div class="circle-outer">
                <img src="https://cdn-icons-png.flaticon.com/512/6028/6028676.png" class="main-avatar" id="avatar" onclick="handleTap(event)">
            </div>
        </div>
    </div>

    <div id="stats-page" class="page">
        <h2 style="font-family: 'Syncopate'; font-size: 18px;">System Core</h2>
        <div class="stat-card">
            <div style="color: var(--primary); font-size: 10px;">NEURAL STATUS</div>
            <div id="worth-ui" style="font-size: 24px; font-weight: 700;">NEOPHYTE</div>
        </div>
        <div class="stat-card">
            <div style="color: var(--secondary); font-size: 10px;">TOTAL CLICKS</div>
            <div id="clicks-ui" style="font-size: 24px; font-weight: 700;">0</div>
        </div>
        
        <div id="admin-panel" class="admin-panel" style="display: none;">
            <div style="color: var(--accent); font-size: 10px; margin-bottom: 10px;">ADMIN COMMAND CENTER</div>
            <button class="btn" style="background: var(--primary);" onclick="adminAction('boost')">INJECT 100K</button>
            <button class="btn" style="background: var(--accent); color: #fff;" onclick="adminAction('reset')">WIPE SYSTEM</button>
        </div>
    </div>

    <div id="evolve-page" class="page">
        <h2 style="font-family: 'Syncopate'; font-size: 18px;">Upgrades</h2>
        <div class="stat-card">
            <h3>Neural Evolution</h3>
            <p style="font-size: 12px; color: #888;">Increase your tapping power and unlock new status.</p>
            <button class="btn" id="evo-btn" onclick="evolve()">Unlock Level</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('game-page', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Tap</span>
        </div>
        <div class="nav-item" onclick="showPage('evolve-page', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
            <span>Boost</span>
        </div>
        <div class="nav-item" onclick="showPage('stats-page', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span>Core</span>
        </div>
        <div class="nav-item" onclick="tg.close()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            <span>Exit</span>
        </div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        bal: 0,
        lvl: 1,
        clicks: 0,
        isAdmin: false
    };

    function format(n) {
        if (n < 1000) return n.toFixed(1);
        const u = ["", "k", "M", "B", "T"];
        const i = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, i)).toFixed(1) + u[i];
    }

    // Page Switcher
    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    // Save/Load
    function save() {
        localStorage.setItem('leenova_v2', JSON.stringify(state));
        if(tg.CloudStorage) tg.CloudStorage.setItem('state', JSON.stringify(state));
    }

    function load() {
        const local = localStorage.getItem('leenova_v2');
        if(local) {
            state = JSON.parse(local);
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('bal-ui').innerText = format(state.bal);
        document.getElementById('lvl-ui').innerText = `LVL ${state.lvl}`;
        document.getElementById('clicks-ui').innerText = state.clicks;
        
        let cost = 100 * Math.pow(2.2, state.lvl - 1);
        let progress = Math.min((state.bal / cost) * 100, 100);
        document.getElementById('xp-progress').style.width = progress + "%";

        const statusMap = ["NEOPHYTE", "CYPHER", "REBEL", "GHOST", "OVERLORD", "ARCHITECT"];
        let idx = Math.min(Math.floor(state.lvl / 2), statusMap.length - 1);
        document.getElementById('worth-ui').innerText = statusMap[idx];

        const btn = document.getElementById('evo-btn');
        btn.innerText = state.bal >= cost ? `EVOLVE TO LVL ${state.lvl + 1}` : `NEED ${format(cost)}`;
        btn.disabled = state.bal < cost;

        if (state.lvl >= 10 || state.isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('role-ui').innerText = "SYSTEM ADMIN";
            document.getElementById('role-ui').style.color = "var(--accent)";
        }
        save();
    }

    function handleTap(e) {
        let gain = 1 + (state.lvl * 0.5);
        state.bal += gain;
        state.clicks++;

        // Pop Animation
        const pop = document.createElement('div');
        pop.className = 'tap-pop';
        pop.innerText = `+${gain.toFixed(1)}`;
        pop.style.left = e.clientX + 'px';
        pop.style.top = e.clientY + 'px';
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 800);

        tg.HapticFeedback.impactOccurred('medium');
        updateUI();
    }

    function evolve() {
        let cost = 100 * Math.pow(2.2, state.lvl - 1);
        if(state.bal >= cost) {
            state.bal -= cost;
            state.lvl++;
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }
    }

    function adminAction(act) {
        if(act === 'boost') state.bal += 100000;
        if(act === 'reset') { if(confirm("DELETE EVERYTHING?")) { localStorage.clear(); location.reload(); } }
        updateUI();
    }

    // Auto Passive
    setInterval(() => {
        state.bal += (state.lvl * 0.05);
        updateUI();
    }, 2000);

    load();
</script>
</body>
</html>
