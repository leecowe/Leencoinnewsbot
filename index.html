<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova: Fixed & Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --v: #a100ff; --c: #00f2ff; --bg: #000; }
        
        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden;
            background: radial-gradient(circle at center, #1a001a 0%, #000 100%);
        }

        /* Tepasidagi ochko qismi */
        .header {
            padding: 30px 20px; text-align: center;
            background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--p);
        }
        .score { 
            font-family: 'Fredoka One', cursive; font-size: 70px; margin: 0;
            color: #fff; text-shadow: 0 0 20px var(--p);
        }
        .stats { font-size: 14px; color: var(--c); font-weight: 700; margin-top: 5px; }

        /* Asosiy tugma (Sizning skrinshotdagi yurakcha dizayni) */
        .game-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .main-btn {
            width: 200px; height: 200px; border-radius: 50%;
            background: #220033; border: 4px solid var(--p);
            box-shadow: 0 0 60px var(--p), inset 0 0 20px var(--p);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.1s;
        }
        .main-btn:active { transform: scale(0.92); }
        .main-btn img { width: 100px; filter: drop-shadow(0 0 10px var(--p)); }

        /* Do'kon paneli */
        .shop {
            background: #0a0a0a; border-radius: 40px 40px 0 0;
            padding: 25px; border-top: 3px solid var(--c);
            max-height: 40%; overflow-y: auto;
        }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.05); border-radius: 20px;
            padding: 15px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,0,127,0.2);
        }

        .info h3 { margin: 0; font-size: 16px; color: var(--c); text-transform: uppercase; }
        
        /* Progress Bar */
        .progress-box { width: 120px; height: 6px; background: #222; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--p); transition: 0.3s; }

        .buy-btn {
            background: linear-gradient(45deg, var(--p), var(--v));
            border: none; padding: 12px 18px; border-radius: 12px;
            color: #fff; font-weight: 900; cursor: pointer; min-width: 90px;
        }
        .buy-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Floating Text */
        .tap-pop {
            position: absolute; color: #fff; font-weight: 900; font-size: 32px;
            pointer-events: none; animation: floatUp 0.7s forwards;
            text-shadow: 0 0 10px var(--p);
        }
        @keyframes floatUp { 0% { opacity:1; } 100% { opacity:0; transform: translateY(-100px) scale(1.5); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="score" id="balance">0</h1>
        <div class="stats">TAP: +<span id="t-val">1</span> | AUTO: +<span id="a-val">0</span>/s</div>
    </div>

    <div class="game-zone">
        <div class="main-btn" id="clicker">
            <img src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png">
        </div>
    </div>

    <div class="shop" id="shop-ui"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. DATA: Xatolikka chidamli xotira
        let state = {
            money: parseFloat(localStorage.getItem('ln_money_v4')) || 0,
            lvls: JSON.parse(localStorage.getItem('ln_lvls_v4')) || { s1:0, s2:0, s3:0, s4:0 }
        };

        const config = [
            { id: 's1', name: 'Neko Strike', base: 50, grow: 1.7, val: 2, type: 'tap' },
            { id: 's2', name: 'Kawaii Bot', base: 500, grow: 1.6, val: 15, type: 'auto' },
            { id: 's3', name: 'Cyber Power', base: 3000, grow: 1.6, val: 100, type: 'auto' },
            { id: 's4', name: 'God Mode', base: 15000, grow: 1.8, val: 250, type: 'tap' }
        ];

        function getStats() {
            let tap = 1, auto = 0;
            config.forEach(c => {
                let l = state.lvls[c.id] || 0;
                if(c.type === 'tap') tap += (l * c.val);
                if(c.type === 'auto') auto += (l * c.val);
            });
            return { tap, auto };
        }

        function save() {
            localStorage.setItem('ln_money_v4', state.money);
            localStorage.setItem('ln_lvls_v4', JSON.stringify(state.lvls));
        }

        function updateUI() {
            const s = getStats();
            document.getElementById('balance').innerText = Math.floor(state.money).toLocaleString();
            document.getElementById('t-val').innerText = s.tap;
            document.getElementById('a-val').innerText = s.auto;

            const shop = document.getElementById('shop-ui');
            shop.innerHTML = '';

            let canShow = true;
            config.forEach(item => {
                if (!canShow) return;

                let l = state.lvls[item.id] || 0;
                let price = Math.floor(item.base * Math.pow(item.grow, l));
                let progress = (l / 10) * 100;

                shop.innerHTML += `
                    <div class="upgrade-card">
                        <div class="info">
                            <h3>${item.name} (LVL ${l}/10)</h3>
                            <div class="progress-box"><div class="progress-bar" style="width: ${progress}%"></div></div>
                        </div>
                        ${l < 10 ? 
                            `<button class="buy-btn" onclick="buy('${item.id}', ${price})" ${state.money < price ? 'disabled' : ''}>💰 ${price}</button>` : 
                            `<b style="color:var(--p)">MAX LEVEL</b>`
                        }
                    </div>
                `;
                // Faqat 10 bo'lganda keyingisini chiqarish
                if (l < 10) canShow = false;
            });
            save();
        }

        window.buy = (id, price) => {
            if(state.money >= price && state.lvls[id] < 10) {
                state.money -= price;
                state.lvls[id]++;
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        };

        document.getElementById('clicker').onclick = (e) => {
            const s = getStats();
            state.money += s.tap;
            
            const p = document.createElement('div');
            p.className = 'tap-pop'; p.innerText = `+${s.tap}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        };

        // Avtomatik yig'ish (soniyada 10 marta yangilanadi)
        setInterval(() => {
            const s = getStats();
            if(s.auto > 0) {
                state.money += (s.auto / 10);
                updateUI();
            }
        }, 100);

        updateUI();
    </script>
</body>
</html>
