<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Farm & Stake</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --pink: #ff007f;
            --bg: #050a10;
            --glass: rgba(0, 242, 255, 0.07);
            --border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .test-banner {
            background: rgba(255, 0, 127, 0.2); color: var(--pink); text-align: center;
            font-family: 'Orbitron'; font-size: 9px; padding: 10px; border-bottom: 1px solid var(--pink);
        }

        .header { padding: 20px; text-align: center; }
        .bal-val { font-family: 'Orbitron'; font-size: 40px; font-weight: 900; text-shadow: 0 0 15px var(--primary); }

        .view-content { flex: 1; display: none; padding: 20px; overflow-y: auto; align-items: center; flex-direction: column; }
        .view-content.active { display: flex; }

        /* MINING FARM STYLE */
        .farm-card {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex;
            justify-content: space-between; align-items: center;
        }

        .btn-action {
            background: var(--primary); color: #000; border: none; padding: 12px;
            border-radius: 10px; font-family: 'Orbitron'; font-weight: 900; width: 100%; cursor: pointer;
        }

        .nav { height: 80px; background: #000; display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; font-family: 'Orbitron'; }
        .nav-item.active { color: var(--primary); border-top: 3px solid var(--primary); }
    </style>
</head>
<body>

    <div class="test-banner">⚠️ TEST REJIMI: MA'LUMOTLAR SAQLANMAYDI!</div>

    <header class="header">
        <div class="bal-val" id="total-balance">0</div>
        <div style="font-size: 12px; color: var(--primary); font-family: 'Orbitron';">AUTO MINING: <span id="aps">0.0</span>/s</div>
    </header>

    <div id="view-hack" class="view-content active">
        <div id="status-msg" style="margin-bottom:20px; font-family:'Orbitron'; color:var(--primary);">MININGNI BOSHLANG</div>
        <button class="btn-action" onclick="claimMining()" id="mining-btn">MININGNI YIG'ISH (0)</button>
    </div>

    <div id="view-stake" class="view-content">
        <div class="farm-card" style="flex-direction: column; gap: 10px;">
            <h3 style="margin:0; font-family:'Orbitron'; color:var(--primary);">1 DAQIQA STAKING</h3>
            <p style="font-size:12px; margin:0;">Tikilgan summa 1 daqiqadan so'ng +10% bo'ladi.</p>
            <div id="stake-timer" style="color: var(--pink); font-family: 'Orbitron';">TAYYOR</div>
            <button class="btn-action" onclick="startOneMinStake()">STAKE ALL</button>
        </div>
    </div>

    <div id="view-farm" class="view-content">
        <div class="farm-card">
            <div>
                <b style="color:var(--primary)">GPU UNIT V1</b><br>
                <small>+0.5/s mining</small>
            </div>
            <button onclick="buyFarm(1000, 0.5)" style="background:var(--pink); color:#fff; border:none; padding:8px; border-radius:5px;">1000 COINS</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('hack', this)">CORE</div>
        <div class="nav-item" onclick="switchTab('stake', this)">STAKING</div>
        <div class="nav-item" onclick="switchTab('farm', this)">FARM</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 0;
    let farmAPS = 0; // Auto per second
    let currentMining = 0;
    let isStaking = false;

    // 1. MINING FERMA TIZIMI
    setInterval(() => {
        currentMining += farmAPS / 10;
        document.getElementById('mining-btn').innerText = `MININGNI YIG'ISH (${currentMining.toFixed(1)})`;
        document.getElementById('aps').innerText = farmAPS.toFixed(1);
    }, 100);

    function claimMining() {
        balance += currentMining;
        currentMining = 0;
        updateUI();
        tg.HapticFeedback.impactOccurred('light');
    }

    function buyFarm(cost, power) {
        if(balance >= cost) {
            balance -= cost;
            farmAPS += power;
            updateUI();
            tg.showAlert("Ferma darajasi oshirildi!");
        } else {
            tg.showAlert("Mablag' yetarli emas!");
        }
    }

    // 2. 1 DAQIQA STAKING TIZIMI
    function startOneMinStake() {
        if(isStaking || balance <= 0) return;
        
        let amount = balance;
        balance = 0;
        isStaking = true;
        updateUI();

        let seconds = 60;
        const timer = setInterval(() => {
            seconds--;
            document.getElementById('stake-timer').innerText = seconds + "s";
            if(seconds <= 0) {
                clearInterval(timer);
                balance += amount * 1.1; // +10% foyda
                isStaking = false;
                document.getElementById('stake-timer').innerText = "TAYYOR";
                updateUI();
                tg.showPopup({title: "Staking tugadi", message: "Foyda yig'ildi!"});
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('total-balance').innerText = Math.floor(balance);
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        el.classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
