<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --dark: #01080e; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow: hidden; display: flex; flex-direction: column; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .top-hud { padding: 40px 20px 10px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); text-align: center; z-index: 100; }
        .balance { font-family: 'Orbitron'; font-size: 42px; text-shadow: 0 0 20px var(--blue); margin-bottom: 5px; transition: 0.3s; }
        .balance.boost { color: var(--gold); text-shadow: 0 0 30px var(--gold); transform: scale(1.1); }

        .hero-zone { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        
        .character-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .anime-character {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(0, 255, 255, 0.5);
            z-index: 2;
            box-shadow: 0 0 20px var(--blue);
            animation: floating 3s ease-in-out infinite;
            pointer-events: none;
        }

        .glow-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.3) 0%, transparent 70%);
            filter: blur(15px);
            z-index: 1;
            animation: pulse 2s infinite alternate;
        }

        .neon-ring { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            border: 2px solid var(--blue); 
            border-radius: 50%; 
            box-shadow: 0 0 30px var(--blue); 
            animation: rotate 10s linear infinite; 
            opacity: 0.3; 
            z-index: 0;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            from { opacity: 0.4; transform: scale(0.95); }
            to { opacity: 0.8; transform: scale(1.1); }
        }

        @keyframes rotate { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        #overload-btn { 
            position: absolute; 
            top: 20%; 
            right: 20px; 
            background: rgba(255,0,127,0.2); 
            border: 2px solid var(--pink); 
            color: var(--pink); 
            padding: 10px; 
            border-radius: 12px; 
            font-family: 'Orbitron'; 
            font-size: 10px; 
            display: none; 
            animation: btnPulse 1s infinite; 
            z-index: 500; 
        }

        @keyframes btnPulse { 
            0%, 100% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.5; transform: scale(1.1); } 
        }

        .market-panel { 
            position: fixed; 
            bottom: -75vh; 
            left: 0; 
            width: 100%; 
            height: 75vh; 
            background: rgba(1, 8, 14, 0.98); 
            border-top: 3px solid var(--blue); 
            border-radius: 30px 30px 0 0; 
            transition: 0.5s cubic-bezier(0.1, 0.8, 0.2, 1); 
            z-index: 2000; 
            padding: 25px; 
            overflow-y: auto; 
        }

        .market-panel.open { bottom: 0; }

        .up-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(0,242,255,0.1); 
            border-radius: 15px; 
            padding: 18px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .nav { 
            display: flex; 
            height: 80px; 
            background: #000; 
            border-top: 2px solid var(--blue); 
            z-index: 3000; 
        }

        .nav-item { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Orbitron'; 
            font-size: 10px; 
            color: #444; 
            letter-spacing: 1px; 
        }

        .nav-item.active { 
            color: var(--blue); 
            background: rgba(0,242,255,0.1); 
            border-top: 4px solid var(--blue); 
        }

        .pop { 
            position: absolute; 
            color: var(--blue); 
            font-family: 'Orbitron'; 
            font-weight: bold; 
            pointer-events: none; 
            animation: fly 0.6s forwards; 
            z-index: 4000; 
        }

        @keyframes fly { 
            to { transform: translateY(-120px) scale(1.5); opacity: 0; } 
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="top-hud">
        <div class="balance" id="bal">0</div>
        <div style="display:flex; justify-content:center; gap:15px; font-family:Orbitron; font-size:12px;">
            <div style="color:var(--blue)">TAP: +<span id="t-pow">0</span></div>
            <div style="color:var(--pink)">AUTO: +<span id="a-pow">0</span>/s</div>
        </div>
    </div>

    <div class="hero-zone">
        <button id="overload-btn" onclick="startOverload()">⚡ SYSTEM OVERLOAD (x10)</button>
        
        <div class="character-container" id="tap-btn">
            <div class="glow-ring"></div>
            <div class="neon-ring"></div>
            <img class="anime-character" id="hero-img" src="aira.png">
        </div>
    </div>

    <div id="market-panel" class="market-panel">
        <h3 style="text-align:center; font-family:Orbitron; color:var(--blue); margin-bottom:20px;">CYBER MARKET</h3>
        <div id="up-list"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="toggleM(false)">CITY</div>
        <div class="nav-item" onclick="toggleM(true)">MARKET</div>
        <div class="nav-item">NFT</div>
    </div>

    <script>
    // JavaScript qismi o‘zgarmagan (faqat rasm nomi aira.png qilindi)
    </script>

</body>
</html>
