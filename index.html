<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol - Easy Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --pink: #ff007f;
            --bg: #050a10;
            --border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .score-val { font-family: 'Orbitron'; font-size: 50px; font-weight: 900; text-shadow: 0 0 15px var(--primary); }
        
        .game-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 280px; }
        .tile {
            aspect-ratio: 1; background: rgba(0, 242, 255, 0.05); border: 2px solid var(--border);
            border-radius: 15px; transition: 0.3s; cursor: pointer;
        }
        .tile.active { background: var(--primary); box-shadow: 0 0 30px var(--primary); border-color: #fff; }

        /* Mukofot oynasi */
        #reward-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; background: #0a1a25; border: 2px solid var(--primary); padding: 25px;
            border-radius: 20px; z-index: 100; text-align: center;
        }
        .btn {
            width: 100%; padding: 15px; margin-top: 10px; background: rgba(0,242,255,0.1);
            border: 1px solid var(--primary); color: #fff; border-radius: 10px; font-family: 'Orbitron';
        }

        .nav { height: 80px; background: #000; display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 10px; color: #444; }
        .nav-item.active { color: var(--primary); border-top: 3px solid var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-val" id="score">0</div>
        <div style="font-family:'Orbitron'; color:var(--pink); font-size:12px;">EASY MODE ACTIVE</div>
    </div>

    <div class="game-stage">
        <div class="grid" id="board"></div>
        <p id="hint" style="margin-top:20px; font-family:'Orbitron'; color:var(--primary);">TAYYORMIZMI?</p>
    </div>

    <div id="reward-box">
        <h3 style="font-family:'Orbitron'; color:var(--primary)">HACK SUCCESS!</h3>
        <button class="btn" onclick="claim()">+250 COINS YIG'ISH</button>
    </div>

    <div class="nav">
        <div class="nav-item active">HACK</div>
        <div class="nav-item" onclick="tg.showAlert('Market yopiq')">MARKET</div>
        <div class="nav-item" onclick="tg.showAlert('NFT yopiq')">NFT</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    let score = parseInt(localStorage.getItem('aira_sc')) || 0;
    let sequence = [];
    let userSteps = 0;
    
    // 80% OSONLASHTIRILGAN PARAMETRLAR
    let speed = 1500; // Juda sekin (1.5 sekund)
    let length = 2;   // Atigi 2 ta raqamni eslab qolish kerak

    function init() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        for(let i=0; i<9; i++) {
            let t = document.createElement('div');
            t.className = 'tile';
            t.onclick = () => tap(i, t);
            board.appendChild(t);
        }
        document.getElementById('score').innerText = score;
        setTimeout(play, 1000);
    }

    function play() {
        sequence = [];
        userSteps = 0;
        document.getElementById('hint').innerText = "ESLAB QOLING...";
        
        for(let i=0; i<length; i++) {
            sequence.push(Math.floor(Math.random() * 9));
        }

        let i = 0;
        const interval = setInterval(() => {
            const tiles = document.querySelectorAll('.tile');
            tiles[sequence[i]].classList.add('active');
            setTimeout(() => tiles[sequence[i]].classList.remove('active'), speed * 0.7);
            i++;
            if(i >= sequence.length) {
                clearInterval(interval);
                setTimeout(() => document.getElementById('hint').innerText = "ENDI BOSING!", 500);
            }
        }, speed);
    }

    function tap(id, el) {
        if(id === sequence[userSteps]) {
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 200);
            userSteps++;
            if(userSteps === sequence.length) {
                document.getElementById('reward-box').style.display = 'block';
                tg.HapticFeedback.notificationOccurred('success');
            }
        } else {
            tg.HapticFeedback.notificationOccurred('error');
            document.getElementById('hint').innerText = "XATO! QAYTADAN...";
            setTimeout(play, 1000);
        }
    }

    function claim() {
        score += 250;
        localStorage.setItem('aira_sc', score);
        document.getElementById('score').innerText = score;
        document.getElementById('reward-box').style.display = 'none';
        
        // Qiyinchilik juda sekin o'sadi (deyarli sezilmaydi)
        length = Math.min(5, length + 0.1); 
        
        play();
    }

    init();
</script>
</body>
</html>
