<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Archmage: Neural Evolution</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff007a;
            --secondary: #00f2ff;
            --bg: #05050a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --neon-shadow: 0 0 20px rgba(255, 0, 122, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            overflow: hidden;
        }

        .ambient-glow {
            position: fixed; width: 150vw; height: 150vw;
            background: radial-gradient(circle, rgba(255, 0, 122, 0.08) 0%, transparent 70%);
            top: -50%; left: -25%; z-index: 0; animation: drift 15s infinite alternate;
            pointer-events: none;
        }
        @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(10%, 10%); } }

        #bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* Full Screen Tap Zone */
        #tap-master {
            position: fixed; inset: 0; z-index: 5;
            cursor: pointer;
        }

        .ai-status-bar {
            position: fixed; top: 140px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; z-index: 100; pointer-events: none;
        }
        #ai-thought {
            font-size: 9px; color: var(--secondary); text-transform: uppercase;
            letter-spacing: 2px; font-weight: 800; opacity: 0.7;
            text-shadow: 0 0 10px var(--secondary);
            font-family: 'Syncopate';
        }

        .ui-wrapper { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; flex-direction: column; 
            padding: calc(env(safe-area-inset-top) + 15px) 20px calc(env(safe-area-inset-bottom) + 20px);
            pointer-events: none;
        }
        .ui-wrapper * { pointer-events: auto; }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .chip {
            background: var(--glass); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 100px; font-size: 9px;
            backdrop-filter: blur(25px); font-weight: 700; letter-spacing: 1px;
        }

        .hero { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 10vh; pointer-events: none; }
        .balance-main { 
            font-family: 'Syncopate', sans-serif; font-size: 48px; font-weight: 700;
            background: linear-gradient(180deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 2px; letter-spacing: -2px;
        }
        .income-tag { font-size: 10px; color: var(--secondary); opacity: 0.8; font-weight: 600; }

        .hud-glass {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
            border-radius: 30px; padding: 22px; backdrop-filter: blur(30px);
            margin-bottom: 85px; pointer-events: auto;
        }
        .track { height: 8px; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; margin-top: 8px; }
        .fill { height: 100%; border-radius: 20px; transition: width 0.3s ease; }

        /* Panels */
        .side-panel {
            position: fixed; bottom: -110%; left: 0; width: 100%; height: 85vh;
            background: #08080c; border-top: 2px solid var(--accent);
            border-radius: 40px 40px 0 0; z-index: 1100; padding: 30px 20px;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .side-panel.active { bottom: 0; }
        
        .tab-content { overflow-y: auto; flex-grow: 1; padding-bottom: 40px; }
        .upgrades-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .up-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 18px 12px; border-radius: 24px; text-align: center;
            position: relative; overflow: hidden;
        }
        .up-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--accent), transparent 30%);
            animation: rotate-border 6s linear infinite; opacity: 0.1; z-index: -1;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }

        .up-card h4 { font-size: 10px; opacity: 0.5; margin-bottom: 4px; text-transform: uppercase; }
        .up-card p { font-size: 13px; font-weight: 800; color: var(--secondary); margin-bottom: 10px; }
        
        .price-btn {
            width: 100%; background: #fff; color: #000; padding: 10px; border-radius: 12px;
            font-weight: 900; font-size: 11px; cursor: pointer; border: none;
        }
        .price-btn.disabled { background: #222; color: #555; }

        .dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; background: rgba(10, 10, 15, 0.95);
            border: 1px solid var(--border); border-radius: 28px;
            padding: 8px; display: flex; gap: 8px; z-index: 1000; pointer-events: auto;
        }
        .dock-item { flex: 1; padding: 14px; border-radius: 22px; border: none; background: transparent; color: #555; font-weight: 700; font-size: 12px; }
        .dock-item.active { background: var(--glass); color: #fff; border: 1px solid var(--border); }

        .float-val {
            position: fixed; pointer-events: none; font-weight: 900; color: #fff;
            z-index: 2000; animation: rise 0.8s forwards; font-family: 'Syncopate'; font-size: 18px;
        }
        @keyframes rise { 0% { opacity: 0; transform: translateY(0); } 30% { opacity: 1; } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="tap-master"></div>

    <div class="ai-status-bar">
        <div id="ai-thought">CORE SYNCED</div>
    </div>

    <div class="ui-wrapper">
        <div class="header">
            <div class="chip">NODE: STABLE</div>
            <div class="chip" style="color: var(--secondary); border-color: var(--secondary);">FPS: 60</div>
        </div>

        <div class="hero">
            <h1 class="balance-main" id="bal-ui">0.00</h1>
            <div class="income-tag">AUTO-FARMING: +<span id="pps-ui">0.0</span>/s</div>
        </div>

        <div class="hud-glass">
            <div style="font-size: 11px; letter-spacing: 1px;">ENERGY <span id="mana-text" style="float:right">1000/1000</span></div>
            <div class="track"><div class="fill" id="mana-fill" style="background: var(--secondary); width: 100%; box-shadow: 0 0 10px var(--secondary);"></div></div>
            
            <div style="font-size: 11px; letter-spacing: 1px; margin-top: 15px;">EVOLUTION <span id="lvl-text" style="float:right">LVL 1</span></div>
            <div class="track"><div class="fill" id="xp-fill" style="background: var(--accent); width: 0%; box-shadow: 0 0 10px var(--accent);"></div></div>
        </div>
    </div>

    <div class="side-panel" id="side-panel">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h2 id="panel-title" style="font-family:'Syncopate'; font-size: 18px;">UPGRADES</h2>
            <button onclick="togglePanel(false)" style="background:none; border:none; color:#555; font-size:20px;">✕</button>
        </div>
        
        <div class="tab-content" id="panel-content">
            <div class="upgrades-grid" id="grid-container"></div>
        </div>
    </div>

    <nav class="dock">
        <button class="dock-item active" id="nav-core" onclick="togglePanel(false)">CORE</button>
        <button class="dock-item" id="nav-up" onclick="openTab('upgrades')">TAP</button>
        <button class="dock-item" id="nav-farm" onclick="openTab('farming')">FARM</button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = JSON.parse(localStorage.getItem('ariai_v7')) || {
            bal: 0, 
            pwr: 1.0, 
            pps: 0.0, // Passive Profit per Second
            mana: 1000, 
            maxMana: 1000, 
            lvl: 1, 
            xp: 0,
            upgrades: {},
            farmNodes: {}
        };

        const farmData = [
            { id: 'f1', name: 'Neural Ant', pps: 0.5, price: 150 },
            { id: 'f2', name: 'Data Hive', pps: 2.5, price: 800 },
            { id: 'f3', name: 'Logic Farm', pps: 12.0, price: 4500 },
            { id: 'f4', name: 'Core Miner', pps: 55.0, price: 25000 },
        ];

        const tapData = [
            { id: 't1', name: 'Nano Tips', pwr: 0.5, price: 100 },
            { id: 't2', name: 'Force Link', pwr: 2.0, price: 650 },
            { id: 't3', name: 'Bio Sync', pwr: 8.0, price: 3200 },
        ];

        // 3D Engine
        let scene, camera, renderer, crystal;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geo = new THREE.IcosahedronGeometry(2, 0);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff007a, wireframe: true });
            crystal = new THREE.Mesh(geo, mat);
            scene.add(crystal);
            scene.add(new THREE.PointLight(0xff007a, 2, 20), new THREE.AmbientLight(0xffffff, 0.1));
            camera.position.z = 6;

            function anim() {
                requestAnimationFrame(anim);
                crystal.rotation.y += 0.005;
                crystal.rotation.z += 0.002;
                renderer.render(scene, camera);
            }
            anim();
        }

        // Tap Logic
        document.getElementById('tap-master').addEventListener('touchstart', (e) => {
            if (state.mana < 1) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            const touch = e.touches[0];
            showFx(touch.clientX, touch.clientY, state.pwr);

            state.bal += state.pwr;
            state.mana -= 1.5;
            state.xp += 10;

            if (state.xp >= state.lvl * 800) {
                state.lvl++; state.xp = 0;
                tg.HapticFeedback.notificationOccurred('success');
            }
            tg.HapticFeedback.impactOccurred('light');
            updateUI();
        });

        function showFx(x, y, val) {
            const el = document.createElement('div');
            el.className = 'float-val';
            el.innerHTML = `+${val.toFixed(1)}`;
            el.style.left = `${x - 20}px`; el.style.top = `${y - 20}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
            crystal.scale.set(1.1, 1.1, 1.1);
            setTimeout(() => crystal.scale.set(1, 1, 1), 50);
        }

        function updateUI() {
            document.getElementById('bal-ui').innerText = state.bal.toFixed(2);
            document.getElementById('pps-ui').innerText = state.pps.toFixed(1);
            document.getElementById('mana-text').innerText = `${Math.floor(state.mana)}/1000`;
            document.getElementById('mana-fill').style.width = `${(state.mana/10)}%`;
            document.getElementById('lvl-text').innerText = `LVL ${state.lvl}`;
            document.getElementById('xp-fill').style.width = `${(state.xp/(state.lvl*8))}%`;
            localStorage.setItem('ariai_v7', JSON.stringify(state));
        }

        function togglePanel(show) {
            document.getElementById('side-panel').classList.toggle('active', show);
            document.getElementById('nav-core').classList.toggle('active', !show);
        }

        function openTab(tab) {
            togglePanel(true);
            const container = document.getElementById('grid-container');
            const title = document.getElementById('panel-title');
            container.innerHTML = '';
            
            document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
            
            if (tab === 'upgrades') {
                title.innerText = "TAP SYSTEM";
                document.getElementById('nav-up').classList.add('active');
                tapData.forEach(item => {
                    const count = state.upgrades[item.id] || 0;
                    const price = Math.floor(item.price * Math.pow(1.5, count));
                    const canBuy = state.bal >= price;
                    container.innerHTML += createCard(item.name, `+${item.pwr} PWR`, price, canBuy, `buyTap('${item.id}', ${item.pwr}, ${price})`);
                });
            } else {
                title.innerText = "AUTO FARMING";
                document.getElementById('nav-farm').classList.add('active');
                farmData.forEach(item => {
                    const count = state.farmNodes[item.id] || 0;
                    const price = Math.floor(item.price * Math.pow(1.4, count));
                    const canBuy = state.bal >= price;
                    container.innerHTML += createCard(item.name, `+${item.pps}/s`, price, canBuy, `buyFarm('${item.id}', ${item.pps}, ${price})`);
                });
            }
        }

        function createCard(name, benefit, price, canBuy, func) {
            return `
                <div class="up-card">
                    <h4>${name}</h4>
                    <p>${benefit}</p>
                    <button class="price-btn ${canBuy?'':'disabled'}" onclick="${func}">${price}</button>
                </div>
            `;
        }

        window.buyTap = (id, pwr, price) => {
            if (state.bal >= price) {
                state.bal -= price;
                state.pwr += pwr;
                state.upgrades[id] = (state.upgrades[id] || 0) + 1;
                openTab('upgrades'); updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            }
        };

        window.buyFarm = (id, pps, price) => {
            if (state.bal >= price) {
                state.bal -= price;
                state.pps += pps;
                state.farmNodes[id] = (state.farmNodes[id] || 0) + 1;
                openTab('farming'); updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            }
        };

        // Passive Income Heartbeat
        setInterval(() => {
            if (state.pps > 0) {
                state.bal += (state.pps / 10);
                updateUI();
            }
            if (state.mana < 1000) {
                state.mana = Math.min(1000, state.mana + 1.2);
                updateUI();
            }
        }, 100);

        window.onload = () => { init3D(); updateUI(); };
    </script>
</body>
</html>
