<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova Mega</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --purple: #bc00ff; --gold: #ffcc00; --dark: #01080e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden; background: #01080e; display: flex; flex-direction: column; }

        /* HUD */
        .hud { padding: 45px 25px 20px; background: rgba(0,0,0,0.85); border-bottom: 2px solid var(--blue); position: relative; z-index: 10; }
        .balance { font-family: 'Orbitron'; font-size: 38px; font-weight: 700; text-shadow: 0 0 15px var(--blue); margin: 5px 0; }
        .stats-row { display: flex; gap: 10px; }
        .stat-card { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--blue); padding: 4px 10px; border-radius: 4px; font-family: 'Orbitron'; font-size: 10px; }

        /* WINDOWS */
        .window { display: none; flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .window.active { display: block; }

        /* CITY/CLICKER */
        .click-area { height: 100%; display: flex; justify-content: center; align-items: center; background: url('https://images.alphacoders.com/131/1314605.png') no-repeat center center; background-size: cover; }
        .core-btn { width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--blue); box-shadow: 0 0 30px var(--blue); display: flex; justify-content: center; align-items: center; transition: 0.1s; animation: pulse 4s infinite; }
        .core-btn:active { transform: scale(0.9); }
        .core-btn img { width: 100px; filter: drop-shadow(0 0 10px var(--blue)); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* CARDS & NFT */
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .nft-card { background: rgba(188, 0, 255, 0.05); border: 2px solid var(--purple); border-radius: 15px; padding: 15px; text-align: center; }
        .nft-card.owned { opacity: 0.5; border-color: #444; }
        .nft-icon { font-size: 40px; display: block; margin-bottom: 8px; }

        /* BUTTONS */
        .btn { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--blue); color: #fff; padding: 8px 12px; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; }
        .btn:disabled { opacity: 0.3; border-color: #555; }

        /* NAV */
        .nav { display: flex; background: #000; border-top: 1px solid var(--blue); position: fixed; bottom: 0; width: 100%; }
        .nav-item { flex: 1; padding: 18px; text-align: center; font-family: 'Orbitron'; font-size: 10px; color: #555; }
        .nav-item.active { color: var(--blue); background: rgba(0, 242, 255, 0.1); }

        /* POPUP & MODAL */
        .pop { position: absolute; color: var(--blue); font-family: 'Orbitron'; font-weight: bold; pointer-events: none; animation: fly 0.7s forwards; }
        @keyframes fly { to { transform: translateY(-100px); opacity: 0; } }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #01080e; border: 2px solid var(--blue); padding: 25px; border-radius: 15px; z-index: 2000; text-align: center; width: 85%; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="balance" id="bal">0</div>
        <div class="stats-row">
            <div class="stat-card">T: +<span id="t-pow">1</span></div>
            <div class="stat-card">A: +<span id="a-pow">0</span>/s</div>
        </div>
    </div>

    <div id="win-city" class="window active">
        <div class="click-area"><div class="core-btn" id="tap-btn"><img src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png"></div></div>
    </div>

    <div id="win-up" class="window"><div id="up-list"></div></div>

    <div id="win-nft" class="window"><div class="nft-grid" id="nft-list"></div></div>

    <div id="modal" class="modal">
        <h3 id="modal-title" style="color:var(--blue); font-family:Orbitron;"></h3>
        <p id="modal-msg"></p>
        <button class="btn" onclick="document.getElementById('modal').style.display='none'">COLLECT</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="tab('win-city', this)">CITY</div>
        <div class="nav-item" onclick="tab('win-up', this)">UPGRADES</div>
        <div class="nav-item" onclick="tab('win-nft', this)">NFT MARKET</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();

        let data = {
            m: parseFloat(localStorage.getItem('mega_m')) || 0,
            l: JSON.parse(localStorage.getItem('mega_l')) || {u1:0,u2:0,u3:0,u4:0},
            n: JSON.parse(localStorage.getItem('mega_n')) || [],
            t: parseInt(localStorage.getItem('mega_t')) || Date.now()
        };

        const upgrades = [
            { id: 'u1', name: 'Neural Link', base: 15, val: 2, type: 'tap' },
            { id: 'u2', name: 'Cyber Miner', base: 100, val: 5, type: 'auto' },
            { id: 'u3', name: 'Quantum CPU', base: 1000, val: 50, type: 'auto' },
            { id: 'u4', name: 'Titan Core', base: 5000, val: 100, type: 'tap' }
        ];

        const nftMarket = Array.from({length: 16}, (_, i) => ({
            id: i, name: `KIBER NFT #${i+1}`, cost: (i+1)*10000, p: (i+1)*400, icon: ['🤖','🛰️','👾','💎','🔥','⚡','🪐','🛸','⭐','🌌','🧿','🧬','🌀','🛡️','👑','👹'][i]
        }));

        function getStats() {
            let t = 1, a = 0;
            upgrades.forEach(u => { let lvl = data.l[u.id]; if(u.type==='tap') t += lvl*u.val; else a += lvl*u.val; });
            nftMarket.filter(n => data.n.includes(n.id)).forEach(n => a += n.p);
            return { t, a };
        }

        function render() {
            const s = getStats();
            document.getElementById('bal').innerText = Math.floor(data.m).toLocaleString();
            document.getElementById('t-pow').innerText = s.t;
            document.getElementById('a-pow').innerText = s.a;

            const ul = document.getElementById('up-list');
            ul.innerHTML = '<h2 style="font-family:Orbitron;color:var(--blue)">UPGRADES</h2>';
            upgrades.forEach(u => {
                let lvl = data.l[u.id]; let cost = Math.floor(u.base * Math.pow(1.6, lvl));
                ul.innerHTML += `<div class="card"><div><b>${u.name}</b><br><small>Lvl ${lvl}</small></div>
                <button class="btn" onclick="buyU('${u.id}', ${cost})" ${data.m < cost ? 'disabled' : ''}>${cost.toLocaleString()}</button></div>`;
            });

            const nl = document.getElementById('nft-list');
            nl.innerHTML = '';
            nftMarket.forEach(n => {
                const own = data.n.includes(n.id);
                nl.innerHTML += `<div class="nft-card ${own ? 'owned' : ''}"><span class="nft-icon">${n.icon}</span>
                <small>${n.name}</small><br><b style="color:var(--blue)">+${n.p}/s</b><br><br>
                <button class="btn" style="width:100%" onclick="buyN(${n.id}, ${n.cost})" ${own || data.m < n.cost ? 'disabled' : ''}>
                ${own ? 'OWNED' : n.cost.toLocaleString()}</button></div>`;
            });
            save();
        }

        function save() { localStorage.setItem('mega_m', data.m); localStorage.setItem('mega_l', JSON.stringify(data.l)); localStorage.setItem('mega_n', JSON.stringify(data.n)); localStorage.setItem('mega_t', Date.now()); }

        window.buyU = (id, c) => { if(data.m >= c) { data.m -= c; data.l[id]++; render(); tg.HapticFeedback.impactOccurred('medium'); } };
        window.buyN = (id, c) => { if(data.m >= c) { data.m -= c; data.n.push(id); render(); tg.HapticFeedback.notificationOccurred('success'); } };

        document.getElementById('tap-btn').onclick = (e) => {
            const s = getStats(); data.m += s.t;
            const p = document.createElement('div'); p.className = 'pop'; p.innerText = `+${s.t}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 700);
            render(); tg.HapticFeedback.impactOccurred('light');
        };

        function tab(id, el) { document.querySelectorAll('.window, .nav-item').forEach(x => x.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); render(); }

        setInterval(() => { const s = getStats(); if(s.a > 0) { data.m += s.a/10; document.getElementById('bal').innerText = Math.floor(data.m).toLocaleString(); } }, 100);

        // Offline check
        const offline = () => {
            const s = getStats(); const diff = (Date.now() - data.t)/1000;
            if(diff > 60 && s.a > 0) {
                const earned = Math.floor(diff * s.a * 0.5); data.m += earned;
                document.getElementById('modal-title').innerText = "WELCOME BACK";
                document.getElementById('modal-msg').innerText = `Tizim sizsiz ${earned.toLocaleString()} kredit yig'di!`;
                document.getElementById('modal').style.display = 'block';
            }
        };

        offline(); render();
    </script>
</body>
</html>
