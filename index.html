<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leenova | Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-blue: #0A84FF;
            --ios-green: #32D74B;
            --ios-gold: #d4a017;
            --ios-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'SF Pro Display', sans-serif; }
        body { background: var(--ios-bg); color: var(--text-main); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* View Management */
        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .view.active { display: flex; }

        /* Header */
        .header { padding: 50px 20px 20px; text-align: center; position: relative; }
        .rank-badge { position: absolute; left: 20px; top: 65px; border: 1.5px solid var(--ios-gold); color: var(--ios-gold); padding: 5px 15px; border-radius: 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
        .profit-mini { position: absolute; right: 20px; top: 65px; background: rgba(50, 215, 75, 0.1); color: var(--ios-green); padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; border: 1px solid rgba(50, 215, 75, 0.3); }
        .bal-val { font-size: 48px; font-weight: 800; letter-spacing: -2px; margin-top: 15px; }
        .staked-status { color: var(--ios-gold); font-size: 13px; font-weight: 700; text-transform: uppercase; margin-top: 5px; opacity: 0.9; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; height: 95px; background: #000; display: flex; justify-content: space-around; padding-bottom: 30px; border-top: 0.5px solid var(--ios-border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 10px; font-weight: 600; transition: 0.2s; }
        .nav-item.active { color: var(--ios-gold); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 5px; }

        /* Cards & Buttons */
        .ios-card { background: var(--ios-card); border-radius: 24px; padding: 22px; margin: 12px 20px; border: 1px solid var(--ios-border); }
        .btn-gold { background: var(--ios-gold); color: #000; border: none; padding: 18px; border-radius: 20px; font-weight: 800; width: 100%; font-size: 17px; margin-top: 15px; box-shadow: 0 4px 15px rgba(212, 160, 23, 0.2); }
        .btn-dark { background: #2c2c2e; color: #fff; border: none; padding: 18px; border-radius: 20px; font-weight: 800; width: 100%; font-size: 17px; margin-top: 10px; }
        .btn-dark:disabled { opacity: 0.5; color: var(--text-secondary); }

        /* Market & Collection Grid */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 20px; }
        .market-item { background: var(--ios-card); border-radius: 22px; padding: 20px; text-align: center; border: 1px solid var(--ios-border); }
        .buy-btn { background: var(--ios-gold); color: #000; border: none; width: 100%; padding: 10px; border-radius: 12px; font-weight: 800; margin-top: 12px; }

        /* Popup Notification */
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .popup-content { background: #1c1c1e; width: 80%; border-radius: 35px; padding: 40px 30px; text-align: center; border: 1.5px solid var(--ios-gold); }
        .popup-btn { background: var(--ios-gold); color: #000; border: none; width: 100%; padding: 18px; border-radius: 22px; font-weight: 800; margin-top: 25px; font-size: 18px; }

        /* Tap Effect */
        .tap-anim { animation: tapScale 0.1s ease-out; }
        @keyframes tapScale { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="popup">
    <div class="popup-content">
        <div style="font-size: 50px; margin-bottom: 15px;">🏆</div>
        <p id="popup-text" style="font-size: 19px; font-weight: 700; line-height: 1.5; color: #fff;"></p>
        <button class="popup-btn" onclick="closePopup()">AJOYIB!</button>
    </div>
</div>

<header class="header">
    <div class="rank-badge">VAZIR</div>
    <div class="profit-mini" id="profit-val">+0.0/s</div>
    <div class="bal-val" id="total-bal">0.0</div>
    <div class="staked-status" id="staked-display">STAKED: 0.0</div>
    <div style="font-size:10px; color:var(--ios-gold); font-weight:800; margin-top:10px; letter-spacing:3px">AIRA NEOPHYTE</div>
</header>

<div id="view-core" class="view active">
    <div style="text-align:center; padding: 20px 0;">
        <img id="main-char" src="https://cdn-icons-png.flaticon.com/512/6143/6143004.png" style="width:220px; filter: drop-shadow(0 0 40px rgba(212,160,23,0.3))" onclick="handleTap(event)">
        <div style="margin-top:25px; font-weight:800; font-size:22px; color:var(--ios-gold)">⚡ <span id="energy-val">1000</span> / <span id="max-energy">1000</span></div>
    </div>

    <div class="ios-card">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="font-weight:800; color:var(--text-secondary); font-size:13px">STAKE LVL: <span id="stake-lvl" style="color:#fff">1</span></span>
            <span style="font-size:12px; font-weight:700">6S</span>
        </div>
        <button id="btn-stake-all" class="btn-dark" onclick="stakeAll()">STAKE ALL</button>
        <div style="text-align:right; margin-top:10px; font-size:11px; color:var(--ios-gold); font-weight:700">Upgrade: <span id="stake-cost">1.0k</span></div>
    </div>

    <div class="ios-card">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="font-weight:800; color:var(--text-secondary); font-size:13px">FARM LVL: <span id="farm-lvl" style="color:#fff">1</span></span>
            <span style="font-size:12px; font-weight:700" id="farm-rate">0.0/s</span>
        </div>
        <button class="btn-gold" onclick="upgradeFarm()">UPGRADE FARMING</button>
        <div style="text-align:right; margin-top:10px; font-size:11px; color:rgba(255,255,255,0.5)">Cost: <span id="farm-cost">500.0</span></div>
    </div>
</div>

<div id="view-market" class="view">
    <div class="ios-card" style="background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);">
        <h3 style="margin:0; color:var(--ios-gold)">AUTO-STAKING</h3>
        <p style="font-size:12px; color:var(--text-secondary); margin:10px 0">Har 30 soniyada balansingizni avtomatik stake qiladi.</p>
        <button class="buy-btn" id="btn-autostake" onclick="buyAutoStake()" style="padding:15px">SOTIB OLISH (15.0K)</button>
    </div>
    <div class="market-grid" id="market-items"></div>
</div>

<div id="view-collection" class="view">
    <div class="market-grid" id="collection-items"></div>
    <div style="text-align:center; padding: 20px;">
        <button class="btn-dark" style="width:auto; padding: 15px 40px;">LOAD MORE</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchTab('core', this)">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        CORE
    </div>
    <div class="nav-item" onclick="switchTab('collection', this)">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
        COLLECTION
    </div>
    <div class="nav-item" onclick="switchTab('market', this)">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2z"/></svg>
        MARKET
    </div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Game State
    let state = {
        balance: parseFloat(localStorage.getItem('ln_bal')) || 0,
        staked: parseFloat(localStorage.getItem('ln_staked')) || 0,
        farmLvl: parseInt(localStorage.getItem('ln_farm')) || 1,
        stakeLvl: parseInt(localStorage.getItem('ln_stake')) || 1,
        energy: parseFloat(localStorage.getItem('ln_energy')) || 1000,
        hasAutoStake: localStorage.getItem('ln_auto') === 'true'
    };

    // Formatlash (Rasmdagidek k, m, b, t tizimi)
    function f(n) {
        if (n === 0) return "0.0";
        if (isNaN(n)) return "0.0";
        const units = ["", "k", "m", "b", "t", "q", "Q", "s"];
        const e = Math.floor(Math.log10(Math.abs(n)) / 3);
        if (e <= 0) return n.toFixed(1);
        return (n / Math.pow(10, e * 3)).toFixed(1) + units[e];
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    function handleTap(e) {
        if (state.energy >= 1) {
            const gain = 1 + (state.farmLvl * 0.5);
            state.balance += gain;
            state.energy -= 1;
            
            // Animatsiya
            const char = document.getElementById('main-char');
            char.classList.remove('tap-anim');
            void char.offsetWidth; 
            char.classList.add('tap-anim');
            
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        } else {
            tg.HapticFeedback.notificationOccurred('warning');
        }
    }

    function stakeAll() {
        if (state.balance > 0) {
            state.staked += state.balance;
            state.balance = 0;
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }
    }

    function upgradeFarm() {
        let cost = 500 * Math.pow(1.6, state.farmLvl - 1);
        if (state.balance >= cost) {
            state.balance -= cost;
            state.farmLvl++;
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        } else {
            tg.showAlert("Mablag' yetarli emas!");
        }
    }

    function buyAutoStake() {
        if (state.balance >= 15000 && !state.hasAutoStake) {
            state.balance -= 15000;
            state.hasAutoStake = true;
            localStorage.setItem('ln_auto', 'true');
            tg.showAlert("Auto-Staking faollashdi!");
            updateUI();
        }
    }

    function showPopup(name) {
        document.getElementById('popup-text').innerText = `${name} muvaffaqiyatli sotib olindi!`;
        document.getElementById('popup').style.display = 'flex';
        tg.HapticFeedback.notificationOccurred('success');
    }

    function closePopup() {
        document.getElementById('popup').style.display = 'none';
    }

    function updateUI() {
        document.getElementById('total-bal').innerText = f(state.balance);
        document.getElementById('staked-display').innerText = `STAKED: ${f(state.staked)}`;
        document.getElementById('farm-lvl').innerText = state.farmLvl;
        document.getElementById('stake-lvl').innerText = state.stakeLvl;
        document.getElementById('energy-val').innerText = Math.floor(state.energy);
        document.getElementById('farm-rate').innerText = f(state.farmLvl * 2.5) + "/s";
        document.getElementById('profit-val').innerText = "+" + f(state.farmLvl * 2.5) + "/s";
        document.getElementById('farm-cost').innerText = f(500 * Math.pow(1.6, state.farmLvl - 1));
        document.getElementById('stake-cost').innerText = f(1000 * Math.pow(1.4, state.stakeLvl - 1));
        
        if (state.hasAutoStake) {
            document.getElementById('btn-autostake').innerText = "FAOL";
            document.getElementById('btn-autostake').disabled = true;
        }

        // Save
        localStorage.setItem('ln_bal', state.balance);
        localStorage.setItem('ln_staked', state.staked);
        localStorage.setItem('ln_farm', state.farmLvl);
        localStorage.setItem('ln_stake', state.stakeLvl);
        localStorage.setItem('ln_energy', state.energy);
    }

    // Market & Collection init
    const market = document.getElementById('market-items');
    const collection = document.getElementById('collection-items');
    for (let i = 50; i <= 60; i++) {
        const itemHtml = `
            <div class="market-item">
                <div style="font-size:30px; margin-bottom:10px">${i % 2 === 0 ? '🔱' : '⚔️'}</div>
                <div style="font-size:11px; font-weight:800; color:var(--text-secondary)">TITAN #${i}</div>
                <div style="color:var(--ios-gold); font-weight:800; margin:8px 0">${f(i * 1000000)}</div>
                <button class="buy-btn" onclick="showPopup('TITAN #${i}')">BUY</button>
            </div>`;
        market.innerHTML += itemHtml;
        collection.innerHTML += itemHtml.replace('BUY', 'OWNED');
    }

    // Game Loops
    setInterval(() => {
        // Passive Income
        state.balance += (state.farmLvl * 2.5) / 10;
        // Energy Regen
        if (state.energy < 1000) state.energy += 0.2;
        updateUI();
    }, 100);

    // Auto-Staking loop (30s)
    setInterval(() => {
        if (state.hasAutoStake) stakeAll();
    }, 30000);

    updateUI();
</script>
</body>
</html>
