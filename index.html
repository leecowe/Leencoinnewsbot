<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mega Farm 3D - Test Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #f3ba2f; --bg: #0a0a0a; --card: #161616; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Test Mode Badge */
        .test-badge {
            position: fixed; top: 10px; right: 10px;
            background: red; color: white; font-size: 10px;
            padding: 2px 8px; border-radius: 10px; font-weight: bold; z-index: 1000;
        }

        .header { padding: 25px 20px; text-align: center; }
        .balance-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 44px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--gold); }

        /* 3D Canvas Area */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            cursor: pointer;
            touch-action: none;
        }

        .footer {
            background: var(--card);
            padding: 20px;
            border-radius: 25px 25px 0 0;
            border-top: 1px solid #222;
        }

        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .stat-val { display: block; font-size: 18px; font-weight: bold; }
        .stat-name { font-size: 10px; color: #666; text-transform: uppercase; }

        .upgrade-btn {
            width: 100%;
            background: var(--gold);
            color: black;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-btn:active { transform: scale(0.98); }
        .upgrade-btn:disabled { background: #333; color: #555; }

        .tap-pop {
            position: absolute; font-size: 30px; font-weight: 900; color: white;
            pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 500;
        }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="test-badge">TEST MODE: ON</div>

    <div class="header">
        <p class="balance-label">Jami Tanga</p>
        <div class="balance-value">🪙 <span id="bal">0</span></div>
    </div>

    <div id="canvas-container"></div>

    <div class="footer">
        <div class="stats">
            <div>
                <span class="stat-name">Auto / sek</span>
                <span class="stat-val" id="pps">+0</span>
            </div>
            <div>
                <span class="stat-name">Tap / kuch</span>
                <span class="stat-val" id="pwr">1</span>
            </div>
        </div>

        <button class="upgrade-btn" id="buy">
            <span>UPGRADE FARM 🚜</span>
            <span id="cost">1</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. DATA (TEST REJIM BILAN)
        const isTestMode = true; // Test rejimini yoqish/o'chirish

        let data = JSON.parse(localStorage.getItem('megaFarm3D')) || {
            coins: 0,
            pps: 0,
            pwr: 1,
            cost: isTestMode ? 1 : 50
        };

        // 2. THREE.JS UI KUCHAYTIRISH
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // 3D Model o'rniga dinamik Neon Kub (Traktor ramziy ma'noda)
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xf3ba2f, 
            emissive: 0xf3ba2f,
            emissiveIntensity: 0.5,
            shininess: 100 
        });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;

        // Animatsiya loopi
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.y += 0.01;
            cube.rotation.x += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // 3. O'YIN FUNKSIYALARI
        function ui() {
            document.getElementById('bal').innerText = Math.floor(data.coins).toLocaleString();
            document.getElementById('pps').innerText = "+" + data.pps;
            document.getElementById('pwr').innerText = data.pwr;
            
            // Test rejimida narx doim 1
            const currentCost = isTestMode ? 1 : data.cost;
            document.getElementById('cost').innerText = currentCost;
            document.getElementById('buy').disabled = data.coins < currentCost;
            
            localStorage.setItem('megaFarm3D', JSON.stringify(data));
        }

        // Tapping
        container.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // 3D Effekt: Bosilganda kub kattalashadi
            cube.scale.set(1.2, 1.2, 1.2);
            setTimeout(() => cube.scale.set(1,1,1), 100);

            for (let i = 0; i < e.targetTouches.length; i++) {
                data.coins += data.pwr;
                const t = e.targetTouches[i];
                const pop = document.createElement('div');
                pop.className = 'tap-pop';
                pop.innerText = "+" + data.pwr;
                pop.style.left = t.clientX + "px";
                pop.style.top = t.clientY + "px";
                document.body.appendChild(pop);
                setTimeout(() => pop.remove(), 600);
            }
            tg.HapticFeedback.impactOccurred('light');
            ui();
        });

        // Upgrade
        document.getElementById('buy').onclick = () => {
            const cost = isTestMode ? 1 : data.cost;
            if (data.coins >= cost) {
                data.coins -= cost;
                data.pps += 1;
                data.pwr += 1;
                if(!isTestMode) data.cost = Math.floor(data.cost * 1.6);
                tg.HapticFeedback.notificationOccurred('success');
                ui();
            }
        };

        // Auto earn
        setInterval(() => {
            if (data.pps > 0) {
                data.coins += data.pps;
                ui();
            }
        }, 1000);

        // Window resize fix
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        ui();
    </script>
</body>
</html>
