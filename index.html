<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Astral Mage | Mystic Journey</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --astral-purple: #9d50bb;
            --astral-blue: #6e48aa;
            --neon-cyan: #00f2ff;
            --deep-void: #020408;
            --gold: #ffcc33;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }

        body {
            background: var(--deep-void);
            color: #fff;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Space Background */
        .void-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #120b21 0%, #020408 100%);
            z-index: -1;
        }

        /* Floating Stars */
        .stars-overlay {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* Header UI */
        .header { padding: 50px 20px 10px; display: flex; justify-content: space-between; z-index: 100; }
        .badge {
            background: rgba(110, 72, 170, 0.2);
            border: 1px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 10px 18px;
            font-family: 'Cinzel';
            font-size: 11px;
            backdrop-filter: blur(10px);
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Score Display */
        .score-section { text-align: center; margin-top: 15px; z-index: 10; }
        .score-label { font-size: 11px; font-family: 'Cinzel'; letter-spacing: 3px; color: #a29bfe; }
        .main-balance {
            font-family: 'Cinzel';
            font-size: 55px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.4));
        }

        /* CHARACTER AREA */
        .char-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .magic-seal {
            position: absolute;
            width: 340px; height: 340px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 50%;
            box-shadow: inset 0 0 50px rgba(157, 80, 187, 0.2);
            animation: rotateSeal 20s linear infinite;
        }
        .magic-seal::before {
            content: '';
            position: absolute;
            inset: 20px;
            border: 1px dashed var(--astral-purple);
            border-radius: 50%;
            opacity: 0.5;
        }

        @keyframes rotateSeal { to { transform: rotate(360deg); } }

        .mage-container {
            position: relative;
            width: 300px; height: 300px;
            z-index: 20;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mage-container:active { transform: scale(0.92); }

        .mage-sprite {
            width: 100%; height: 100%;
            object-fit: contain;
            /* Shaxsiy original personaj: Koinot Sehrgari */
            filter: drop-shadow(0 0 30px rgba(157, 80, 187, 0.6));
            animation: mageFloat 4s ease-in-out infinite;
        }

        @keyframes mageFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        /* HUD Bottom */
        .mana-hud { width: 85%; margin: 0 auto 110px; z-index: 10; }
        .mana-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-family: 'Cinzel'; font-size: 10px; color: var(--neon-cyan); }
        .track {
            height: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            overflow: hidden;
        }
        .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--astral-purple), var(--neon-cyan));
            box-shadow: 0 0 20px var(--neon-cyan);
            width: 100%;
            transition: width 0.3s ease;
        }

        /* Shop System */
        .bottom-sheet {
            position: fixed;
            bottom: -100%; left: 0; width: 100%;
            background: rgba(5, 7, 12, 0.98);
            backdrop-filter: blur(25px);
            border-top: 1px solid var(--astral-purple);
            border-radius: 35px 35px 0 0;
            padding: 30px 25px 120px;
            transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        .bottom-sheet.active { bottom: 0; }

        .item {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid rgba(157, 80, 187, 0.1);
        }
        .item-title { font-family: 'Cinzel'; font-size: 14px; color: var(--neon-cyan); }
        .item-desc { font-size: 11px; color: #778899; margin-top: 5px; }
        
        .action-btn {
            background: linear-gradient(135deg, var(--astral-purple), var(--astral-blue));
            color: #fff; font-weight: 800;
            border: none; padding: 12px 25px;
            border-radius: 15px;
            font-size: 13px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .action-btn:disabled { background: #1a1a1a; color: #444; box-shadow: none; }

        /* Nav */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%;
            display: flex; justify-content: space-around;
            padding: 20px 10px 45px;
            background: linear-gradient(to top, #000 70%, transparent);
            z-index: 1100;
        }
        .tab {
            background: none; border: none; color: #fff; opacity: 0.3;
            display: flex; flex-direction: column; align-items: center;
            transition: 0.3s;
        }
        .tab.active { opacity: 1; color: var(--neon-cyan); }
        .tab span { font-size: 10px; font-family: 'Cinzel'; margin-top: 8px; letter-spacing: 1px; }

        /* Effects */
        .pulse-text {
            position: fixed; pointer-events: none;
            color: #fff; font-family: 'Cinzel'; font-weight: 900;
            text-shadow: 0 0 15px var(--neon-cyan);
            animation: pulseOut 0.7s ease-out forwards;
            z-index: 2000;
        }
        @keyframes pulseOut {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-130px) scale(1.6); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="void-bg">
        <div class="stars-overlay"></div>
    </div>

    <div class="header">
        <div class="badge" id="lvl-txt">ARCHMAGE I</div>
        <div class="badge" id="rank-txt" style="border-color: var(--gold); color: var(--gold);">VOID WALKER</div>
    </div>

    <div class="score-section">
        <p class="score-label">COLLECTED ESSENCE</p>
        <h1 class="main-balance" id="bal-ui">0</h1>
    </div>

    <div class="char-area">
        <div class="magic-seal"></div>
        <div class="mage-container" id="tap-target">
            <img src="https://cdna.artstation.com/p/assets/images/images/051/157/202/original/lucas-reiner-wizard-sprite.gif?1656600000" 
                 onerror="this.src='https://files.catbox.moe/p4m9h7.png'" 
                 class="mage-sprite" id="mage-img">
        </div>
    </div>

    <div class="mana-hud">
        <div class="mana-info">
            <span>ASTRAL ENERGY</span>
            <span id="mana-val">1000 / 1000</span>
        </div>
        <div class="track">
            <div class="fill" id="mana-bar"></div>
        </div>
    </div>

    <div class="bottom-sheet" id="shop">
        <div style="width: 50px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 0 auto 30px;"></div>
        <h2 style="font-family: 'Cinzel'; margin-bottom: 25px; text-align: center; color: var(--neon-cyan);">Astral Grimoire</h2>
        
        <div class="item">
            <div>
                <p class="item-title">Void Blast</p>
                <p class="item-desc">Power: +<span id="pwr-stat">1.0</span></p>
            </div>
            <button class="action-btn" id="buy-pwr" onclick="purchase('pwr')">100</button>
        </div>

        <div class="item">
            <div>
                <p class="item-title">Star Core</p>
                <p class="item-desc">Max Mana: +250</p>
            </div>
            <button class="action-btn" id="buy-mana" onclick="purchase('mana')">250</button>
        </div>
    </div>

    <nav class="tab-bar">
        <button class="tab active" id="tab-cast" onclick="view('cast')">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            <span>CHANNEL</span>
        </button>
        <button class="tab" id="tab-shop" onclick="view('shop')">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
            <span>GRIMOIRE</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = "#020408";
        tg.headerColor = "#020408";

        let db = JSON.parse(localStorage.getItem('astral_mage_save')) || {
            bal: 0,
            mana: 1000,
            max: 1000,
            pwr: 1,
            lvl: 1,
            cP: 100,
            cM: 250
        };

        function sync() {
            document.getElementById('bal-ui').innerText = Math.floor(db.bal).toLocaleString();
            document.getElementById('mana-val').innerText = `${Math.floor(db.mana)} / ${db.max}`;
            document.getElementById('mana-bar').style.width = (db.mana / db.max * 100) + "%";
            document.getElementById('lvl-txt').innerText = `ARCHMAGE ${db.lvl}`;
            document.getElementById('pwr-stat').innerText = db.pwr.toFixed(1);
            
            const pBtn = document.getElementById('buy-pwr');
            pBtn.innerText = Math.round(db.cP);
            pBtn.disabled = db.bal < db.cP;

            const mBtn = document.getElementById('buy-mana');
            mBtn.innerText = Math.round(db.cM);
            mBtn.disabled = db.bal < db.cM;

            const rTxt = document.getElementById('rank-txt');
            if(db.lvl > 100) rTxt.innerText = "COSMIC ENTITY";
            else if(db.lvl > 40) rTxt.innerText = "GALAXY MASTER";

            localStorage.setItem('astral_mage_save', JSON.stringify(db));
        }

        const tapTarget = document.getElementById('tap-target');
        tapTarget.addEventListener('touchstart', (e) => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => {
                if(db.mana >= 3) {
                    db.mana -= 3;
                    db.bal += db.pwr;
                    spawnFx(t.clientX, t.clientY);
                    tg.HapticFeedback.impactOccurred('medium');
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            });
            sync();
        });

        function spawnFx(x, y) {
            const el = document.createElement('div');
            el.className = 'pulse-text';
            el.innerText = "+" + db.pwr.toFixed(1);
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        function view(mode) {
            const sh = document.getElementById('shop');
            if(mode === 'shop') {
                sh.classList.add('active');
                document.getElementById('tab-shop').classList.add('active');
                document.getElementById('tab-cast').classList.remove('active');
            } else {
                sh.classList.remove('active');
                document.getElementById('tab-cast').classList.add('active');
                document.getElementById('tab-shop').classList.remove('active');
            }
            tg.HapticFeedback.selectionChanged();
        }

        function purchase(t) {
            if(t === 'pwr' && db.bal >= db.cP) {
                db.bal -= db.cP;
                db.pwr += 0.6;
                db.lvl++;
                db.cP *= 1.8;
            } else if(t === 'mana' && db.bal >= db.cM) {
                db.bal -= db.cM;
                db.max += 300;
                db.mana = db.max;
                db.cM *= 2.0;
            }
            tg.HapticFeedback.notificationOccurred('success');
            sync();
        }

        // Regen
        setInterval(() => {
            if(db.mana < db.max) {
                db.mana = Math.min(db.max, db.mana + (2 + db.lvl * 0.15));
                sync();
            }
        }, 1000);

        sync();
    </script>
</body>
</html>
