<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Frieren | Beyond Journey's End OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --frieren-white: #f8f9fa;
            --frieren-gold: #e5c17d;
            --frieren-purple: #a682ac;
            --mana-cyan: #9de7ff;
            --bg-dark: #0d1117;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background: var(--bg-dark);
            color: var(--frieren-white);
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Magic Background */
        .magic-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1f26 0%, #0d1117 100%);
            z-index: -1;
        }

        /* Rotating Magic Circle */
        .magic-circle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 380px; height: 380px;
            border: 2px solid rgba(157, 231, 255, 0.1);
            border-radius: 50%;
            z-index: 0;
            animation: rotateCircle 30s linear infinite;
        }

        .magic-circle::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 1px solid rgba(229, 193, 125, 0.2);
            border-radius: 50%;
            transform: scale(0.9);
        }

        @keyframes rotateCircle { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Top Bar */
        .header {
            padding: 30px 20px 10px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(157, 231, 255, 0.2);
            font-family: 'Cinzel', serif;
            font-size: 11px;
            color: var(--mana-cyan);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Main Display */
        .main-game {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
        }

        .mana-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .mana-label {
            font-family: 'Cinzel';
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--frieren-gold);
            margin-bottom: 5px;
        }

        .mana-count {
            font-family: 'Cinzel';
            font-size: 52px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(157, 231, 255, 0.4);
        }

        /* Frieren Tap Area */
        .frieren-container {
            position: relative;
            width: 260px; height: 260px;
            cursor: pointer;
        }

        .frieren-avatar {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(166, 130, 172, 0.3));
            transition: transform 0.05s;
            z-index: 10;
            position: relative;
        }

        /* Bottom HUD */
        .hud {
            width: 85%;
            margin-bottom: 40px;
        }

        .mana-bar-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-family: 'Cinzel';
            margin-bottom: 8px;
            color: var(--mana-cyan);
        }

        .mana-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(157, 231, 255, 0.1);
            overflow: hidden;
        }

        .mana-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--mana-cyan), var(--frieren-purple));
            box-shadow: 0 0 15px var(--mana-cyan);
            width: 100%;
            transition: width 0.2s;
        }

        /* Navigation */
        .nav {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(20px);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 15px 10px 35px;
            border-top: 1px solid rgba(229, 193, 125, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.4;
            transition: 0.3s;
            color: var(--frieren-white);
        }

        .nav-item.active { opacity: 1; color: var(--mana-cyan); }
        .nav-item span { font-size: 9px; font-family: 'Cinzel'; margin-top: 5px; }

        /* Floating Rune Effect */
        .rune {
            position: fixed;
            pointer-events: none;
            color: var(--mana-cyan);
            font-family: 'Cinzel';
            font-size: 20px;
            z-index: 100;
            animation: runeFloat 1s ease-out forwards;
        }

        @keyframes runeFloat {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-130px) scale(1.6) rotate(45deg); opacity: 0; }
        }

        /* Screens */
        .screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: calc(100% - 90px);
            background: var(--bg-dark);
            z-index: 100;
            padding: 40px 25px;
        }
        .screen.active { display: block; }
        
        .upgrade-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(229, 193, 125, 0.1);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-spell {
            background: var(--frieren-gold);
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-family: 'Cinzel';
            font-weight: 700;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="magic-canvas"></div>
    <div class="magic-circle"></div>

    <div class="header">
        <div class="stat-badge" id="lvl-ui">MAGE LVL 1</div>
        <div class="stat-badge" id="rank-ui" style="color: var(--frieren-gold);">APPRENTICE</div>
    </div>

    <div id="page-main" class="main-game">
        <div class="mana-display">
            <div class="mana-label">Collected Mana</div>
            <div class="mana-count" id="bal-ui">0.0</div>
        </div>

        <div class="frieren-container" id="frieren-tap">
            <img src="https://www.pngarts.com/files/13/Frieren-PNG-High-Quality-Image.png" class="frieren-avatar" id="avatar-img">
        </div>

        <div class="hud">
            <div class="mana-bar-info">
                <span>⚡ Mana Reserve</span>
                <span id="energy-ui">1000 / 1000</span>
            </div>
            <div class="mana-bar-bg">
                <div class="mana-bar-fill" id="energy-fill"></div>
            </div>
        </div>
    </div>

    <div id="page-grimoire" class="screen">
        <h2 style="font-family: 'Cinzel'; color: var(--frieren-gold);">Library of Spells</h2>
        <div class="upgrade-card">
            <div>
                <div style="font-weight: 700;">Zoltraak (Multi-tap)</div>
                <div style="font-size: 11px; color: #888;">Increase mana per tap</div>
            </div>
            <button class="btn-spell" onclick="upgrade('tap')">Learn</button>
        </div>
        <div class="upgrade-card">
            <div>
                <div style="font-weight: 700;">Mana Source</div>
                <div style="font-size: 11px; color: #888;">Expand mana capacity</div>
            </div>
            <button class="btn-spell" onclick="upgrade('energy')">Expand</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="showScreen('page-main', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            <span>Cast</span>
        </div>
        <div class="nav-item" onclick="showScreen('page-grimoire', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
            <span>Grimoire</span>
        </div>
        <div class="nav-item" onclick="tg.close()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
            <span>Rest</span>
        </div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        bal: 0,
        lvl: 1,
        mana: 1000,
        maxMana: 1000,
        tapPower: 1,
        rankIdx: 0
    };

    const ranks = ["Apprentice", "Novice Mage", "First Class Mage", "Holy Mage", "Sage of Destruction", "Frieren the Slayer"];

    function updateUI() {
        document.getElementById('bal-ui').innerText = state.bal.toFixed(1);
        document.getElementById('energy-ui').innerText = `${Math.floor(state.mana)} / ${state.maxMana}`;
        document.getElementById('energy-fill').style.width = (state.mana / state.maxMana * 100) + "%";
        document.getElementById('lvl-ui').innerText = `MAGE LVL ${state.lvl}`;
        
        state.rankIdx = Math.min(Math.floor(state.lvl / 5), ranks.length - 1);
        document.getElementById('rank-ui').innerText = ranks[state.rankIdx].toUpperCase();
    }

    // Tap Handling
    const tapArea = document.getElementById('frieren-tap');
    tapArea.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touches = e.changedTouches;

        for (let i = 0; i < touches.length; i++) {
            if (state.mana >= state.tapPower) {
                state.mana -= state.tapPower;
                state.bal += state.tapPower;

                // Anim
                const img = document.getElementById('avatar-img');
                img.style.transform = "scale(0.94) translateY(5px)";
                setTimeout(() => img.style.transform = "scale(1) translateY(0)", 80);

                createRune(touches[i].clientX, touches[i].clientY);
                tg.HapticFeedback.impactOccurred('medium');
            } else {
                tg.HapticFeedback.notificationOccurred('warning');
            }
        }
        updateUI();
    });

    function createRune(x, y) {
        const runes = ["✧", "✦", "✡", "❈", "❋"];
        const r = document.createElement('div');
        r.className = 'rune';
        r.innerText = runes[Math.floor(Math.random()*runes.length)] + " +" + state.tapPower;
        r.style.left = x + 'px';
        r.style.top = y + 'px';
        document.body.appendChild(r);
        setTimeout(() => r.remove(), 1000);
    }

    function upgrade(type) {
        let cost = type === 'tap' ? state.tapPower * 100 : state.maxMana * 0.5;
        if (state.bal >= cost) {
            state.bal -= cost;
            if (type === 'tap') state.tapPower++;
            else state.maxMana += 500;
            state.lvl++;
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }
    }

    function showScreen(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        if (id !== 'page-main') document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // Mana Regen
    setInterval(() => {
        if (state.mana < state.maxMana) {
            state.mana = Math.min(state.maxMana, state.mana + (state.maxMana / 1000));
            updateUI();
        }
    }, 1000);

    updateUI();
</script>
</body>
</html>
