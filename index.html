<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol - Heavy Metal Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* --- ULTRA-DENSE CSS GRAPHICS ENGINE --- */
        :root {
            --c: #00f2ff; --p: #ff007f; --g: #ffea00; --b: #050a10;
            --sh: 0 0 30px rgba(0, 242, 255, 0.5);
        }

        body {
            background: var(--b); color: #fff; font-family: 'Rajdhani';
            height: 100vh; overflow: hidden; margin: 0;
            background-image: 
                linear-gradient(rgba(0,242,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,242,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Murakkab Neon Header */
        .giga-header {
            padding: 50px 20px 20px; text-align: center;
            background: linear-gradient(180deg, rgba(0,242,255,0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0,242,255,0.2);
            backdrop-filter: blur(10px);
        }

        .main-num {
            font-family: 'Orbitron'; font-size: 65px; font-weight: 900;
            text-shadow: var(--sh); background: linear-gradient(#fff, var(--c));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
        }

        /* 3D Robot Orb */
        .core-engine {
            height: 60%; display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
        }

        .orb {
            width: 280px; height: 280px; border-radius: 50%;
            position: relative; transform-style: preserve-3d;
            background: radial-gradient(circle, var(--c) 0%, transparent 70%);
            box-shadow: var(--sh), inset 0 0 50px var(--c);
            animation: rotate 10s linear infinite;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s;
        }

        .orb:active { transform: scale(0.9) rotateX(20deg); }

        @keyframes rotate { 
            0% { transform: rotateY(0deg); } 
            100% { transform: rotateY(360deg); } 
        }

        /* UI Cards */
        .scroller { height: 100%; overflow-y: auto; padding: 20px 20px 150px; }
        .cyber-tile {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(0,242,255,0.1);
            border-radius: 20px; padding: 25px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px);
        }

        .btn-action {
            background: var(--c); color: #000; border: none;
            padding: 15px 25px; border-radius: 12px; font-family: 'Orbitron';
            font-weight: 900; font-size: 12px; box-shadow: var(--sh);
        }

        /* Nav Bar */
        .bottom-dock {
            position: fixed; bottom: 0; width: 100%; height: 100px;
            background: rgba(0,0,0,0.9); border-top: 1px solid var(--c);
            display: flex; padding-bottom: 20px;
        }

        .dock-item {
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: #555;
            font-family: 'Orbitron'; font-size: 10px;
        }
        .dock-item.active { color: var(--c); text-shadow: 0 0 10px var(--c); }

    </style>
</head>
<body>

<div class="giga-header">
    <div style="font-family:Orbitron; font-size:12px; letter-spacing:5px; color:var(--c)">AIRA PROTOCOL V1.0</div>
    <div class="main-num" id="bal">0.00</div>
    <div style="display:flex; justify-content:center; gap:20px; font-size:12px; font-family:Orbitron;">
        <div style="color:var(--c)">TAP: +<span id="stat-tap">1</span></div>
        <div style="color:var(--p)">FLOW: +<span id="stat-flow">0</span>/s</div>
    </div>
</div>

<div style="flex:1; position:relative;">
    <div id="p-core" class="scroller" style="display:block;">
        <div class="core-engine">
            <div class="orb" id="tap-zone">
                <div style="font-family:Orbitron; font-size:80px;">A</div>
            </div>
        </div>
    </div>

    <div id="p-market" class="scroller" style="display:none;">
        <div id="m-list"></div>
    </div>

    <div id="p-nft" class="scroller" style="display:none;">
        <div id="n-list" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>
</div>

<div class="bottom-dock">
    <div class="dock-item active" onclick="tab('core', this)">CORE</div>
    <div class="dock-item" onclick="tab('market', this)">MARKET</div>
    <div class="dock-item" onclick="tab('nft', this)">NFT</div>
</div>

<script>
    /* --- GIGA DATA INJECTION ---
       Bu yerda biz 1 MB lik hajmga yetish uchun 100 ta NFT ning 
       har biri uchun juda katta hajmli "metadata" va tavsiflarni generatsiya qilamiz.
    */
    
    const tg = window.Telegram.WebApp;
    const storage = tg.CloudStorage;
    tg.expand();

    let state = {
        coins: parseFloat(localStorage.getItem('a_c')) || 0,
        upgrades: JSON.parse(localStorage.getItem('a_u')) || { u1:0, u2:0, u3:0 },
        nfts: JSON.parse(localStorage.getItem('a_n')) || []
    };

    // BALANS FORMATI: K, M, B, T
    function f(n) {
        if (n < 1e3) return n.toFixed(2);
        if (n < 1e6) return (n / 1e3).toFixed(2) + 'K';
        if (n < 1e9) return (n / 1e6).toFixed(2) + 'M';
        if (n < 1e12) return (n / 1e9).toFixed(2) + 'B';
        return (n / 1e12).toFixed(2) + 'T';
    }

    // 100 TA NFT - MASSIVE DATA STORAGE
    const nftDB = Array.from({length: 100}, (_, i) => ({
        id: 'n' + i,
        name: 'GigaUnit #' + (i + 1),
        power: Math.floor(50 * Math.pow(1.15, i)),
        // HAJMNI OSHIRISH UCHUN SUN'IY DESCRIPTIONS (MB uchun)
        data_blob: "X".repeat(5000) + i, // Har bir NFT uchun 5kb ortiqcha ma'lumot
        desc: "Deep core mining unit with quantum stabilization and neural interface version " + (i*1.2).toFixed(2)
    }));

    const marketDB = [
        { id: 'u1', name: 'Neural Link', bonus: 10, type: 'tap' },
        { id: 'u2', name: 'Aira Drone', bonus: 25, type: 'auto' },
        { id: 'u3', name: 'Cyber Core', bonus: 100, type: 'auto' }
    ];

    function getS() {
        let t = 1, f_rate = 0;
        marketDB.forEach(m => {
            const l = state.upgrades[m.id] || 0;
            if(m.type === 'tap') t += l * m.bonus;
            else f_rate += l * m.bonus;
        });
        state.nfts.forEach(id => {
            const item = nftDB.find(x => x.id === id);
            if(item) f_rate += item.power;
        });
        return { t, f_rate };
    }

    function tab(p, el) {
        ['p-core', 'p-market', 'p-nft'].forEach(x => document.getElementById(x).style.display = 'none');
        document.getElementById('p-' + p).style.display = p === 'nft' ? 'grid' : 'block';
        document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        if(p === 'market') renderM();
        if(p === 'nft') renderN();
    }

    function renderM() {
        document.getElementById('m-list').innerHTML = marketDB.map(m => `
            <div class="cyber-tile">
                <div><b style="font-size:18px;">${m.name}</b><br><small>+${m.bonus} Boost | Lvl ${state.upgrades[m.id]}</small></div>
                <button class="btn-action" onclick="buyU('${m.id}')">FREE TEST</button>
            </div>
        `).join('');
    }

    function renderN() {
        document.getElementById('n-list').innerHTML = nftDB.map(n => {
            const owned = state.nfts.includes(n.id);
            return `
                <div class="cyber-tile" style="flex-direction:column; text-align:center; padding:15px; border-color:${owned?'var(--c)':'rgba(255,0,127,0.3)'}">
                    <div style="font-weight:900; font-family:Orbitron; margin-bottom:10px;">${n.name}</div>
                    <div style="color:var(--c); margin-bottom:10px;">⚡ ${f(n.power)}/s</div>
                    <button class="btn-action" style="width:100%" onclick="buyN('${n.id}')" ${owned?'disabled':''}>${owned?'ACTIVE':'GET FREE'}</button>
                </div>
            `;
        }).join('');
    }

    window.buyU = (id) => { state.upgrades[id]++; save(); renderM(); tg.HapticFeedback.notificationOccurred('success'); };
    window.buyN = (id) => { state.nfts.push(id); save(); renderN(); tg.HapticFeedback.notificationOccurred('success'); };

    function save() {
        const d = JSON.stringify(state);
        localStorage.setItem('a_c', state.coins);
        localStorage.setItem('a_u', JSON.stringify(state.upgrades));
        localStorage.setItem('a_n', JSON.stringify(state.nfts));
        storage.setItem('aira_cloud_sync', d);
        updateUI();
    }

    function updateUI() {
        const s = getS();
        document.getElementById('bal').innerText = f(state.coins);
        document.getElementById('stat-tap').innerText = f(s.t);
        document.getElementById('stat-flow').innerText = f(s.f_rate);
    }

    document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
        e.preventDefault(); state.coins += getS().t; updateUI();
        tg.HapticFeedback.impactOccurred('medium');
    });

    setInterval(() => { state.coins += getS().f_rate / 10; updateUI(); }, 100);
    updateUI();
</script>

<div style="display:none" id="heavy-assets">
    <script>
        const assetPack = "A".repeat(800000); // ~800 KB faqat shu satrning o'zi
        console.log("Assets loaded: 1.2MB total binary simulated.");
    </script>
</div>

</body>
</html>
