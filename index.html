<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mega Farm 3D Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #f3ba2f; --bg: #050505; --panel: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .test-badge {
            position: fixed; top: 15px; left: 15px;
            background: rgba(255, 0, 0, 0.6); backdrop-filter: blur(5px);
            padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 1000;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        /* UI Overlay */
        .ui-container {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; pointer-events: none; z-index: 10;
        }

        .header { padding: 40px 20px; text-align: center; }
        .balance-card {
            background: var(--panel); backdrop-filter: blur(15px);
            display: inline-block; padding: 10px 30px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-value { font-size: 40px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(243, 186, 47, 0.5); }

        #canvas-container { flex-grow: 1; position: relative; touch-action: none; pointer-events: auto; }

        .footer {
            padding: 30px 20px; pointer-events: auto;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        .hud {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
        }
        .stat-card {
            background: var(--panel); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-val { display: block; font-size: 20px; font-weight: 800; color: #fff; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 4px; }

        .upgrade-btn {
            width: 100%; background: var(--gold); color: #000;
            border: none; padding: 20px; border-radius: 22px;
            font-size: 18px; font-weight: 900; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 5px 20px rgba(243, 186, 47, 0.3);
            transition: 0.2s;
        }
        .upgrade-btn:active { transform: scale(0.95); box-shadow: none; }
        .upgrade-btn:disabled { background: #333; color: #666; box-shadow: none; }

        /* Floating numbers */
        .floating-n {
            position: absolute; font-size: 35px; font-weight: 900; color: #fff;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 10px var(--gold);
        }
        @keyframes floatUp {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="test-badge">DEBUG: TEST_MODE_ACTIVE</div>

    <div class="ui-container">
        <div class="header">
            <div class="balance-card">
                <div class="balance-value" id="bal">0</div>
            </div>
        </div>
        
        <div id="canvas-container"></div>

        <div class="footer">
            <div class="hud">
                <div class="stat-card">
                    <span class="stat-val" id="pps">+0</span>
                    <span class="stat-label">Auto / Sec</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="pwr">1</span>
                    <span class="stat-label">Tap / Power</span>
                </div>
            </div>

            <button class="upgrade-btn" id="buy">
                <span>⚡ UPGRADE FARM</span>
                <span id="cost">1</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const isTestMode = true; 

        let data = JSON.parse(localStorage.getItem('megaFarmUltra')) || {
            coins: 0, pps: 0, pwr: 1, cost: 1
        };

        // --- THREE.JS ENGINE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Geometriya (Kattaroq va chiroyliroq kub)
        const geometry = new THREE.IcosahedronGeometry(2, 0); 
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xf3ba2f, emissive: 0x442200, shininess: 100, flatShading: true 
        });
        const mainObj = new THREE.Mesh(geometry, material);
        scene.add(mainObj);

        // Zarralar (Particles) effekti uchun
        const particlesCount = 50;
        const pGeometry = new THREE.BufferGeometry();
        const pMaterial = new THREE.PointsMaterial({ color: 0xf3ba2f, size: 0.1 });
        const pPositions = new Float32Array(particlesCount * 3);
        for(let i=0; i<particlesCount*3; i++) pPositions[i] = (Math.random()-0.5)*10;
        pGeometry.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        const particles = new THREE.Points(pGeometry, pMaterial);
        scene.add(particles);

        // Lights
        const light1 = new THREE.PointLight(0xf3ba2f, 2, 50);
        light1.position.set(5, 5, 5);
        scene.add(light1);
        const light2 = new THREE.AmbientLight(0x404040, 2);
        scene.add(light2);

        camera.position.z = 6;

        function animate() {
            requestAnimationFrame(animate);
            mainObj.rotation.y += 0.01;
            mainObj.rotation.x += 0.005;
            particles.rotation.y -= 0.002;
            renderer.render(scene, camera);
        }
        animate();

        // --- GAME LOGIC ---
        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(data.coins).toLocaleString();
            document.getElementById('pps').innerText = `+${data.pps}`;
            document.getElementById('pwr').innerText = data.pwr;
            const currentCost = isTestMode ? 1 : data.cost;
            document.getElementById('cost').innerText = currentCost;
            document.getElementById('buy').disabled = data.coins < currentCost;
            localStorage.setItem('megaFarmUltra', JSON.stringify(data));
        }

        container.addEventListener('touchstart', (e) => {
            e.preventDefault();
            
            // Effect
            mainObj.scale.set(1.3, 1.3, 1.3);
            setTimeout(() => mainObj.scale.set(1, 1, 1), 100);

            for (let i = 0; i < e.targetTouches.length; i++) {
                data.coins += data.pwr;
                const t = e.targetTouches[i];
                
                // Floating Number
                const n = document.createElement('div');
                n.className = 'floating-n';
                n.innerText = `+${data.pwr}`;
                n.style.left = `${t.clientX}px`;
                n.style.top = `${t.clientY}px`;
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 800);
            }
            tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        });

        document.getElementById('buy').onclick = () => {
            const cost = isTestMode ? 1 : data.cost;
            if (data.coins >= cost) {
                data.coins -= cost;
                data.pps += 1;
                data.pwr += 1;
                if(!isTestMode) data.cost = Math.floor(data.cost * 1.7);
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        };

        setInterval(() => {
            if (data.pps > 0) {
                data.coins += data.pps;
                updateUI();
            }
        }, 1000);

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        updateUI();
    </script>
</body>
</html>
