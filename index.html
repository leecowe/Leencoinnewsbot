<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Ultra Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00f2ff; --accent: #7000ff; --bg: #0a0b10; 
            --card-bg: rgba(22, 24, 33, 0.9); --text-main: #ffffff; 
            --text-dim: #a0a0b0; --border-color: rgba(255, 255, 255, 0.08); 
            --gold: #ffcf4b; --success: #4cd137; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Outfit', sans-serif; margin: 0; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* UI Elements */
        .header { 
            padding: 45px 20px 25px; text-align: center; 
            background: radial-gradient(circle at top, rgba(0, 242, 255, 0.1) 0%, var(--bg) 100%); 
            border-bottom: 1px solid var(--border-color); 
        }

        .bal-val { font-size: 40px; font-weight: 800; letter-spacing: -1px; margin: 10px 0; display: block; text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }

        .rank-card { 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); 
            border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border-color); 
        }

        .progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--primary)); width: 0%; transition: width 0.5s ease; box-shadow: 0 0 15px var(--primary); }
        
        .rank-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; text-transform: uppercase; }

        .view-content { flex: 1; display: none; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .view-content.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-upgrade { 
            background: var(--card-bg); border: 1px solid var(--border-color); color: #fff; 
            padding: 15px; border-radius: 18px; width: 100%; margin-top: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-upgrade:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

        /* Leaderboard */
        .leader-item { 
            display: flex; align-items: center; padding: 12px 16px; 
            background: var(--card-bg); border-radius: 16px; 
            border: 1px solid var(--border-color); margin-bottom: 10px; 
        }
        .leader-item.me { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .leader-rank { width: 30px; font-weight: 800; color: var(--text-dim); }
        .leader-avatar { 
            width: 36px; height: 36px; background: linear-gradient(45deg, var(--accent), var(--primary)); 
            border-radius: 10px; margin-right: 12px; display: flex; align-items: center; 
            justify-content: center; font-size: 12px; font-weight: 800; color: #fff; 
        }
        .leader-info { flex: 1; }
        .leader-name { font-size: 14px; font-weight: 600; display: block; }
        .leader-score { font-size: 12px; color: var(--gold); font-weight: 800; }

        .nav { height: 75px; background: rgba(13, 15, 23, 0.95); display: flex; border-top: 1px solid var(--border-color); backdrop-filter: blur(10px); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #4e5471; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { margin-bottom: 4px; fill: currentColor; transition: 0.3s; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <header class="header">
        <div id="user-display-name" style="font-size: 12px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600;">@username</div>
        <div id="career-badge" style="font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 2px;">LOADING...</div>
        <span class="bal-val" id="total-bal">0</span>
        <div style="font-size: 12px; color: var(--success); font-weight: 700;" id="profit-val">+0/s</div>
    </header>

    <div id="view-core" class="view-content active">
        <div class="rank-card">
            <div class="rank-labels">
                <span id="current-rank-name">Bronze</span>
                <span id="next-rank-name" style="color: var(--text-dim)">Silver</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="rank-progress"></div>
            </div>
            <div style="text-align: center; font-size: 10px; color: var(--text-dim);">
                KEYINGI RANK: <span id="needed-bal" style="color: #fff">0</span> AIRA
            </div>
        </div>

        <button class="btn-upgrade" onclick="upgradeFarm()">
            <span>🚜 FARMING LVL <b id="farm-lvl">1</b></span>
            <span style="color: var(--primary)" id="farm-cost">500</span>
        </button>

        <button class="btn-upgrade" onclick="upgradeStake()">
            <span>🏦 STAKING LVL <b id="stake-lvl">0</b></span>
            <span style="color: var(--primary)" id="stake-cost">500</span>
        </button>

        <div style="margin-top: 20px;">
            <button id="stake-btn" onclick="startStake()" style="width: 100%; padding: 18px; border-radius: 20px; border: none; background: var(--primary); color: #000; font-weight: 800; text-transform: uppercase; font-size: 14px; cursor: pointer;">
                STAKE ALL (<span id="stake-timer">TAYYOR</span>)
            </button>
        </div>
    </div>

    <div id="view-rank" class="view-content">
        <h3 style="margin: 0 0 5px 0; font-weight: 800;">GLOBAL REYTING</h3>
        <p style="font-size: 12px; color: var(--text-dim); margin-bottom: 20px;">Eng yaxshi natija ko'rsatganlar</p>
        <div class="leader-list" id="leader-list"></div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('core', this)">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            TERMINAL
        </div>
        <div class="nav-item" onclick="switchTab('rank', this)">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M16 11V5h4v6h-4zm-6 4V9h4v6h-4zm-6 4V13h4v6H4z"/></svg>
            REYTINQ
        </div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // 1. Foydalanuvchi Identity mantig'i
    const user = tg.initDataUnsafe?.user || { first_name: "O'yinchi", last_name: "", username: "Guest" };
    const fullName = (user.first_name + " " + (user.last_name || "")).trim();
    const userInitials = (user.first_name[0] + (user.last_name ? user.last_name[0] : (user.first_name[1] || "P"))).toUpperCase();
    
    document.getElementById('user-display-name').innerText = user.username ? "@" + user.username : fullName;

    // 2. O'yin holati
    let balance = parseFloat(localStorage.getItem('aira_bal')) || 0;
    let farmLevel = parseInt(localStorage.getItem('aira_farm')) || 1;
    let stakeLevel = parseInt(localStorage.getItem('aira_stake')) || 0;
    let isStaking = false;

    const ranks = [
        { name: "BRONZE", min: 0, max: 10000, color: "#cd7f32" },
        { name: "SILVER", min: 10000, max: 100000, color: "#c0c0c0" },
        { name: "GOLD", min: 100000, max: 1000000, color: "#ffcf4b" },
        { name: "DIAMOND", min: 1000000, max: 10000000, color: "#00f2ff" },
        { name: "IMPERATOR", min: 10000000, max: 999999999, color: "#ff00ff" }
    ];

    function f(n) {
        if (n < 1000) return Math.floor(n).toString();
        const s = ["", "K", "M", "B", "T"];
        const e = Math.floor(Math.log10(n) / 3);
        const val = n / Math.pow(1000, e);
        return (val % 1 === 0 ? val : val.toFixed(1)) + s[e];
    }

    function updateRankUX() {
        let currentRank = ranks[0], nextRank = ranks[1];
        for (let i = 0; i < ranks.length; i++) {
            if (balance >= ranks[i].min) {
                currentRank = ranks[i];
                nextRank = ranks[i + 1] || ranks[i];
            }
        }
        document.getElementById('career-badge').innerText = currentRank.name;
        document.getElementById('career-badge').style.color = currentRank.color;
        document.getElementById('current-rank-name').innerText = currentRank.name;
        document.getElementById('next-rank-name').innerText = nextRank.name;

        let progress = ((balance - currentRank.min) / (nextRank.max - currentRank.min)) * 100;
        document.getElementById('rank-progress').style.width = Math.min(progress, 100) + "%";
        document.getElementById('needed-bal').innerText = f(Math.max(nextRank.max - balance, 0));
    }

    // 3. O'yin mexanikasi
    setInterval(() => {
        let aps = 50 * Math.pow(1.15, farmLevel - 1);
        balance += (aps / 10);
        document.getElementById('total-bal').innerText = f(balance);
        document.getElementById('profit-val').innerText = "+" + f(aps) + "/s";
        updateRankUX();
        if (Math.random() > 0.98) save(); 
    }, 100);

    function startStake() {
        if (isStaking || balance < 10) return;
        tg.HapticFeedback.impactOccurred('medium');
        isStaking = true;
        let amt = balance; balance = 0;
        document.getElementById('stake-btn').style.opacity = "0.5";
        document.getElementById('stake-btn').disabled = true;
        let t = 10;
        const count = setInterval(() => {
            t--;
            document.getElementById('stake-timer').innerText = t + "S";
            if(t <= 0) {
                clearInterval(count);
                balance += amt * (1.05 + (stakeLevel * 0.02));
                isStaking = false;
                document.getElementById('stake-timer').innerText = "TAYYOR";
                document.getElementById('stake-btn').style.opacity = "1";
                document.getElementById('stake-btn').disabled = false;
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        }, 1000);
    }

    function upgradeFarm() {
        let cost = 500 * Math.pow(1.18, farmLevel - 1);
        if(balance >= cost) {
            balance -= cost; farmLevel++;
            tg.HapticFeedback.impactOccurred('light');
            updateUI();
        } else tg.showAlert("Mablag' yetarli emas!");
    }

    function upgradeStake() {
        let cost = 500 * Math.pow(1.2, stakeLevel);
        if(balance >= cost) {
            balance -= cost; stakeLevel++;
            tg.HapticFeedback.impactOccurred('light');
            updateUI();
        } else tg.showAlert("Mablag' yetarli emas!");
    }

    function updateUI() {
        document.getElementById('farm-lvl').innerText = farmLevel;
        document.getElementById('farm-cost').innerText = f(500 * Math.pow(1.18, farmLevel - 1));
        document.getElementById('stake-lvl').innerText = stakeLevel;
        document.getElementById('stake-cost').innerText = f(500 * Math.pow(1.2, stakeLevel));
        save();
    }

    // 4. Dinamik Leaderboard (Sizni ro'yxatga qo'shadi)
    function loadLeaderboard() {
        const list = document.getElementById('leader-list');
        const fakePlayers = [
            { n: "CryptoWhale", s: 50000000, i: "CW" },
            { n: "Aira_Dev", s: 12000000, i: "AD" },
            { n: "Shadow_Hunter", s: 1500000, i: "SH" },
            { n: "NodeRunner", s: 800000, i: "NR" }
        ];

        const allPlayers = [...fakePlayers, { n: fullName, s: balance, i: userInitials, me: true }];
        allPlayers.sort((a,b) => b.s - a.s);

        list.innerHTML = allPlayers.map((p, i) => `
            <div class="leader-item ${p.me ? 'me' : ''}">
                <div class="leader-rank">#${i+1}</div>
                <div class="leader-avatar">${p.i}</div>
                <div class="leader-info">
                    <span class="leader-name">${p.n} ${p.me ? '(Siz)' : ''}</span>
                    <span class="leader-score">${f(p.s)} AIRA</span>
                </div>
            </div>
        `).join('');
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        el.classList.add('active');
        if(tab === 'rank') loadLeaderboard();
        tg.HapticFeedback.impactOccurred('light');
    }

    function save() {
        localStorage.setItem('aira_bal', balance);
        localStorage.setItem('aira_farm', farmLevel);
        localStorage.setItem('aira_stake', stakeLevel);
    }

    // Birinchi yuklash
    window.onload = () => { updateUI(); updateRankUX(); };
</script>
</body>
</html>
