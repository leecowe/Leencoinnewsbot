<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova Anime: Eternal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --c: #00e5ff; --v: #7000ff; }
        
        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            font-family: 'Poppins', sans-serif; color: #fff; overflow: hidden;
            /* Anime Fon: Kiber-shahar tuni */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.alphacoders.com/131/1314605.png') no-repeat center center;
            background-size: cover;
        }

        .header {
            padding: 30px 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--p); text-align: center;
        }
        .score { 
            font-family: 'Fredoka One', cursive; font-size: 50px; margin: 0;
            color: #fff; text-shadow: 0 0 15px var(--p), 0 0 30px var(--v);
        }
        .stats { font-size: 12px; color: var(--c); letter-spacing: 1.5px; margin-top: 5px; }

        .game-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .target-btn {
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, var(--p), var(--v));
            border: 6px solid #fff; box-shadow: 0 0 40px var(--p);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.1s;
        }
        .target-btn:active { transform: scale(0.9) rotate(-3deg); }
        .target-btn img { width: 130px; filter: drop-shadow(0 0 10px #fff); }

        .anime-shop {
            background: rgba(0,0,0,0.85); border-radius: 35px 35px 0 0;
            padding: 25px; border-top: 4px solid var(--c); max-height: 45%; overflow-y: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.07); border-radius: 20px;
            padding: 15px; margin-bottom: 12px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(0, 229, 255, 0.2);
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        .card-info h3 { margin: 0; font-size: 16px; color: var(--p); text-transform: uppercase; }
        .card-info p { margin: 3px 0 0; font-size: 11px; color: #ccc; }

        .buy-btn {
            background: linear-gradient(45deg, var(--c), var(--v));
            border: none; padding: 12px 20px; border-radius: 14px;
            color: #fff; font-weight: 900; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.3);
        }
        .buy-btn:disabled { filter: grayscale(1); opacity: 0.4; }
        .max-tag { color: var(--p); font-weight: 900; font-size: 14px; }

        .pop {
            position: absolute; color: #fff; font-weight: 900; font-size: 32px;
            pointer-events: none; animation: popUp 0.6s ease-out forwards;
            text-shadow: 2px 2px 0px var(--p);
        }
        @keyframes popUp { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="score" id="score">0</h1>
        <div class="stats">ENERGY: +<span id="pps">0</span>/SEC | TAP: +<span id="pwt">1</span></div>
    </div>

    <div class="game-zone">
        <div class="target-btn" id="main-click">
            <img src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png">
        </div>
    </div>

    <div class="anime-shop" id="shop">
        </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Eternal Data: Brauzer yangilansa ham o'chmaydi
        let data = {
            score: parseFloat(localStorage.getItem('ln_score')) || 0,
            lvls: JSON.parse(localStorage.getItem('ln_lvls')) || { s1: 0, s2: 0, s3: 0 }
        };

        const config = [
            { id: 's1', name: 'Kawaii Power', desc: 'Tap kuchini oshiradi', base: 50, mult: 1.8, val: 2, type: 'tap' },
            { id: 's2', name: 'Neko Miner', desc: 'Avto-yig‘ish +15/s', base: 500, mult: 1.6, val: 15, type: 'auto' },
            { id: 's3', name: 'Cyber Sensei', desc: 'Global daromad +100/s', base: 2500, mult: 1.7, val: 100, type: 'auto' }
        ];

        function calculateStats() {
            let tap = 1;
            let auto = 0;
            config.forEach(item => {
                let l = data.lvls[item.id] || 0;
                if(item.type === 'tap') tap += (l * item.val);
                if(item.type === 'auto') auto += (l * item.val);
            });
            return { tap, auto };
        }

        function save() {
            localStorage.setItem('ln_score', data.score);
            localStorage.setItem('ln_lvls', JSON.stringify(data.lvls));
        }

        function render() {
            let stats = calculateStats();
            document.getElementById('score').innerText = Math.floor(data.score).toLocaleString();
            document.getElementById('pps').innerText = stats.auto;
            document.getElementById('pwt').innerText = stats.tap;

            const shop = document.getElementById('shop');
            shop.innerHTML = '';

            let canShowNext = true;
            config.forEach((item, index) => {
                if (!canShowNext) return;

                let l = data.lvls[item.id] || 0;
                let price = Math.floor(item.base * Math.pow(item.mult, l));
                
                let cardHTML = `
                    <div class="card">
                        <div class="card-info">
                            <h3>${item.name} [Lvl ${l}/10]</h3>
                            <p>${item.desc}</p>
                        </div>
                        ${l < 10 ? 
                            `<button class="buy-btn" onclick="buy('${item.id}', ${price})" ${data.score < price ? 'disabled' : ''}>💰 ${price}</button>` : 
                            `<span class="max-tag">MAXED OUT ✨</span>`
                        }
                    </div>
                `;
                shop.innerHTML += cardHTML;

                // AGAR JORIY ELEMENT 10 BO'LMASA, KEYINGISINI KO'RSATMA
                if (l < 10) canShowNext = false;
            });
            save();
        }

        function buy(id, price) {
            if(data.score >= price && data.lvls[id] < 10) {
                data.score -= price;
                data.lvls[id]++;
                tg.HapticFeedback.notificationOccurred('success');
                render();
            }
        }

        document.getElementById('main-click').onclick = (e) => {
            let stats = calculateStats();
            data.score += stats.tap;
            
            let p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${stats.tap}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            
            tg.HapticFeedback.impactOccurred('medium');
            render();
        };

        setInterval(() => {
            let stats = calculateStats();
            data.score += (stats.auto / 10);
            render();
        }, 100);

        render();
    </script>
</body>
</html>
