<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leencoin: Cyber Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: #020205; color: #fff; text-align: center;
            font-family: 'Rajdhani', sans-serif; margin: 0; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* Dinamik Dashboard */
        .dashboard {
            padding: 25px; background: linear-gradient(180deg, rgba(0, 242, 255, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid var(--glass); backdrop-filter: blur(15px);
        }
        .score-main { font-size: 60px; font-weight: 700; color: var(--gold); text-shadow: 0 0 30px var(--gold); margin: 0; }
        .income-stat { font-size: 14px; color: var(--cyan); letter-spacing: 2px; margin-top: 5px; }

        /* Kiber Kristal Maydoni */
        .stage { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .main-core {
            width: 240px; height: 240px; position: relative;
            background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .main-core img { width: 140px; filter: drop-shadow(0 0 20px var(--cyan)); }
        .main-core:active { transform: scale(0.9) rotate(-5deg); }

        /* Ultra Do'kon (Glassmorphism) */
        .shop-container {
            padding: 20px; background: rgba(10, 10, 15, 0.95);
            border-top: 2px solid var(--purple); border-radius: 40px 40px 0 0;
            max-height: 40%; overflow-y: auto;
        }
        .shop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .shop-header h2 { font-size: 18px; color: var(--purple); text-transform: uppercase; margin: 0; }

        .item-card {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .item-card:active { border-color: var(--cyan); background: rgba(0, 242, 255, 0.05); }
        .item-info { text-align: left; }
        .item-info h3 { margin: 0; font-size: 16px; color: var(--cyan); }
        .item-info p { margin: 3px 0 0; font-size: 12px; color: #888; }

        .price-btn {
            background: linear-gradient(90deg, var(--purple), #8a2be2);
            color: #fff; border: none; padding: 10px 20px; border-radius: 12px;
            font-weight: 700; cursor: pointer;
        }
        .price-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Particle Text */
        .particle { position: absolute; color: #fff; font-weight: 700; pointer-events: none; animation: floatUp 0.8s forwards; }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        .core-lvl-btn {
            width: 100%; padding: 15px; background: var(--cyan); color: #000;
            border: none; border-radius: 15px; font-weight: 700; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1 class="score-main" id="balance">0</h1>
        <div class="income-stat">⚡ SYSTEM PROFIT: +<span id="pps">0</span>/SEC</div>
    </div>

    <div class="stage">
        <div class="main-core" id="core-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/6530/6530342.png" alt="core">
        </div>
    </div>

    <div class="shop-container">
        <div id="setup-phase">
            <button class="core-lvl-btn" id="core-up-btn" onclick="upgradeCore()">
                UPGRADE CORE LVL (<span id="core-lvl">1</span>/10) - 💰 <span id="core-cost">50</span>
            </button>
        </div>

        <div id="elite-shop" style="display: none;">
            <div class="shop-header">
                <h2>Cybernetic Upgrades</h2>
                <span style="color: var(--gold); font-size: 12px;">VIP STATUS</span>
            </div>

            <div class="item-card">
                <div class="item-info">
                    <h3>NEURAL MINER</h3>
                    <p>+50 ochko har soniyada</p>
                </div>
                <button class="price-btn" onclick="buyElite(1, 1000, 50)">💰 1K</button>
            </div>

            <div class="item-card">
                <div class="item-info">
                    <h3>QUANTUM CPU</h3>
                    <p>Tap kuchini +20 ga oshirish</p>
                </div>
                <button class="price-btn" onclick="buyElite(2, 5000, 20)">💰 5K</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseInt(localStorage.getItem('sc_v2')) || 0;
        let coreLvl = parseInt(localStorage.getItem('cl_v2')) || 1;
        let tapPwr = parseInt(localStorage.getItem('tp_v2')) || 1;
        let autoRate = parseInt(localStorage.getItem('ar_v2')) || 0;

        function update() {
            document.getElementById('balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('pps').innerText = autoRate;
            document.getElementById('core-lvl').innerText = coreLvl;
            
            let cost = Math.floor(50 * Math.pow(1.6, coreLvl - 1));
            document.getElementById('core-cost').innerText = cost;

            if(coreLvl >= 10) {
                document.getElementById('setup-phase').style.display = 'none';
                document.getElementById('elite-shop').style.display = 'block';
            }
            save();
        }

        function save() {
            localStorage.setItem('sc_v2', score);
            localStorage.setItem('cl_v2', coreLvl);
            localStorage.setItem('tp_v2', tapPwr);
            localStorage.setItem('ar_v2', autoRate);
        }

        document.getElementById('core-btn').onclick = (e) => {
            score += tapPwr;
            spawnParticle(e);
            tg.HapticFeedback.impactOccurred('light');
            update();
        };

        function spawnParticle(e) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = `+${tapPwr}`;
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        function upgradeCore() {
            let cost = parseInt(document.getElementById('core-cost').innerText);
            if(score >= cost && coreLvl < 10) {
                score -= cost;
                coreLvl++;
                tapPwr += 2;
                autoRate += 5;
                update();
            }
        }

        function buyElite(id, cost, val) {
            if(score >= cost) {
                score -= cost;
                if(id === 1) autoRate += val;
                if(id === 2) tapPwr += val;
                tg.HapticFeedback.notificationOccurred('success');
                update();
            }
        }

        setInterval(() => {
            score += autoRate;
            update();
        }, 1000);

        update();
    </script>
</body>
</html>
