<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova Cyber City</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --dark: #020b16; }

        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden;
            /* Fon: Skrinshotdagi kiber-shahar */
            background: linear-gradient(rgba(2, 11, 22, 0.75), rgba(2, 11, 22, 0.85)), 
                        url('https://images.alphacoders.com/131/1314605.png') no-repeat center center;
            background-size: cover;
        }

        /* 1. TOP HUD: Skrinshot 14 va 15 dagi kabi dizayn */
        .hud-top {
            padding: 30px 20px 10px 20px;
            background: linear-gradient(to bottom, rgba(0,242,255,0.1), transparent);
        }
        .credits-container { border-left: 3px solid var(--blue); padding-left: 15px; position: relative; }
        .credits-label { font-family: 'Orbitron'; font-size: 10px; color: var(--blue); letter-spacing: 2px; }
        .credits-value { font-family: 'Orbitron'; font-size: 36px; text-shadow: 0 0 15px var(--blue); }
        .settings-icon { position: absolute; right: 0; top: 0; font-size: 20px; color: var(--blue); opacity: 0.7; }

        .stat-chips { display: flex; gap: 10px; margin-top: 15px; }
        .chip { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--blue); padding: 3px 12px; font-size: 11px; border-radius: 4px; font-family: 'Orbitron'; }

        /* 2. CENTER: Clicker Core (Skrinshot 14/15 dagi kvadratli effekt) */
        .game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .core-wrapper { width: 220px; height: 220px; position: relative; cursor: pointer; }
        .core-circle { 
            position: absolute; inset: 0; border: 2px solid var(--blue); border-radius: 50%;
            box-shadow: 0 0 40px var(--blue), inset 0 0 20px var(--blue);
            animation: pulse 2s infinite;
        }
        .core-inner-box {
            position: absolute; inset: 50px; background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--blue); border-radius: 12px; transform: rotate(45deg);
            display: flex; justify-content: center; align-items: center;
        }
        .core-inner-box img { width: 60px; transform: rotate(-45deg); filter: drop-shadow(0 0 10px var(--blue)); }

        /* 3. SHOP: Skrinshotdagi "System Upgrades" qismi */
        .shop-container {
            background: rgba(2, 11, 22, 0.98); border-top: 2px solid var(--blue);
            border-radius: 35px 35px 0 0; padding: 25px; max-height: 40%; overflow-y: auto;
            box-shadow: 0 -10px 40px rgba(0, 242, 255, 0.25);
        }
        .shop-title { font-family: 'Orbitron'; font-size: 14px; color: var(--blue); margin-bottom: 20px; letter-spacing: 3px; }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 18px; padding: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .upgrade-info h4 { margin: 0; font-size: 16px; color: #fff; letter-spacing: 1px; }
        .lvl-text { color: var(--blue); font-size: 11px; margin-left: 5px; }
        
        .progress-track { width: 130px; height: 5px; background: #111; margin-top: 10px; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue); box-shadow: 0 0 10px var(--blue); transition: 0.4s; }

        .buy-button {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--blue);
            color: var(--blue); padding: 10px 20px; border-radius: 10px;
            font-family: 'Orbitron'; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .buy-button:disabled { border-color: #333; color: #333; opacity: 0.4; }
        .buy-button:active { transform: scale(0.9); background: var(--blue); color: #000; }

        @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.03); } 100% { opacity: 0.5; transform: scale(1); } }
        .float-text { position: absolute; color: var(--blue); font-weight: 900; animation: floatUp 0.8s forwards; font-family: 'Orbitron'; pointer-events: none; }
        @keyframes floatUp { to { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="hud-top">
        <div class="credits-container">
            <div class="settings-icon">⚙️</div>
            <div class="credits-label">CREDITS AVAILABLE</div>
            <div class="credits-value" id="balance">0</div>
            <div class="stat-chips">
                <div class="chip">T: +<span id="tap-stat">1</span></div>
                <div class="chip">A: +<span id="auto-stat">0</span>/s</div>
            </div>
        </div>
    </div>

    <div class="game-area">
        <div class="core-wrapper" id="core-btn">
            <div class="core-circle"></div>
            <div class="core-inner-box">
                <img src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png">
            </div>
        </div>
    </div>

    <div class="shop-container">
        <div class="shop-title">SYSTEM UPGRADES</div>
        <div id="shop-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let gameState = {
            credits: parseFloat(localStorage.getItem('ln_v7_credits')) || 0,
            levels: JSON.parse(localStorage.getItem('ln_v7_levels')) || { s1:0, s2:0, s3:0, s4:0 }
        };

        const upgrades = [
            { id: 's1', name: 'NEURAL LINK', base: 1, grow: 1, val: 5, type: 'tap' },
            { id: 's2', name: 'CYBER MINER', base: 1, grow: 1, val: 20, type: 'auto' },
            { id: 's3', name: 'QUANTUM CPU', base: 1, grow: 1, val: 100, type: 'auto' },
            { id: 's4', name: 'CORE OVERLOAD', base: 1, grow: 1, val: 500, type: 'tap' }
        ];

        function getStats() {
            let tap = 1, auto = 0;
            upgrades.forEach(u => {
                let l = gameState.levels[u.id] || 0;
                if(u.type === 'tap') tap += (l * u.val);
                if(u.type === 'auto') auto += (l * u.val);
            });
            return { tap, auto };
        }

        function saveGame() {
            localStorage.setItem('ln_v7_credits', gameState.credits);
            localStorage.setItem('ln_v7_levels', JSON.stringify(gameState.levels));
        }

        function renderUI() {
            const stats = getStats();
            document.getElementById('balance').innerText = Math.floor(gameState.credits).toLocaleString();
            document.getElementById('tap-stat').innerText = stats.tap;
            document.getElementById('auto-stat').innerText = stats.auto;

            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            let showNext = true;

            upgrades.forEach(item => {
                if (!showNext) return;
                let lvl = gameState.levels[item.id] || 0;
                // NARX DOIM 1 OCHKO
                let price = 1; 

                list.innerHTML += `
                    <div class="upgrade-card">
                        <div class="upgrade-info">
                            <h4>${item.name} <span class="lvl-text">LVL ${lvl}/10</span></h4>
                            <div class="progress-track"><div class="progress-fill" style="width:${lvl*10}%"></div></div>
                        </div>
                        ${lvl < 10 ? 
                            `<button class="buy-button" onclick="buyItem('${item.id}', ${price})" ${gameState.credits < price ? 'disabled' : ''}>${price}</button>` : 
                            `<b style="color:var(--pink); font-size:10px; font-family:Orbitron;">MAXED</b>`}
                    </div>
                `;
                if(lvl < 10) showNext = false;
            });
            saveGame();
        }

        window.buyItem = (id, p) => {
            if(gameState.credits >= p) {
                gameState.credits -= p;
                gameState.levels[id]++;
                tg.HapticFeedback.notificationOccurred('success');
                renderUI();
            }
        };

        document.getElementById('core-btn').onclick = (e) => {
            const s = getStats();
            gameState.credits += s.tap;
            const fx = document.createElement('div');
            fx.className = 'float-text'; fx.innerText = `+${s.tap}`;
            fx.style.left = e.clientX + 'px'; fx.style.top = e.clientY + 'px';
            document.body.appendChild(fx);
            setTimeout(() => fx.remove(), 700);
            tg.HapticFeedback.impactOccurred('medium');
            renderUI();
        };

        setInterval(() => {
            const s = getStats();
            if(s.auto > 0) { gameState.credits += (s.auto / 10); renderUI(); }
        }, 100);

        renderUI();
    </script>
</body>
</html>
