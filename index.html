<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leenova Kombat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --panel-color: #1c1f24;
            --text-main: #ffffff;
            --text-sub: #85827d;
            --accent-yellow: #f5bb5f;
            --energy-color: #fffb12;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Roboto', sans-serif; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(to bottom, #24282f, transparent);
        }
        .user-avatar {
            width: 40px; height: 40px;
            background: var(--accent-yellow);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #000;
        }
        .user-info { flex-grow: 1; }
        .user-name { font-size: 14px; font-weight: 700; }
        .rank-info { font-size: 12px; color: var(--accent-yellow); display: flex; align-items: center; gap: 5px; }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 0 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--panel-color);
            padding: 8px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #32363c;
        }
        .stat-label { font-size: 9px; color: var(--text-sub); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 11px; font-weight: 700; color: #4ade80; }

        /* Main Balance */
        .main-balance {
            text-align: center;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .coin-icon { width: 45px; height: 45px; background: var(--accent-yellow); border-radius: 50%; box-shadow: 0 0 20px rgba(245, 187, 95, 0.4); }
        .balance-amount { font-size: 42px; font-weight: 900; }

        /* Clicker Area */
        .clicker-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .circle-outer {
            width: 280px; height: 280px;
            background: radial-gradient(circle, #32363c 0%, #111111 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .avatar-main {
            width: 240px; height: 240px;
            background: url('https://api.dicebear.com/7.x/bottts/svg?seed=Hamster') center/cover;
            border-radius: 50%;
            transition: transform 0.1s;
        }
        .avatar-main:active { transform: scale(0.95); }

        /* Progress Bottom */
        .bottom-hud { padding: 20px; }
        .energy-bar-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 14px; }
        .energy-bar-bg { height: 12px; background: #32363c; border-radius: 10px; overflow: hidden; }
        .energy-bar-fill { height: 100%; background: linear-gradient(90deg, #fffb12, #f5bb5f); width: 100%; transition: width 0.2s; }

        /* Navbar */
        .navbar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            background: #272a30;
            padding: 10px 5px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
        }
        .nav-item { text-align: center; color: var(--text-sub); font-size: 10px; font-weight: 500; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; display: block; }

        /* Floating Points */
        .tap-point {
            position: absolute;
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            pointer-events: none;
            animation: floatUp 0.7s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-avatar" id="short-name">U</div>
        <div class="user-info">
            <div class="user-name" id="username">User Name</div>
            <div class="rank-info">
                <span>Bronze</span> <span>•</span> <span id="rank-lvl">1 / 10</span>
            </div>
        </div>
        <div class="stat-card" style="min-width: 80px;">
            <div class="stat-label">Settings</div>
            <div class="stat-value">⚙️</div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-label">Profit per tap</div>
            <div class="stat-value" id="pwt-ui">+1</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Coins to upgrade</div>
            <div class="stat-value" style="color: #f5bb5f;">2.5K</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Profit per hour</div>
            <div class="stat-value" id="pph-ui">+0</div>
        </div>
    </div>

    <div class="main-balance">
        <div class="coin-icon"></div>
        <div class="balance-amount" id="balance">0</div>
    </div>

    <div class="clicker-container">
        <div class="circle-outer" id="click-area">
            <div class="avatar-main" id="avatar"></div>
        </div>
    </div>

    <div class="bottom-hud">
        <div class="energy-bar-info">
            <span>⚡ <span id="current-energy">1000</span> / 1000</span>
        </div>
        <div class="energy-bar-bg">
            <div class="energy-bar-fill" id="energy-fill"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            Exchange
        </div>
        <div class="nav-item">
            <span class="nav-icon">⛏️</span>
            Mine
        </div>
        <div class="nav-item">
            <span class="nav-icon">👥</span>
            Friends
        </div>
        <div class="nav-item">
            <span class="nav-icon">🪙</span>
            Earn
        </div>
        <div class="nav-item">
            <span class="nav-icon">🐹</span>
            Airdrop
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = "#000000";
        tg.headerColor = "#24282f";

        let state = JSON.parse(localStorage.getItem('hk_save')) || {
            bal: 0,
            energy: 1000,
            maxEnergy: 1000,
            pwt: 1,
            pph: 0
        };

        // User info from Telegram
        if (tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('short-name').innerText = tg.initDataUnsafe.user.first_name[0];
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.bal).toLocaleString();
            document.getElementById('current-energy').innerText = Math.floor(state.energy);
            document.getElementById('pwt-ui').innerText = `+${state.pwt}`;
            document.getElementById('pph-ui').innerText = `+${state.pph}`;
            
            const energyPercent = (state.energy / state.maxEnergy) * 100;
            document.getElementById('energy-fill').style.width = energyPercent + "%";
            
            localStorage.setItem('hk_save', JSON.stringify(state));
        }

        document.getElementById('click-area').addEventListener('touchstart', (e) => {
            if (state.energy < state.pwt) {
                tg.HapticFeedback.notificationOccurred('warning');
                return;
            }

            // Multi-tap support
            for (let i = 0; i < e.targetTouches.length; i++) {
                const touch = e.targetTouches[i];
                
                state.bal += state.pwt;
                state.energy -= state.pwt;

                // Create floating text
                const float = document.createElement('div');
                float.className = 'tap-point';
                float.innerText = `+${state.pwt}`;
                float.style.left = touch.clientX + 'px';
                float.style.top = touch.clientY + 'px';
                document.body.appendChild(float);
                
                setTimeout(() => float.remove(), 700);
            }

            tg.HapticFeedback.impactOccurred('medium');
            
            // Squish animation
            const avatar = document.getElementById('avatar');
            avatar.style.transform = 'scale(0.95) rotate(2deg)';
            setTimeout(() => {
                avatar.style.transform = 'scale(1) rotate(0deg)';
            }, 50);

            updateUI();
        });

        // Energy Regen & Passive Income
        setInterval(() => {
            // Energy regen
            if (state.energy < state.maxEnergy) {
                state.energy = Math.min(state.maxEnergy, state.energy + 1);
            }
            
            // Passive income (Profit per hour)
            if (state.pph > 0) {
                state.bal += (state.pph / 3600);
            }
            
            updateUI();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
