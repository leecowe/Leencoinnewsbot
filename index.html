<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Archmage: Neural Resurrection</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bio-pink: #ff007a;
            --bio-cyan: #00f2ff;
            --cell-void: #000000;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { background: var(--cell-void); color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; }
        
        /* 3D Orqa fon */
        #bg-canvas { position: fixed; inset: 0; z-index: 1; }

        /* Tap Zone - Bu hamma narsadan pastda lekin canvasdan ustun */
        #tap-zone { position: fixed; inset: 0; z-index: 10; cursor: pointer; }

        .ui-root { position: relative; z-index: 20; height: 100vh; display: flex; flex-direction: column; pointer-events: none; }
        .ui-root * { pointer-events: auto; }

        /* HUD dizayni */
        .top-hud { padding: 50px 20px 20px; display: flex; justify-content: space-between; pointer-events: none; }
        .life-sign { 
            background: rgba(255, 0, 122, 0.1); border: 1px solid var(--bio-pink);
            padding: 8px 16px; border-radius: 20px; font-size: 10px; color: var(--bio-pink);
            box-shadow: 0 0 10px var(--bio-pink); text-transform: uppercase; pointer-events: auto;
        }

        .balance-box { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .ariai-count { 
            font-family: 'Cinzel'; font-size: 60px; font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--bio-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--bio-pink));
        }
        .stats-label { font-size: 10px; letter-spacing: 2px; color: var(--bio-cyan); margin-top: 10px; opacity: 0.8; }

        .footer-hud { padding: 20px; padding-bottom: 120px; pointer-events: none; }
        .bar-wrap { margin-bottom: 12px; pointer-events: auto; }
        .bar-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--bio-cyan); margin-bottom: 6px; }
        .bar-rail { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .bar-flow { height: 100%; transition: 0.3s ease; box-shadow: 0 0 10px inherit; }

        /* Navigatsiya */
        .nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            background: rgba(0,0,0,0.95); padding: 20px 10px 40px; 
            z-index: 1000; border-top: 1px solid rgba(255,0,122,0.3);
        }
        .nav-btn { flex: 1; text-align: center; color: #555; font-size: 11px; font-weight: 900; background: none; border: none; cursor: pointer; }
        .nav-btn.active { color: #fff; text-shadow: 0 0 10px var(--bio-pink); }

        /* Panel */
        .panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; 
            background: #050505; border-top: 2px solid var(--bio-pink); 
            border-radius: 30px 30px 0 0; z-index: 1100; padding: 25px; 
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); overflow-y: auto;
        }
        .panel.active { bottom: 0; }

        .dna-pop { position: fixed; pointer-events: none; z-index: 2000; color: #fff; font-weight: 900; font-family: 'Cinzel'; animation: popUp 0.6s ease-out forwards; }
        @keyframes popUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }

        .cell-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; transition: 0.3s; }
        .cell-card:active { transform: scale(0.95); border-color: var(--bio-pink); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <div id="tap-zone"></div>

    <div class="ui-root">
        <div class="top-hud">
            <div class="life-sign" id="life-status">BIO-SIGN: STABLE</div>
            <div class="life-sign" style="border-color: var(--bio-cyan); color: var(--bio-cyan);">DNA: x<span id="mult-ui">1.0</span></div>
        </div>

        <div class="balance-box">
            <h1 class="ariai-count" id="ariai-bal">0.00</h1>
            <p class="stats-label">TOTAL $ARIAI SYNCED</p>
        </div>

        <div class="footer-hud">
            <div class="bar-wrap">
                <div class="bar-info"><span>PLASMA</span><span id="mana-text">1000 / 1000</span></div>
                <div class="bar-rail"><div class="bar-flow" id="mana-bar" style="background: var(--bio-cyan); width: 100%; box-shadow: 0 0 10px var(--bio-cyan);"></div></div>
            </div>
            <div class="bar-wrap">
                <div class="bar-info"><span>EVOLUTION</span><span id="xp-text">LVL 1</span></div>
                <div class="bar-rail"><div class="bar-flow" id="xp-bar" style="background: var(--bio-pink); width: 0%; box-shadow: 0 0 10px var(--bio-pink);"></div></div>
            </div>
        </div>
    </div>

    <div id="panel-genome" class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="font-family: 'Cinzel'; color: var(--bio-pink); font-size: 24px;">GENOME</h2>
            <div onclick="closePanel()" style="padding: 10px; color: #555; font-size: 20px; cursor: pointer;">✕</div>
        </div>
        <div id="cell-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="tab('core', this)">CORE</button>
        <button class="nav-btn" onclick="tab('genome', this)">GENOME</button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = JSON.parse(localStorage.getItem('ariai_v2')) || {
            bal: 0, pwr: 1.0, mana: 1000, lvl: 1, xp: 0, unlocked: 1
        };

        // 3D Sahna
        let scene, camera, renderer, core;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geo = new THREE.IcosahedronGeometry(2, 1);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff007a, wireframe: true, transparent: true, opacity: 0.8 });
            core = new THREE.Mesh(geo, mat);
            scene.add(core);

            const l1 = new THREE.PointLight(0xff007a, 2, 10);
            l1.position.set(2, 2, 5);
            const l2 = new THREE.PointLight(0x00f2ff, 1, 10);
            l2.position.set(-2, -2, 5);
            scene.add(l1, l2, new THREE.AmbientLight(0x202020));
            camera.position.z = 6;

            function animate() {
                requestAnimationFrame(animate);
                core.rotation.y += 0.008;
                core.rotation.z += 0.005;
                let pulse = 1 + Math.sin(Date.now() * 0.002) * 0.05;
                core.scale.lerp(new THREE.Vector3(pulse, pulse, pulse), 0.1);
                renderer.render(scene, camera);
            }
            animate();
        }

        // Tap Funksiyasi
        document.getElementById('tap-zone').onclick = (e) => {
            if (state.mana < 2) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            // Ma'lumotlarni yangilash
            state.bal += state.pwr;
            state.mana -= 2;
            state.xp += 15;

            // Level up mantiqi
            if (state.xp >= state.lvl * 1000) {
                state.lvl++;
                state.xp = 0;
                state.pwr += 0.5;
                tg.HapticFeedback.notificationOccurred('success');
            }

            // Effektlar
            core.scale.set(1.4, 1.4, 1.4);
            createPop(e.clientX, e.clientY);
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        };

        function createPop(x, y) {
            const pop = document.createElement('div');
            pop.className = 'dna-pop';
            pop.innerText = `+${state.pwr.toFixed(1)}`;
            pop.style.left = x + 'px';
            pop.style.top = y + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 600);
        }

        function updateUI() {
            document.getElementById('ariai-bal').innerText = state.bal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('mana-text').innerText = `${Math.floor(state.mana)} / 1000`;
            document.getElementById('mana-bar').style.width = (state.mana / 10) + '%';
            document.getElementById('xp-text').innerText = `LVL ${state.lvl}`;
            document.getElementById('xp-bar').style.width = Math.min(100, (state.xp / (state.lvl * 10))) + '%';
            document.getElementById('mult-ui').innerText = state.pwr.toFixed(1);
            localStorage.setItem('ariai_v2', JSON.stringify(state));
        }

        function tab(t, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (t === 'genome') {
                document.getElementById('panel-genome').classList.add('active');
                renderCells();
            } else {
                closePanel();
            }
        }

        function closePanel() {
            document.getElementById('panel-genome').classList.remove('active');
            document.querySelectorAll('.nav-btn')[0].classList.add('active');
            document.querySelectorAll('.nav-btn')[1].classList.remove('active');
        }

        function renderCells() {
            const list = document.getElementById('cell-list');
            list.innerHTML = '';
            for(let i=1; i<=12; i++) {
                const div = document.createElement('div');
                div.className = 'cell-card';
                div.innerHTML = `
                    <div style="font-size:9px; color:var(--bio-pink); letter-spacing:1px;">NEURAL_${i}</div>
                    <div style="font-size:13px; margin:8px 0; font-weight:900;">EVOLVE</div>
                    <div style="font-size:10px; color:var(--bio-cyan)">⚡ ${i * 500}</div>
                `;
                list.appendChild(div);
            }
        }

        // Mana regeneratsiyasi
        setInterval(() => {
            if (state.mana < 1000) {
                state.mana = Math.min(1000, state.mana + 1.5);
                updateUI();
            }
        }, 1000);

        window.onload = () => { init3D(); updateUI(); };
    </script>
</body>
</html>
