<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Professional Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.7);
            --ios-blue: #0A84FF;
            --ios-green: #32D74B;
            --ios-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'SF Pro Display', -apple-system, sans-serif; }
        
        body { 
            background: var(--ios-bg); color: var(--text-main); margin: 0; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000000 100%);
        }

        /* --- Header & Balance --- */
        .header { padding: 40px 20px 10px; text-align: center; z-index: 10; }
        .rank-name { color: var(--ios-blue); font-weight: 700; font-size: 12px; letter-spacing: 1px; margin-bottom: 5px; }
        .bal-val { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; display: block; transition: 0.1s; }
        .profit-badge { background: rgba(50, 215, 75, 0.15); color: var(--ios-green); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; display: inline-block; }

        /* --- 8D Engine --- */
        .char-stage {
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            touch-action: none;
            position: relative;
        }

        .char-8d-wrap {
            position: relative;
            width: 220px;
            height: 220px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .char-glow {
            position: absolute;
            width: 140px;
            height: 140px;
            background: var(--ios-blue);
            filter: blur(60px);
            opacity: 0.3;
            transform: translateZ(-50px);
            border-radius: 50%;
        }

        .char-layer-main {
            width: 170px;
            z-index: 5;
            transform: translateZ(60px);
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            animation: float8d 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float8d {
            0%, 100% { transform: translateZ(60px) translateY(0); }
            50% { transform: translateZ(100px) translateY(-15px); }
        }

        /* --- UI Components --- */
        .ios-card { 
            background: var(--ios-card); 
            backdrop-filter: blur(25px); 
            border-radius: 24px; 
            border: 1px solid var(--ios-border); 
            padding: 18px; 
            margin: 0 20px 12px; 
        }

        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--ios-blue); width: 0%; transition: 0.4s; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 20px 12px; }
        .stat-item { background: var(--ios-card); padding: 12px; border-radius: 20px; border: 1px solid var(--ios-border); text-align: center; }
        .stat-label { color: var(--text-secondary); font-size: 10px; text-transform: uppercase; font-weight: 600; }
        .stat-val { font-size: 18px; font-weight: 700; display: block; margin-top: 3px; }

        /* Energy Bar */
        .energy-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; color: #FFD60A; margin-bottom: 10px; }

        .action-btn { 
            background: var(--ios-blue); 
            color: white; 
            width: calc(100% - 40px);
            margin: 0 20px; 
            padding: 16px; 
            border-radius: 20px; 
            border: none; 
            font-size: 17px; 
            font-weight: 700; 
            transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.96); }

        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(20,20,22, 0.9); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding-bottom: 25px; border-top: 0.5px solid var(--ios-border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--ios-blue); }

        .floating-text {
            position: absolute;
            color: white;
            font-weight: 800;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 0.7s ease-out forwards;
            z-index: 1000;
        }
        @keyframes floatUp { 0% { transform: translateY(0) opacity: 1; } 100% { transform: translateY(-120px) opacity: 0; } }
    </style>
</head>
<body onpointermove="move8D(event)">

<header class="header">
    <div class="rank-name" id="rank-name">AIRA NEOPHYTE</div>
    <span class="bal-val" id="total-bal">0</span>
    <div class="profit-badge" id="profit-val">+0.0/s</div>
</header>

<div class="char-stage">
    <div class="char-8d-wrap" id="char8d" onclick="handleTap(event)">
        <div class="char-glow"></div>
        <img src="https://cdn-icons-png.flaticon.com/512/6143/6143004.png" class="char-layer-main" id="hero-img">
    </div>
</div>

<div class="energy-wrap">
    <span>⚡️</span> <span id="energy-val">1000</span> / <span id="max-energy">1000</span>
</div>

<div class="stat-grid">
    <div class="stat-item">
        <span class="stat-label">Power</span>
        <span class="stat-val" id="power-val">1.0</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Next Rank</span>
        <div class="progress-container">
            <div class="progress-bar" id="rank-progress"></div>
        </div>
    </div>
</div>

<div class="ios-card" style="display: flex; align-items: center; justify-content: space-between;">
    <div>
        <div style="font-size: 12px; color: var(--text-secondary);">Upgrade Drone</div>
        <div style="font-size: 16px; font-weight: 700;" id="lvl-txt">Level 1</div>
    </div>
    <button class="action-btn" style="margin: 0; padding: 10px 20px; width: auto;" onclick="upgrade()">
        Upgrade <span id="cost-txt" style="margin-left:5px">500</span>
    </button>
</div>

<nav class="nav">
    <div class="nav-item active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" style="width:22px;margin-bottom:4px"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Command
    </div>
    <div class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" style="width:22px;margin-bottom:4px"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Earn
    </div>
    <div class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" style="width:22px;margin-bottom:4px"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Squad
    </div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Data State
    let balance = parseFloat(localStorage.getItem('aira_bal')) || 0;
    let lvl = parseInt(localStorage.getItem('aira_lvl')) || 1;
    let energy = parseInt(localStorage.getItem('aira_nrg')) || 1000;
    const maxEnergy = 1000 + (lvl * 50);

    // 8D Motion
    function move8D(e) {
        const wrap = document.getElementById('char8d');
        const hero = document.getElementById('hero-img');
        const x = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
        const y = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
        wrap.style.transform = `rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
        hero.style.transform = `translateZ(60px) translateX(${x * 15}px) translateY(${y * 15}px)`;
    }

    // Number Formatter
    function f(n) {
        if (n < 1000) return Math.floor(n).toString();
        const s = ["", "K", "M", "B", "T"];
        const e = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, e)).toFixed(1) + s[e];
    }

    // Tap Logic
    function handleTap(e) {
        if (energy <= 0) {
            tg.HapticFeedback.notificationOccurred('warning');
            return;
        }

        const power = 1 + (lvl * 0.5);
        balance += power;
        energy -= 1;
        
        tg.HapticFeedback.impactOccurred('light');
        
        // Floating Text
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        const txt = document.createElement('div');
        txt.className = 'floating-text';
        txt.innerText = `+${power.toFixed(0)}`;
        txt.style.left = `${x - 20}px`;
        txt.style.top = `${y - 40}px`;
        document.body.appendChild(txt);
        setTimeout(() => txt.remove(), 700);

        updateUI();
    }

    function upgrade() {
        const cost = 500 * Math.pow(1.5, lvl - 1);
        if (balance >= cost) {
            balance -= cost;
            lvl++;
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        } else {
            tg.showAlert("Mablag' yetarli emas!");
        }
    }

    function updateUI() {
        document.getElementById('total-bal').innerText = f(balance);
        document.getElementById('lvl-txt').innerText = `Level ${lvl}`;
        document.getElementById('cost-txt').innerText = f(500 * Math.pow(1.5, lvl - 1));
        document.getElementById('power-val').innerText = (1 + (lvl * 0.5)).toFixed(1);
        document.getElementById('energy-val').innerText = Math.floor(energy);
        document.getElementById('max-energy').innerText = 1000 + (lvl * 50);

        // Rank Progress
        const nextRankAt = 10000 * Math.pow(2, Math.floor(lvl / 5));
        const progress = (balance / nextRankAt) * 100;
        document.getElementById('rank-progress').style.width = `${Math.min(progress, 100)}%`;

        // Skin Evolution
        const heroImg = document.getElementById('hero-img');
        if (lvl >= 10 && lvl < 20) heroImg.src = "https://cdn-icons-png.flaticon.com/512/6143/6143004.png"; // Skin 2
        if (lvl >= 20) heroImg.src = "https://cdn-icons-png.flaticon.com/512/2172/2172841.png"; // Boss Skin

        localStorage.setItem('aira_bal', balance);
        localStorage.setItem('aira_lvl', lvl);
        localStorage.setItem('aira_nrg', energy);
    }

    // Background Loops
    setInterval(() => {
        // Passive Income
        balance += (lvl * 0.2) / 10;
        // Energy Recovery
        if (energy < (1000 + (lvl * 50))) energy += 0.5;
        
        document.getElementById('total-bal').innerText = f(balance);
        document.getElementById('profit-val').innerText = "+" + (lvl * 2).toFixed(1) + "/s";
        document.getElementById('energy-val').innerText = Math.floor(energy);
    }, 100);

    updateUI();
</script>
</body>
</html>
