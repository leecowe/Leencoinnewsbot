<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova: The Cyber City</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --purple: #bc00ff; --gold: #ffcc00; }

        /* 1. FON: Qora emas, to'liq rasmli kiber-shahar */
        body {
            margin: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden;
            background: linear-gradient(rgba(2, 11, 22, 0.7), rgba(2, 11, 22, 0.8)), 
                        url('https://images.alphacoders.com/131/1314605.png') no-repeat center center fixed;
            background-size: cover;
            display: flex; flex-direction: column;
        }

        /* HUD: Ochkolar qismi */
        .hud {
            padding: 30px 20px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            border-bottom: 2px solid var(--blue); box-shadow: 0 5px 20px rgba(0, 242, 255, 0.3);
        }
        .balance-label { font-family: 'Orbitron'; font-size: 10px; color: var(--blue); letter-spacing: 2px; }
        .balance-val { font-family: 'Orbitron'; font-size: 36px; text-shadow: 0 0 15px var(--blue); }

        /* Navigatsiya */
        .nav { display: flex; background: rgba(0, 242, 255, 0.1); }
        .nav-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; opacity: 0.6; }
        .nav-btn.active { opacity: 1; background: rgba(0, 242, 255, 0.2); border-bottom: 3px solid var(--blue); }

        /* TUGMA: GIF kabi qimirlaydigan va 3D bosiladigan Core */
        .game-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        .core-btn {
            width: 180px; height: 180px; border-radius: 50%;
            background: rgba(0, 242, 255, 0.1); border: 4px solid var(--blue);
            box-shadow: 0 0 30px var(--blue), inset 0 0 20px var(--blue);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            position: relative;
            /* Jonli pulse animatsiyasi */
            animation: pulse-glow 2s infinite alternate ease-in-out;
            transition: 0.1s transform;
        }

        /* Bosilganda 3D effekt va silkinish */
        .core-btn:active {
            transform: scale(0.9) translateY(5px);
            box-shadow: 0 0 50px var(--blue), inset 0 0 40px var(--blue);
        }

        @keyframes pulse-glow {
            from { transform: scale(1); box-shadow: 0 0 20px var(--blue); }
            to { transform: scale(1.05); box-shadow: 0 0 40px var(--blue); }
        }

        .core-btn img { width: 90px; filter: drop-shadow(0 0 10px var(--blue)); pointer-events: none; }

        /* Scroll hududlari */
        .window { display: none; flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .window.active { display: block; }

        /* Kartalar: Upgrade va NFT */
        .card {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px);
        }
        .progress-bar { width: 100px; height: 4px; background: #222; margin-top: 8px; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue); transition: 0.3s; }

        .btn-buy {
            background: transparent; border: 1px solid var(--blue); color: var(--blue);
            padding: 8px 15px; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px;
        }
        .btn-buy:disabled { opacity: 0.3; border-color: #555; }

        /* NFT Grid */
        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .nft-card { 
            background: rgba(188, 0, 255, 0.1); border: 1px solid var(--purple);
            border-radius: 12px; padding: 10px; text-align: center;
        }
        .nft-icon { font-size: 40px; margin-bottom: 10px; display: block; }

        /* Floating Text Effect */
        .pop { position: absolute; color: var(--blue); font-weight: bold; animation: popUp 0.7s forwards; pointer-events: none; font-family: 'Orbitron'; }
        @keyframes popUp { to { transform: translateY(-100px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="hud">
        <div class="balance-label">CREDITS AVAILABLE</div>
        <div class="balance-val" id="credits">0</div>
        <div style="font-size: 12px; color: var(--blue); margin-top: 5px;">
            TAP: +<span id="t-p">1</span> | AUTO: +<span id="a-p">0</span>/s
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" id="n-game" onclick="tab('game')">CITY</div>
        <div class="nav-btn" id="n-up" onclick="tab('up')">UPGRADES</div>
        <div class="nav-btn" id="n-nft" onclick="tab('nft')">NFT MARKET</div>
    </div>

    <div id="game" class="window active">
        <div class="game-zone">
            <div class="core-btn" id="core-tap">
                <img src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png">
            </div>
        </div>
    </div>

    <div id="up" class="window">
        <div id="up-list"></div>
    </div>

    <div id="nft" class="window">
        <div class="nft-grid" id="nft-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let data = {
            money: parseFloat(localStorage.getItem('ln_v10_m')) || 0,
            lvls: JSON.parse(localStorage.getItem('ln_v10_l')) || {u1:0,u2:0,u3:0,u4:0,u5:0,u6:0,u7:0,u8:0},
            nfts: JSON.parse(localStorage.getItem('ln_v10_n')) || []
        };

        const ups = [
            { id: 'u1', name: 'Neural Link', v: 5, t: 'tap' },
            { id: 'u2', name: 'Bento Bot', v: 10, t: 'auto' },
            { id: 'u3', name: 'Cyber Miner', v: 40, t: 'auto' },
            { id: 'u4', name: 'Pulse Chip', v: 20, t: 'tap' },
            { id: 'u5', name: 'Data Drive', v: 120, t: 'auto' },
            { id: 'u6', name: 'Quantum CPU', v: 350, t: 'auto' },
            { id: 'u7', name: 'Void Core', v: 80, t: 'tap' },
            { id: 'u8', name: 'Giga Engine', v: 1500, t: 'auto' }
        ];

        const nftMarket = Array.from({length: 16}, (_, i) => ({
            id: i, name: `KIBER #${i+1}`, price: (i+1) * 8000, power: (i+1) * 450,
            icon: ['🤖','🛰️','👽','👾','🐙','🔥','💎','⚡','🪐','🛸','⭐','🌌','👑','🧬','🧿','🌀'][i]
        }));

        function getStats() {
            let t = 1, a = 0;
            ups.forEach(u => {
                let l = data.lvls[u.id];
                if(u.t === 'tap') t += l * u.v; else a += l * u.v;
            });
            nftMarket.filter(n => data.nfts.includes(n.id)).forEach(n => a += n.power);
            return { t, a };
        }

        function tab(t) {
            document.querySelectorAll('.window, .nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('n-' + t).classList.add('active');
            render();
        }

        function render() {
            const s = getStats();
            document.getElementById('credits').innerText = Math.floor(data.money).toLocaleString();
            document.getElementById('t-p').innerText = s.t;
            document.getElementById('a-p').innerText = s.a;

            const upL = document.getElementById('up-list');
            upL.innerHTML = '';
            let chain = true;
            ups.forEach(u => {
                if(!chain) return;
                let l = data.lvls[u.id];
                upL.innerHTML += `<div class="card">
                    <div><b>${u.name}</b> <small>(Lvl ${l})</small><div class="progress-bar"><div class="progress-fill" style="width:${l*10}%"></div></div></div>
                    ${l < 10 ? `<button class="btn-buy" onclick="buyU('${u.id}')">💰 1</button>` : 'MAX'}
                </div>`;
                if(l < 10) chain = false;
            });

            const nftL = document.getElementById('nft-list');
            nftL.innerHTML = '';
            nftMarket.forEach(n => {
                const owned = data.nfts.includes(n.id);
                nftL.innerHTML += `<div class="nft-card">
                    <span class="nft-icon">${n.icon}</span>
                    <small>${n.name}</small><br>
                    <small style="color:var(--blue)">+${n.power}/s</small>
                    <button class="btn-buy" style="width:100%; margin-top:5px" onclick="buyN(${n.id}, ${n.price})" ${owned || data.money < n.price ? 'disabled' : ''}>
                        ${owned ? 'OWNED' : n.price}
                    </button>
                </div>`;
            });

            localStorage.setItem('ln_v10_m', data.money);
            localStorage.setItem('ln_v10_l', JSON.stringify(data.lvls));
            localStorage.setItem('ln_v10_n', JSON.stringify(data.nfts));
        }

        window.buyU = (id) => { if(data.money >= 1) { data.money--; data.lvls[id]++; render(); tg.HapticFeedback.impactOccurred('light'); } };
        window.buyN = (id, p) => { if(data.money >= p) { data.money -= p; data.nfts.push(id); render(); tg.HapticFeedback.notificationOccurred('success'); } };

        document.getElementById('core-tap').onclick = (e) => {
            const s = getStats(); data.money += s.t;
            const p = document.createElement('div'); p.className = 'pop'; p.innerText = `+${s.t}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 700);
            tg.HapticFeedback.impactOccurred('medium'); render();
        };

        setInterval(() => { const s = getStats(); if(s.a > 0) { data.money += s.a/10; render(); } }, 100);
        render();
    </script>
</body>
</html>
