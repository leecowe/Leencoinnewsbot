<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Collection</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --lvl-color: #00f2ff; --bg: #050505; --border: rgba(255, 255, 255, 0.15); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { padding: 20px; text-align: center; border-bottom: 2px solid var(--border); background: #000; position: relative; }
        .rank-btn { position: absolute; left: 15px; top: 20px; background: #1a1a1a; border: 2px solid var(--lvl-color); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--lvl-color); cursor: pointer; }
        .profit-badge { position: absolute; right: 15px; top: 20px; background: rgba(0,255,0,0.1); border: 1px solid #00ff00; padding: 4px 8px; border-radius: 6px; color: #00ff00; font-size: 11px; font-weight: 700; }
        .bal-val { font-size: 38px; font-weight: 700; color: #fff; }
        .staked-display { font-size: 13px; color: #ffbc00; font-weight: 700; margin-top: 4px; height: 16px; visibility: hidden; }

        .view-content { flex: 1; display: none; padding: 15px; overflow-y: auto; }
        .view-content.active { display: flex; flex-direction: column; }

        .glass-card { background: #111; border: 1px solid var(--border); border-left: 5px solid var(--lvl-color); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
        .cost-tag { color: var(--lvl-color); font-weight: 700; font-size: 12px; text-align: right; display: block; margin-bottom: 4px; }
        
        .btn-main { background: var(--lvl-color); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-main:disabled { background: #333 !important; color: #666 !important; }

        /* COLLECTION GRID */
        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 20px; }
        .nft-card { background: #151515; border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; position: relative; }
        .nft-card.owned { border-color: gold; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .owned-badge { position: absolute; top: 5px; right: 5px; font-size: 10px; color: gold; font-weight: 900; }

        .nav { height: 75px; background: #000; display: flex; border-top: 2px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: var(--lvl-color); border-top: 3px solid var(--lvl-color); }

        .lock-msg { background: rgba(255, 68, 68, 0.1); color: #ff4444; padding: 10px; border-radius: 8px; font-size: 11px; text-align: center; border: 1px solid #ff4444; margin-top: 10px; }
        #rank-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; padding:20px; flex-direction:column; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <header class="header">
        <div class="rank-btn" onclick="openRank()">RANK</div>
        <div class="profit-badge" id="profit-val">+0/s</div>
        <div class="bal-val" id="total-bal">0</div>
        <div id="staked-info" class="staked-display">STAKED: <span id="staked-amt">0</span></div>
        <div id="career-name" style="font-size:10px; letter-spacing:2px; color:var(--lvl-color); font-weight:700;">BOSHLANG'ICH</div>
    </header>

    <div id="view-core" class="view-content active">
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>STAKE LVL: <b id="stake-lvl" style="color:var(--lvl-color)">0</b></span>
                <span id="stake-timer">READY</span>
            </div>
            <button class="btn-main" onclick="startStake()" id="stake-btn">STAKE ALL</button>
            <div style="margin-top:12px">
                <span class="cost-tag" id="stake-cost-tag">Cost: 500</span>
                <button class="btn-main" onclick="upgradeStake()" id="stake-up-btn" style="background:transparent; border:1px solid var(--lvl-color); color:var(--lvl-color)">UPGRADE</button>
            </div>
            <div id="lock-stake" class="lock-msg">O'QUVCHI DARAJA KERAK</div>
        </div>

        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>FARM LVL: <b id="farm-lvl" style="color:var(--lvl-color)">1</b></span>
                <span id="aps-ui">50/s</span>
            </div>
            <span class="cost-tag" id="farm-cost-tag">Cost: 500</span>
            <button class="btn-main" onclick="upgradeFarm()" id="farm-up-btn">UPGRADE FARM</button>
        </div>
    </div>

    <div id="view-collection" class="view-content">
        <h3 style="text-align:center; color:gold; margin:0 0 15px 0;">TITANIUM COLLECTION</h3>
        <div id="lock-nft" class="lock-msg" style="margin-bottom:20px;">VAZIR DARAJASI KERAK!</div>
        <div class="nft-grid" id="nft-list">
            </div>
    </div>

    <div id="view-market" class="view-content">
        <div class="glass-card">
            <div style="font-weight:700; font-size:18px;">AUTO-STAKING</div>
            <p style="font-size:11px; color:#aaa;">Har 30 soniyada avtomatik stake qiladi.</p>
            <button class="btn-main" onclick="buyAuto()" id="auto-btn">SOTIB OLISH (15.0k)</button>
            <div id="lock-auto" class="lock-msg">TALABA DARAJA KERAK</div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('core', this)">CORE</div>
        <div class="nav-item" onclick="switchTab('collection', this)">COLLECTION</div>
        <div class="nav-item" onclick="switchTab('market', this)">MARKET</div>
    </nav>

    <div id="rank-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2>RANKING</h2>
            <button onclick="closeRank()" style="background:var(--lvl-color); border:none; padding:8px 15px; border-radius:8px;">X</button>
        </div>
        <div id="rank-list"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = parseFloat(localStorage.getItem('aira_bal')) || 0;
    let farmLevel = parseInt(localStorage.getItem('aira_farm')) || 1;
    let stakeLevel = parseInt(localStorage.getItem('aira_stake')) || 0;
    let hasAuto = localStorage.getItem('aira_auto') === 'true';
    let ownedNFTs = JSON.parse(localStorage.getItem('aira_nfts')) || [];

    let isStaking = false;
    let currentStaked = 0;
    let autoTimer = 0;

    function f(n) {
        if (n < 1000) return Math.floor(n);
        const s = ["", "k", "m", "b", "t"];
        const e = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, e)).toFixed(1) + s[e];
    }

    function checkCareer() {
        let total = balance + currentStaked;
        let c = { name: "BOSHLANG'ICH", color: "#00f2ff", fM: 1, sM: 0, a: false, s: false, n: false };
        if (total >= 500000) c = { name: "VAZIR", color: "#FFD700", fM: 50, sM: 8, a: true, s: true, n: true };
        else if (total >= 100000) c = { name: "MAGISTR", color: "#ff2e2e", fM: 25, sM: 7, a: true, s: true, n: false };
        else if (total >= 10000) c = { name: "TALABA", color: "#26ff26", fM: 15, sM: 5, a: true, s: true, n: false };
        else if (total >= 1000) c = { name: "O'QUVCHI", color: "#ffffff", fM: 10, sM: 3, a: false, s: true, n: false };

        document.documentElement.style.setProperty('--lvl-color', c.color);
        document.getElementById('career-name').innerText = c.name;
        
        document.getElementById('lock-stake').style.display = c.s ? "none" : "block";
        document.getElementById('lock-auto').style.display = c.a ? "none" : "block";
        document.getElementById('lock-nft').style.display = c.n ? "none" : "block";
        
        document.getElementById('stake-btn').disabled = isStaking || !c.s;
        document.getElementById('stake-up-btn').disabled = !c.s || stakeLevel >= c.sM;
        document.getElementById('farm-up-btn').disabled = farmLevel >= c.fM;
        document.getElementById('auto-btn').disabled = !c.a || hasAuto;
        return c;
    }

    setInterval(() => {
        let aps = 50 * Math.pow(2, farmLevel - 1);
        balance += (aps / 3.33);
        document.getElementById('total-bal').innerText = f(balance);
        document.getElementById('profit-val').innerText = "+" + f(aps) + "/s";
        document.getElementById('aps-ui').innerText = f(aps) + "/s";

        if(hasAuto && !isStaking && balance > 1000) {
            autoTimer++;
            if(autoTimer >= 100) { startStake(); autoTimer = 0; }
        }
        checkCareer();
    }, 300);

    function startStake() {
        if (isStaking || balance <= 0) return;
        currentStaked = balance; balance = 0; isStaking = true;
        document.getElementById('staked-info').style.visibility = "visible";
        document.getElementById('staked-amt').innerText = f(currentStaked);
        let timeLeft = 10;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('stake-timer').innerText = timeLeft + "S";
            if (timeLeft <= 0) {
                clearInterval(countdown);
                balance += Math.floor(currentStaked * (1.05 + (stakeLevel * 0.05)));
                currentStaked = 0; isStaking = false;
                document.getElementById('staked-info').style.visibility = "hidden";
                document.getElementById('stake-timer').innerText = "READY";
                save();
            }
        }, 1000);
    }

    function upgradeFarm() {
        let cost = 500 * Math.pow(2, farmLevel - 1);
        if (balance >= cost) { balance -= cost; farmLevel++; save(); updatePrices(); }
    }

    function upgradeStake() {
        let cost = 500 * Math.pow(2, stakeLevel);
        if (balance >= cost) { balance -= cost; stakeLevel++; save(); updatePrices(); }
    }

    function updatePrices() {
        document.getElementById('farm-cost-tag').innerText = "Cost: " + f(500 * Math.pow(2, farmLevel - 1));
        document.getElementById('stake-cost-tag').innerText = "Cost: " + f(500 * Math.pow(2, stakeLevel));
        document.getElementById('farm-lvl').innerText = farmLevel;
        document.getElementById('stake-lvl').innerText = stakeLevel;
    }

    function loadNFTs() {
        const list = document.getElementById('nft-list');
        let html = "";
        for(let i=1; i<=1000; i++) {
            let price = 1000000 * i;
            let isOwned = ownedNFTs.includes(i);
            html += `
                <div class="nft-card ${isOwned ? 'owned' : ''}" id="nft-${i}">
                    ${isOwned ? '<span class="owned-badge">OWNED</span>' : ''}
                    <div style="font-size:20px">${i%3==0?'💠':i%2==0?'🔱':'🌀'}</div>
                    <h4>TITAN #${i}</h4>
                    <div style="color:gold; font-size:12px; margin-bottom:8px">${f(price)}</div>
                    <button class="btn-main" style="padding:8px; font-size:10px" 
                        onclick="buyNFT(${price}, ${i})" ${isOwned ? 'disabled' : ''}>
                        ${isOwned ? 'BOUGHT' : 'BUY'}
                    </button>
                </div>`;
        }
        list.innerHTML = html;
    }

    function buyNFT(p, id) {
        if (balance >= p) {
            balance -= p;
            ownedNFTs.push(id);
            localStorage.setItem('aira_nfts', JSON.stringify(ownedNFTs));
            save();
            loadNFTs();
            tg.showAlert("NFT sotib olindi!");
        } else tg.showAlert("Mablag' yetarli emas!");
    }

    function buyAuto() { if (balance >= 15000) { balance -= 15000; hasAuto = true; localStorage.setItem('aira_auto', 'true'); save(); } }
    function save() { localStorage.setItem('aira_bal', balance); localStorage.setItem('aira_farm', farmLevel); localStorage.setItem('aira_stake', stakeLevel); }
    function openRank() { document.getElementById('rank-modal').style.display = "flex"; }
    function closeRank() { document.getElementById('rank-modal').style.display = "none"; }
    function switchTab(tab, el) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        el.classList.add('active');
    }

    loadNFTs();
    updatePrices();
    checkCareer();
</script>
</body>
</html>
