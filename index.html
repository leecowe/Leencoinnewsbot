<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova Multiverse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --purple: #bc00ff; --gold: #ffcc00; --dark: #020b16; }

        body {
            margin: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden;
            background: linear-gradient(rgba(2, 11, 22, 0.8), rgba(2, 11, 22, 0.9)), 
                        url('https://images.alphacoders.com/131/1314605.png') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column;
        }

        /* HUD - Yuqori Panel */
        .hud { padding: 40px 20px 20px; background: rgba(0,0,0,0.7); border-bottom: 2px solid var(--blue); }
        .label { font-family: 'Orbitron'; font-size: 10px; color: var(--blue); letter-spacing: 2px; }
        .balance { font-family: 'Orbitron'; font-size: 38px; text-shadow: 0 0 15px var(--blue); }
        .stats-row { display: flex; gap: 10px; margin-top: 5px; }
        .stat-badge { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--blue); padding: 4px 10px; border-radius: 4px; font-size: 12px; }

        /* Window System */
        .window { display: none; flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .window.active { display: block; }

        /* CORE - Clicker */
        .game-zone { height: 100%; display: flex; justify-content: center; align-items: center; }
        .core-btn {
            width: 200px; height: 200px; border-radius: 50%;
            border: 3px solid var(--blue); box-shadow: 0 0 30px var(--blue), inset 0 0 15px var(--blue);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; animation: breathe 4s infinite ease-in-out;
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .core-btn:active { transform: scale(0.9); }
        .core-btn img { width: 100px; filter: drop-shadow(0 0 10px var(--blue)); }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* UPGRADES - Tizim */
        .up-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 12px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .progress-box { width: 120px; height: 6px; background: #000; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--blue); width: 0%; transition: 0.3s; }
        
        .buy-btn {
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--blue); color: #fff;
            padding: 10px; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; min-width: 80px;
        }
        .buy-btn:disabled { opacity: 0.3; border-color: #555; }

        /* NFT MARKET */
        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .nft-card {
            background: rgba(0,0,0,0.6); border: 2px solid var(--purple); border-radius: 12px;
            padding: 12px; text-align: center; transition: 0.3s;
        }
        .nft-card.legendary { border-color: var(--gold); }
        .nft-icon { font-size: 40px; margin-bottom: 8px; display: block; }

        /* Navigatsiya */
        .nav { display: flex; background: rgba(0,0,0,0.9); position: fixed; bottom: 0; width: 100%; border-top: 1px solid var(--blue); }
        .nav-btn { flex: 1; padding: 18px; text-align: center; font-family: 'Orbitron'; font-size: 10px; opacity: 0.5; cursor: pointer; }
        .nav-btn.active { opacity: 1; color: var(--blue); background: rgba(0, 242, 255, 0.1); }

        /* FX */
        .pop { position: absolute; color: var(--blue); font-weight: bold; animation: popUp 0.8s forwards; pointer-events: none; font-family: 'Orbitron'; }
        @keyframes popUp { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="hud">
        <div class="label">CREDITS AVAILABLE</div>
        <div class="balance" id="balance">0</div>
        <div class="stats-row">
            <div class="stat-badge">TAP: +<span id="tap-p">1</span></div>
            <div class="stat-badge">AUTO: +<span id="auto-p">0</span>/s</div>
        </div>
    </div>

    <div id="city-tab" class="window active">
        <div class="game-zone">
            <div class="core-btn" id="main-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png">
            </div>
        </div>
    </div>

    <div id="up-tab" class="window">
        <div id="up-list"></div>
    </div>

    <div id="nft-tab" class="window">
        <div class="nft-grid" id="nft-list"></div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showTab('city-tab', this)">CITY</div>
        <div class="nav-btn" onclick="showTab('up-tab', this)">UPGRADES</div>
        <div class="nav-btn" onclick="showTab('nft-tab', this)">MARKET</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let game = {
            money: parseFloat(localStorage.getItem('ln_money')) || 0,
            lvls: JSON.parse(localStorage.getItem('ln_lvls')) || {u1:0, u2:0, u3:0, u4:0, u5:0, u6:0, u7:0, u8:0},
            nfts: JSON.parse(localStorage.getItem('ln_nfts')) || []
        };

        const upgrades = [
            { id: 'u1', name: 'Neural Link', base: 10, val: 2, type: 'tap' },
            { id: 'u2', name: 'Bento Bot', base: 50, val: 5, type: 'auto' },
            { id: 'u3', name: 'Cyber Miner', base: 200, val: 15, type: 'auto' },
            { id: 'u4', name: 'Pulse Chip', base: 500, val: 10, type: 'tap' },
            { id: 'u5', name: 'Data Hive', base: 1500, val: 50, type: 'auto' },
            { id: 'u6', name: 'Quantum CPU', base: 5000, val: 150, type: 'auto' },
            { id: 'u7', name: 'Void Core', base: 10000, val: 50, type: 'tap' },
            { id: 'u8', name: 'Galaxy Drive', base: 50000, val: 500, type: 'auto' }
        ];

        const nftMarket = Array.from({length: 16}, (_, i) => ({
            id: i,
            name: `NFT-X ${i+1}`,
            cost: (i + 1) * 15000,
            power: (i + 1) * 250,
            icon: ['🤖','🛰️','👽','👾','🐙','🔥','💎','⚡','🪐','🛸','⭐','🌌','🧿','🧬','🌀','🛡️'][i]
        }));

        function getStats() {
            let t = 1, a = 0;
            upgrades.forEach(u => {
                let l = game.lvls[u.id];
                if(u.type === 'tap') t += l * u.val; else a += l * u.val;
            });
            nftMarket.filter(n => game.nfts.includes(n.id)).forEach(n => a += n.power);
            return { t, a };
        }

        function render() {
            const s = getStats();
            document.getElementById('balance').innerText = Math.floor(game.money).toLocaleString();
            document.getElementById('tap-p').innerText = s.t;
            document.getElementById('auto-p').innerText = s.a;

            // Upgrades Render
            const upL = document.getElementById('up-list');
            upL.innerHTML = '';
            let chain = true;
            upgrades.forEach(u => {
                if(!chain) return;
                let l = game.lvls[u.id];
                let cost = Math.floor(u.base * Math.pow(1.5, l));
                upL.innerHTML += `
                    <div class="up-card">
                        <div>
                            <b>${u.name}</b> <small>(Lvl ${l}/10)</small>
                            <div class="progress-box"><div class="progress-bar" style="width:${l*10}%"></div></div>
                        </div>
                        <button class="buy-btn" onclick="buyUp('${u.id}', ${cost})" ${game.money < cost || l >= 10 ? 'disabled' : ''}>
                            ${l >= 10 ? 'MAX' : cost.toLocaleString()}
                        </button>
                    </div>`;
                if(l < 10) chain = false;
            });

            // NFT Render
            const nftL = document.getElementById('nft-list');
            nftL.innerHTML = '';
            nftMarket.forEach(n => {
                const own = game.nfts.includes(n.id);
                nftL.innerHTML += `
                    <div class="nft-card ${n.id > 12 ? 'legendary' : ''}">
                        <span class="nft-icon">${n.icon}</span>
                        <small>${n.name}</small><br>
                        <b style="color:var(--blue)">+${n.power}/s</b><br><br>
                        <button class="buy-btn" style="width:100%" onclick="buyNft(${n.id}, ${n.cost})" ${own || game.money < n.cost ? 'disabled' : ''}>
                            ${own ? 'OWNED' : n.cost.toLocaleString()}
                        </button>
                    </div>`;
            });

            localStorage.setItem('ln_money', game.money);
            localStorage.setItem('ln_lvls', JSON.stringify(game.lvls));
            localStorage.setItem('ln_nfts', JSON.stringify(game.nfts));
        }

        window.buyUp = (id, c) => { if(game.money >= c) { game.money -= c; game.lvls[id]++; render(); tg.HapticFeedback.impactOccurred('light'); } };
        window.buyNft = (id, c) => { if(game.money >= c) { game.money -= c; game.nfts.push(id); render(); tg.HapticFeedback.notificationOccurred('success'); } };

        document.getElementById('main-btn').onclick = (e) => {
            const s = getStats(); game.money += s.t;
            const p = document.createElement('div'); p.className = 'pop'; p.innerText = `+${s.t}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 800);
            render(); tg.HapticFeedback.impactOccurred('medium');
        };

        function showTab(id, btn) {
            document.querySelectorAll('.window, .nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        setInterval(() => { const s = getStats(); if(s.a > 0) { game.money += s.a/10; render(); } }, 100);
        render();
    </script>
</body>
</html>
