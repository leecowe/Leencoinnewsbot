<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leenova | Admin Ego OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;700&family=SF+Pro+Display:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ios-bg: #000000;
            --q-gold: #f3ba2f;
            --q-cyan: #00f2ff;
            --q-red: #ff3b30;
            --text-main: #FFFFFF;
            --admin-glow: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        body { background: var(--ios-bg); color: var(--text-main); margin: 0; height: 100vh; overflow: hidden; font-family: 'SF Pro Display', sans-serif; }

        /* Ego Chat */
        #ego-chatter { position: fixed; top: 110px; width: 100%; text-align: center; font-family: 'SF Mono', monospace; font-size: 11px; color: var(--q-gold); z-index: 1000; padding: 0 20px; box-sizing: border-box; transition: 0.3s; }

        /* Admin Tag */
        #role-tag { position: absolute; top: 60px; left: 20px; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--q-gold); color: var(--q-gold); text-transform: uppercase; }
        .tag-admin { border-color: var(--q-cyan) !important; color: var(--q-cyan) !important; box-shadow: var(--admin-glow); }

        .header { padding: 50px 20px 20px; text-align: center; }
        .q-bal { font-size: 52px; font-weight: 800; letter-spacing: -2px; text-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .avatar-zone { position: relative; width: 220px; height: 220px; margin: 30px auto; display: flex; align-items: center; justify-content: center; }
        .main-char { width: 80%; height: 80%; z-index: 10; cursor: pointer; transition: 0.1s; border-radius: 50%; }
        .main-char:active { transform: scale(0.9); }
        .admin-glow { filter: drop-shadow(0 0 15px var(--q-cyan)); }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; }

        /* Admin Panel */
        #admin-panel { display: none; margin: 15px 20px; padding: 15px; border: 1px solid var(--q-cyan); border-radius: 15px; background: rgba(0, 242, 255, 0.05); }

        .btn { background: var(--q-gold); color: #000; border: none; border-radius: 12px; padding: 15px; width: 100%; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .btn:disabled { background: #333; color: #666; }
        .btn-admin { background: var(--q-cyan); margin-bottom: 5px; }

        @keyframes float { 0% {opacity:1;} 100% {opacity:0; transform:translateY(-100px);} }
    </style>
</head>
<body>

<div id="role-tag">USER</div>
<div id="ego-chatter">SISTEMA YUKLANMOQDA...</div>

<header class="header">
    <div style="font-size: 10px; color: #888; text-transform: uppercase;">Sizning Balansingiz</div>
    <div class="q-bal" id="bal-ui">0.0</div>
</header>

<div class="avatar-zone">
    <img src="https://cdn-icons-png.flaticon.com/512/6028/6028676.png" class="main-char" id="avatar" onclick="handleTap(event)">
</div>

<div id="admin-panel">
    <div style="font-size: 10px; color: var(--q-cyan); font-weight: 800; margin-bottom: 10px;">ADMIN PANEL v1.0</div>
    <button class="btn btn-admin" onclick="adminAction('boost')">💰 +50K BALANS (INJECT)</button>
    <button class="btn btn-admin" style="background:#ff3b30" onclick="adminAction('reset')">⚠️ RESET ALL</button>
</div>

<div class="stats">
    <div class="card">
        <div style="font-size: 10px; color: var(--q-gold);">DARAXT DARAKASI</div>
        <div class="q-val" id="q-lvl" style="font-size: 20px; font-weight: 800;">1</div>
    </div>
    <div class="card">
        <div style="font-size: 10px; color: var(--q-gold);">QIYMATINGIZ</div>
        <div class="q-val" id="worth-ui" style="font-size: 16px; font-weight: 800;">MINIMAL</div>
    </div>
</div>

<div style="padding: 20px;">
    <button class="btn" id="evo-btn" onclick="quantumEvolution()">EVOLUTION</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. STATE (Ma'lumotlar bazasi)
    let state = {
        bal: 0,
        egoLevel: 1,
        isAdmin: false,
        tapCount: 0,
        worthLevels: ["MINIMAL", "AVERAGE", "WORTHY", "DEMI-GOD", "OVERLORD"]
    };

    // 2. FORMATTER (Sonlarni chiroyli qilish)
    function nFormat(n) {
        if (n < 1000) return n.toFixed(1);
        const units = ["", "K", "M", "B", "T"];
        const e = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(10, e * 3)).toFixed(1) + units[e];
    }

    // 3. EGO ENGINE (UI Yangilash)
    const EGO_ENGINE = {
        update: function() {
            document.getElementById('bal-ui').innerText = nFormat(state.bal);
            document.getElementById('q-lvl').innerText = state.egoLevel;
            
            let worthIdx = Math.min(Math.floor(state.bal / 5000), state.worthLevels.length - 1);
            document.getElementById('worth-ui').innerText = state.worthLevels[worthIdx];

            let cost = 100 * Math.pow(2, state.egoLevel - 1);
            const btn = document.getElementById('evo-btn');
            btn.innerText = state.bal >= cost ? "EVOLVE ME NOW" : `NEED ${nFormat(cost)}`;
            btn.disabled = state.bal < cost;

            this.checkAuthority();
        },

        checkAuthority: function() {
            // Agar 5-darajaga yetsa yoki 100K yig'sa ADMIN bo'ladi
            if ((state.egoLevel >= 5 || state.bal >= 100000) && !state.isAdmin) {
                state.isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('role-tag').innerText = "BOT ADMIN";
                document.getElementById('role-tag').className = "tag-admin";
                document.getElementById('avatar').classList.add('admin-glow');
                this.notify("HUQUQLAR TASDIQLANDI: SIZ ADMINSIZ!");
            }
        },

        notify: function(msg) {
            const chat = document.getElementById('ego-chatter');
            chat.innerText = msg;
            chat.style.color = "#00f2ff";
            setTimeout(() => { chat.style.color = "#f3ba2f"; }, 3000);
        }
    };

    // 4. ACTIONS (Harakatlar)
    function handleTap(e) {
        let gain = 1 + (state.egoLevel * 0.8);
        state.bal += gain;
        state.tapCount++;

        // Visual Pop
        const p = document.createElement('div');
        p.innerText = "+" + gain.toFixed(1);
        p.style.cssText = `position:fixed; left:${e.clientX}px; top:${e.clientY}px; color:#f3ba2f; font-weight:800; pointer-events:none; animation: float 0.8s forwards; z-index:1000;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);

        if(state.tapCount % 15 === 0) EGO_ENGINE.notify("TEZROQ BOS, ODAMCHA!");
        
        tg.HapticFeedback.impactOccurred('medium');
        EGO_ENGINE.update();
    }

    function quantumEvolution() {
        let cost = 100 * Math.pow(2, state.egoLevel - 1);
        if(state.bal >= cost) {
            state.bal -= cost;
            state.egoLevel++;
            tg.HapticFeedback.notificationOccurred('success');
            EGO_ENGINE.notify("EVOLYUTSIYA MUVAFFAQIYATLI!");
            EGO_ENGINE.update();
        }
    }

    function adminAction(type) {
        if(!state.isAdmin) return;
        if(type === 'boost') {
            state.bal += 50000;
            EGO_ENGINE.notify("SYSTEM INJECTED: +50K");
        } else if(type === 'reset') {
            if(confirm("HAMMASINI O'CHIRISH?")) location.reload();
        }
        EGO_ENGINE.update();
    }

    // Auto Gain
    setInterval(() => {
        state.bal += (state.egoLevel * 0.2);
        EGO_ENGINE.update();
    }, 1000);

    EGO_ENGINE.update();
</script>
</body>
</html>
