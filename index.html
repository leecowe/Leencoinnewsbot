<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --dark: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; background: var(--dark); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* HUD - Skrinshotdagi kabi silliq dizayn */
        .top-hud { padding: 40px 20px 10px; text-align: center; z-index: 100; flex-shrink: 0; }
        .bot-name { font-family: 'Orbitron'; color: var(--blue); font-size: 14px; letter-spacing: 2px; }
        .balance { font-family: 'Orbitron'; font-size: 52px; text-shadow: 0 0 20px var(--blue); margin: 5px 0; will-change: contents; }
        .stats-bar { display: flex; justify-content: center; gap: 15px; font-family: 'Orbitron'; font-size: 11px; }

        /* SECTIONS */
        .section { display: none; flex-grow: 1; overflow-y: auto; padding: 20px; position: relative; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .section.active { display: flex; flex-direction: column; }

        /* CORE - Optimallashtirilgan rasm qismi */
        .hero-zone { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .character-box { 
            width: 250px; height: 250px; border-radius: 50%; border: 3px solid var(--blue); 
            display: flex; align-items: center; justify-content: center; position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            cursor: pointer; transition: transform 0.05s ease-out; transform: translateZ(0); /* Hardware acceleration */
        }
        .character-box:active { transform: scale(0.92); }
        .character-img { width: 90%; height: 90%; pointer-events: none; }

        /* MARKET - Ro'yxatni silliq chiqarish */
        .up-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2); 
            border-radius: 12px; padding: 15px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .up-info b { font-family: 'Orbitron'; font-size: 14px; color: var(--blue); }
        .up-info span { font-size: 11px; color: #888; display: block; }
        .buy-btn { 
            background: #111; border: 1px solid #333; color: #666; 
            padding: 8px 12px; border-radius: 8px; font-family: 'Orbitron'; font-size: 12px; min-width: 80px;
        }
        .buy-btn.active { border-color: var(--blue); color: #fff; background: rgba(0, 242, 255, 0.1); }

        /* NAV - Pastki menyu */
        .nav { display: flex; height: 85px; background: #000; border-top: 1px solid rgba(0, 242, 255, 0.1); padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 10px; color: #444; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--blue); border-top: 2px solid var(--blue); background: linear-gradient(to top, rgba(0,242,255,0.05), transparent); }

        /* Animatsiyalar */
        .pop { position: absolute; color: var(--blue); font-family: 'Orbitron'; font-weight: bold; font-size: 26px; pointer-events: none; animation: fly 0.5s linear forwards; will-change: transform, opacity; z-index: 1000; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="top-hud">
    <div class="bot-name">AIRA PROTOCOL V1.0</div>
    <div class="balance" id="bal">0</div>
    <div class="stats-bar">
        <div style="color:var(--blue)">TAP: +<span id="t-pow">1</span></div>
        <div style="color:var(--pink)">AUTO: +<span id="a-pow">0</span>/s</div>
    </div>
</div>

<div id="core-sec" class="section active">
    <div class="hero-zone">
        <div class="character-box" id="tap-btn">
            <svg class="character-img" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#00f2ff" stroke-width="2" fill="rgba(0,242,255,0.1)"/>
                <circle cx="35" cy="40" r="5" fill="#00f2ff"/>
                <circle cx="65" cy="40" r="5" fill="#00f2ff"/>
                <path d="M30 65 Q50 85 70 65" stroke="#00f2ff" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
    </div>
</div>

<div id="market-sec" class="section">
    <h3 style="font-family:Orbitron; color:var(--blue); text-align:center; margin-bottom:15px;">MARKET</h3>
    <div id="up-list"></div>
</div>

<div id="nft-sec" class="section">
    <h3 style="font-family:Orbitron; color:var(--pink); text-align:center; margin-top:50px;">NFT GEAR</h3>
    <p style="text-align:center; color:#555; font-size:14px; margin-top:10px;">Tez kunda...</p>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showSec('core', this)"><b>CORE</b></div>
    <div class="nav-item" onclick="showSec('market', this)"><b>MARKET</b></div>
    <div class="nav-item" onclick="showSec('nft', this)"><b>NFT</b></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let data = {
        m: parseFloat(localStorage.getItem('aira_m')) || 0,
        l: JSON.parse(localStorage.getItem('aira_l')) || {u1:0, u2:0, u3:0}
    };

    const upgrades = [
        { id: 'u1', name: 'Neural Chip', desc: 'Tap kuchini oshiradi', base: 100, bonus: 2, type: 'tap' },
        { id: 'u2', name: 'Aira Drone', desc: 'Avtomatik daromad', base: 500, bonus: 5, type: 'auto' },
        { id: 'u3', name: 'Quantum CPU', desc: 'Super tezkor ishlash', base: 2000, bonus: 20, type: 'auto' }
    ];

    function getStats() {
        let t = 1, a = 0;
        upgrades.forEach(u => {
            const lvl = data.l[u.id] || 0;
            if(u.type==='tap') t += lvl * u.bonus;
            else a += lvl * u.bonus;
        });
        return { t, a };
    }

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        el.classList.add('active');
        if(id === 'market') updateMarket();
    }

    function updateMarket() {
        const list = document.getElementById('up-list');
        list.innerHTML = upgrades.map(u => {
            const lvl = data.l[u.id] || 0;
            const cost = Math.floor(u.base * Math.pow(1.15, lvl));
            const canBuy = data.m >= cost;
            return `
                <div class="up-card">
                    <div class="up-info">
                        <b>${u.name}</b>
                        <span>Lvl ${lvl} | +${u.bonus}${u.type==='tap'?' tap':'/s'}</span>
                    </div>
                    <button class="buy-btn ${canBuy?'active':''}" onclick="buyU('${u.id}', ${cost})" ${!canBuy?'disabled':''}>
                        ${cost}
                    </button>
                </div>`;
        }).join('');
    }

    window.buyU = (id, c) => {
        if(data.m >= c) {
            data.m -= c;
            data.l[id] = (data.l[id] || 0) + 1;
            updateUI(); updateMarket();
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    function updateUI() {
        const s = getStats();
        document.getElementById('bal').innerText = Math.floor(data.m).toLocaleString();
        document.getElementById('t-pow').innerText = s.t;
        document.getElementById('a-pow').innerText = s.a;
        localStorage.setItem('aira_m', data.m);
        localStorage.setItem('aira_l', JSON.stringify(data.l));
    }

    // Touch events optimizatsiyasi
    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const s = getStats();
        data.m += s.t;
        
        // UI-ni tezkor yangilash
        document.getElementById('bal').innerText = Math.floor(data.m).toLocaleString();

        const touch = e.touches[0];
        const p = document.createElement('div');
        p.className = 'pop'; p.innerText = '+' + s.t;
        p.style.left = touch.clientX - 20 + 'px'; 
        p.style.top = touch.clientY - 20 + 'px';
        document.body.appendChild(p);
        
        setTimeout(() => p.remove(), 500);
        tg.HapticFeedback.impactOccurred('light'); // Eng yengil vibratsiya kechikmaslik uchun
    }, {passive: false});

    // Orqa fon animatsiyasini optimallashtirish (FPS barqarorligi uchun)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d', {alpha: false}); // Alpha false tezroq ishlaydi
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let stars = Array.from({length: 40}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*0.5 }));

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = 'rgba(0, 242, 255, 0.4)';
        for(let s of stars) {
            ctx.fillRect(s.x, s.y, 1, 1);
            s.y += s.v;
            if(s.y > canvas.height) s.y = 0;
        }
        requestAnimationFrame(draw);
    }

    // Ma'lumotlarni saqlash va avto-daromad
    setInterval(() => {
        const s = getStats();
        if(s.a > 0) {
            data.m += s.a / 10;
            updateUI();
        }
    }, 100);

    draw(); updateUI();
</script>
</body>
</html>
