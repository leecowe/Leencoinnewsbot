<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova Cyber City</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --dark: #01080e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow: hidden; display: flex; flex-direction: column; }

        /* DYNAMIC BACKGROUND (Rasmdagidek shahar effekti) */
        #bg-city { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.6) contrast(1.2); }

        /* HUD OVERLAY */
        .top-hud { padding: 40px 20px 10px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); text-align: center; }
        .balance { font-family: 'Orbitron'; font-size: 38px; color: #fff; text-shadow: 0 0 15px var(--blue); letter-spacing: 2px; }
        
        /* CITY VIEW (Main Zone) */
        .city-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* CYBER CHARACTER / BUTTON */
        .character-glow { width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, rgba(0,242,255,0.2) 0%, transparent 70%); display: flex; align-items: center; justify-content: center; position: relative; }
        .main-btn { width: 180px; height: 180px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 20px var(--blue)); }
        .main-btn:active { transform: scale(0.9); }

        /* FLOATING UI (Rasmdagi yon tugmalar) */
        .side-menu { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 15px; }
        .side-btn { width: 45px; height: 45px; border: 1px solid var(--blue); border-radius: 8px; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--blue); box-shadow: 0 0 10px rgba(0,242,255,0.3); }

        /* SLIDING MARKET (Pastdan chiqadigan panel) */
        .market-overlay { position: fixed; bottom: -70vh; left: 0; width: 100%; height: 70vh; background: rgba(1, 8, 14, 0.95); border-top: 2px solid var(--blue); border-radius: 25px 25px 0 0; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 2000; padding: 20px; overflow-y: auto; }
        .market-overlay.open { bottom: 0; }
        .close-market { text-align: center; color: var(--blue); margin-bottom: 20px; font-family: 'Orbitron'; font-size: 12px; }

        /* CARDS */
        .up-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,242,255,0.1); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: rgba(0,242,255,0.1); border: 1px solid var(--blue); color: #fff; padding: 8px 15px; border-radius: 6px; font-family: 'Orbitron'; font-size: 11px; }

        /* NAV */
        .nav { display: flex; height: 70px; background: #000; border-top: 1px solid var(--blue); position: relative; z-index: 3000; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 10px; color: #444; }
        .nav-item.active { color: var(--blue); background: rgba(0,242,255,0.1); border-top: 3px solid var(--blue); }
    </style>
</head>
<body>

    <img id="bg-city" src="https://images.unsplash.com/photo-1605142859862-978be7eba909?q=80&w=2070&auto=format&fit=crop" alt="Cyber City">

    <div class="top-hud">
        <div class="balance" id="bal">0</div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:5px;">
            <div style="font-size:12px; color:var(--blue); font-family:Orbitron;">T: +<span id="t-pow">0</span></div>
            <div style="font-size:12px; color:var(--pink); font-family:Orbitron;">A: +<span id="a-pow">0</span>/s</div>
        </div>
    </div>

    <div class="city-zone">
        <div class="side-menu">
            <div class="side-btn">⚙️</div>
            <div class="side-btn">🛡️</div>
            <div class="side-btn">❓</div>
            <div class="side-btn">🧪</div>
        </div>

        <div class="character-glow">
            <img class="main-btn" id="tap-btn" src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png">
        </div>
    </div>

    <div id="market-panel" class="market-overlay">
        <div class="close-market" onclick="toggleMarket()">▼ MARKETNI YOPISH ▼</div>
        <div id="up-list"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="toggleMarket(false)">CITY</div>
        <div class="nav-item" onclick="toggleMarket(true)">UPGRADES</div>
        <div class="nav-item">NFT</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let data = {
            m: parseFloat(localStorage.getItem('f_m')) || 222391,
            l: JSON.parse(localStorage.getItem('f_l')) || {u1:22, u2:17, u3:14, u4:11, u5:9, u6:6}
        };

        const ups = [
            { id: 'u1', name: 'Neural Link', base: 50, val: 20, type: 'tap' },
            { id: 'u2', name: 'Bento Bot', base: 300, val: 120, type: 'auto' },
            { id: 'u3', name: 'Cyber Miner', base: 1500, val: 550, type: 'auto' },
            { id: 'u4', name: 'Nano Pulse', base: 8000, val: 400, type: 'tap' },
            { id: 'u5', name: 'Quantum Core', base: 45000, val: 3500, type: 'auto' },
            { id: 'u6', name: 'Titan Server', base: 250000, val: 15000, type: 'auto' }
        ];

        function getStats() {
            let t = 1, a = 0;
            ups.forEach(u => { 
                if(u.type==='tap') t += data.l[u.id]*u.val; else a += data.l[u.id]*u.val;
            });
            return { t, a };
        }

        function toggleMarket(open) {
            const panel = document.getElementById('market-panel');
            if(open) panel.classList.add('open');
            else panel.classList.remove('open');
        }

        function updateUI() {
            const s = getStats();
            document.getElementById('bal').innerText = Math.floor(data.m).toLocaleString();
            document.getElementById('t-pow').innerText = s.t.toLocaleString();
            document.getElementById('a-pow').innerText = s.a.toLocaleString();

            const container = document.getElementById('up-list');
            container.innerHTML = '';
            ups.forEach(u => {
                const cost = Math.floor(u.base * Math.pow(1.6, data.l[u.id]));
                container.innerHTML += `
                    <div class="up-card">
                        <div><b>${u.name} (Lvl ${data.l[u.id]})</b></div>
                        <button class="buy-btn" onclick="buyU('${u.id}', ${cost})">${cost.toLocaleString()}</button>
                    </div>`;
            });
            localStorage.setItem('f_m', data.m);
            localStorage.setItem('f_l', JSON.stringify(data.l));
        }

        window.buyU = (id, c) => {
            if(data.m >= c) {
                data.m -= c; data.l[id]++;
                updateUI(); tg.HapticFeedback.impactOccurred('medium');
            }
        };

        document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const s = getStats(); data.m += s.t;
            updateUI(); tg.HapticFeedback.impactOccurred('light');
        });

        setInterval(() => {
            const s = getStats();
            if(s.a > 0) {
                data.m += s.a / 10;
                document.getElementById('bal').innerText = Math.floor(data.m).toLocaleString();
            }
        }, 100);

        updateUI();
    </script>
</body>
</html>
