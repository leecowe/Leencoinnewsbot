<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leenova | Frieren Journey</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --frieren-gold: #e5c17d;
            --mana-cyan: #9de7ff;
            --magic-purple: #a682ac;
            --bg-dark: #07090c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background: var(--bg-dark);
            color: #fff;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Sehrli Fon */
        .magic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #111822 0%, #07090c 100%);
            z-index: -1;
        }

        /* Aylana Sehrli Doira */
        .magic-circle {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px; height: 320px;
            border: 1px solid rgba(157, 231, 255, 0.1);
            border-radius: 50%;
            animation: rotateCircle 60s linear infinite;
        }

        @keyframes rotateCircle { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Yuqori panel */
        .header { padding: 50px 20px 10px; display: flex; justify-content: space-between; position: relative; z-index: 100; }
        .badge { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--frieren-gold); 
            border-radius: 12px; 
            padding: 5px 12px; 
            font-family: 'Cinzel'; 
            font-size: 10px; 
            color: var(--frieren-gold);
            text-transform: uppercase;
        }

        /* O'yin maydoni */
        .game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .balance-txt { 
            font-family: 'Cinzel'; 
            font-size: 48px; 
            font-weight: 700; 
            text-shadow: 0 0 20px var(--mana-cyan); 
            margin-bottom: 20px; 
        }

        .frieren-box { position: relative; cursor: pointer; transition: transform 0.1s; }
        .frieren-box:active { transform: scale(0.95); }

        .frieren-avatar {
            width: 250px; height: 250px;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(157, 231, 255, 0.4));
            z-index: 10;
        }

        /* Mana Progress */
        .hud { width: 85%; margin-top: 30px; }
        .hud-label { display: flex; justify-content: space-between; font-family: 'Cinzel'; font-size: 10px; color: var(--mana-cyan); margin-bottom: 8px; }
        .bar-outer { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .bar-inner { height: 100%; background: linear-gradient(90deg, #5ecfff, #a682ac); box-shadow: 0 0 10px #5ecfff; transition: width 0.3s; }

        /* Effektlar */
        .magic-particle {
            position: fixed; pointer-events: none;
            font-family: 'Cinzel'; font-weight: 700;
            color: var(--mana-cyan); text-shadow: 0 0 10px var(--mana-cyan);
            animation: magicRise 0.8s ease-out forwards;
            z-index: 1000;
        }

        @keyframes magicRise {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.6); opacity: 0; }
        }

        /* Pastki Menyu */
        .nav {
            background: rgba(10, 14, 20, 0.98);
            display: grid; grid-template-columns: repeat(3, 1fr);
            padding: 15px 10px 35px;
            border-top: 1px solid rgba(229, 193, 125, 0.2);
        }

        .nav-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.4; transition: 0.3s; color: #fff; background: none; border: none; cursor: pointer; }
        .nav-btn.active { opacity: 1; color: var(--mana-cyan); }
        .nav-btn span { font-size: 9px; font-family: 'Cinzel'; margin-top: 5px; }

        /* Do'kon oynasi */
        .screen { display: none; position: fixed; inset: 0; background: #07090c; z-index: 500; padding: 60px 20px; }
        .screen.active { display: block; }
        .upgrade-card { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--frieren-gold); 
            padding: 15px; border-radius: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div class="magic-bg"></div>
    <div class="magic-circle"></div>

    <div class="header">
        <div class="badge" id="lvl-txt">LVL 1 MAGE</div>
        <div class="badge" id="rank-txt" style="border-color: #a682ac; color: #a682ac;">Apprentice</div>
    </div>

    <div class="game-area" id="main-area">
        <div class="balance-txt" id="bal-ui">0.0</div>
        
        <div class="frieren-box" id="tap-target">
            <img src="https://files.catbox.moe/0v9j6z.png" class="frieren-avatar" id="frieren-img">
        </div>

        <div class="hud">
            <div class="hud-label">
                <span>MANA STABILITY</span>
                <span id="mana-text">1000 / 1000</span>
            </div>
            <div class="bar-outer">
                <div class="bar-inner" id="mana-bar"></div>
            </div>
        </div>
    </div>

    <div id="shop-screen" class="screen">
        <h2 style="font-family: 'Cinzel'; color: var(--frieren-gold); margin-bottom: 20px;">Magic Grimoires</h2>
        
        <div class="upgrade-card">
            <div>
                <div style="font-weight: bold; font-family: 'Cinzel';">Zoltraak Power</div>
                <div style="font-size: 11px; color: #aaa;">Har bir tap uchun +1 kuch</div>
            </div>
            <button onclick="buyUpgrade()" style="background: var(--frieren-gold); border:none; padding: 8px 15px; border-radius: 8px; font-weight: bold;" id="upgrade-btn">100</button>
        </div>

        <button onclick="toggleShop(false)" style="margin-top: 30px; width: 100%; padding: 15px; background: none; border: 1px solid var(--frieren-gold); color: #fff; font-family: 'Cinzel'; border-radius: 10px;">Back to Journey</button>
    </div>

    <nav class="nav">
        <button class="nav-btn active" id="btn-cast" onclick="toggleShop(false)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            <span>CAST</span>
        </button>
        <button class="nav-btn" id="btn-shop" onclick="toggleShop(true)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
            <span>SHOP</span>
        </button>
        <button class="nav-btn" onclick="tg.close()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
            <span>EXIT</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // O'yin ma'lumotlari
        let state = {
            bal: 0,
            mana: 1000,
            maxMana: 1000,
            power: 1,
            lvl: 1,
            upgradeCost: 100
        };

        // UI-ni yangilash funksiyasi
        function updateUI() {
            document.getElementById('bal-ui').innerText = state.bal.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});
            document.getElementById('mana-text').innerText = `${Math.floor(state.mana)} / ${state.maxMana}`;
            document.getElementById('mana-bar').style.width = (state.mana / state.maxMana * 100) + "%";
            document.getElementById('lvl-txt').innerText = `Mage LVL ${state.lvl}`;
            document.getElementById('upgrade-btn').innerText = Math.round(state.upgradeCost);
            
            const rankTxt = document.getElementById('rank-txt');
            if (state.lvl < 5) rankTxt.innerText = "Apprentice";
            else if (state.lvl < 15) rankTxt.innerText = "Mage";
            else rankTxt.innerText = "Great Sage";
        }

        // Tap qilish
        const target = document.getElementById('tap-target');
        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touches = e.changedTouches;

            for (let i = 0; i < touches.length; i++) {
                if (state.mana >= 1) {
                    state.mana -= 1;
                    state.bal += state.power;
                    
                    createParticle(touches[i].clientX, touches[i].clientY);
                    tg.HapticFeedback.impactOccurred('medium');
                } else {
                    tg.HapticFeedback.notificationOccurred('warning');
                }
            }
            updateUI();
        });

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'magic-particle';
            p.innerText = "✧ +" + state.power.toFixed(1);
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        // Do'kon mantiqi
        function toggleShop(show) {
            document.getElementById('shop-screen').classList.toggle('active', show);
            document.getElementById('btn-shop').classList.toggle('active', show);
            document.getElementById('btn-cast').classList.toggle('active', !show);
            tg.HapticFeedback.selectionChanged();
        }

        function buyUpgrade() {
            if (state.bal >= state.upgradeCost) {
                state.bal -= state.upgradeCost;
                state.power += 0.5;
                state.lvl += 1;
                state.upgradeCost *= 1.6;
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Mana tiklanishi
        setInterval(() => {
            if (state.mana < state.maxMana) {
                state.mana = Math.min(state.maxMana, state.mana + 2);
                updateUI();
            }
        }, 1000);

        // Boshlash
        updateUI();
    </script>
</body>
</html>
