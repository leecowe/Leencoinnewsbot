<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mega Farm - Simple & Fast</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #f3ba2f;
            --bg: #121212;
            --card: #1e1e1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tepada balans */
        .header {
            padding: 30px 20px;
            text-align: center;
        }

        .balance-label { font-size: 14px; color: #888; margin-bottom: 5px; }
        .balance-value { font-size: 48px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .coin { width: 40px; height: 40px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 20px rgba(243, 186, 47, 0.4); }

        /* Asosiy bosish maydoni */
        .click-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-circle {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, #2a2a2a 0%, #151515 100%);
            border-radius: 50%;
            border: 10px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            cursor: pointer;
            transition: transform 0.05s;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .main-circle:active { transform: scale(0.94); }

        /* Pastki statisika va upgrade */
        .footer {
            background: var(--card);
            padding: 25px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }

        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: bold; color: var(--gold); }
        .stat-name { font-size: 11px; color: #888; text-transform: uppercase; }

        .upgrade-btn {
            width: 100%;
            background: var(--gold);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .upgrade-btn:disabled { background: #444; color: #777; }

        /* Tap effekti */
        .tap {
            position: absolute;
            font-size: 32px;
            font-weight: 900;
            color: white;
            pointer-events: none;
            animation: fly 0.7s forwards;
            z-index: 100;
        }

        @keyframes fly {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <p class="balance-label">Sizning balansingiz</p>
        <div class="balance-value">
            <div class="coin"></div>
            <span id="bal">0</span>
        </div>
    </div>

    <div class="click-area">
        <div class="main-circle" id="tap">🚜</div>
    </div>

    <div class="footer">
        <div class="stats">
            <div>
                <span class="stat-name">Har soniya</span>
                <span class="stat-val" id="pps">+0</span>
            </div>
            <div>
                <span class="stat-name">Har bir bosish</span>
                <span class="stat-val" id="pwr">1</span>
            </div>
        </div>

        <button class="upgrade-btn" id="buy">
            <span>Avto-Kombayn 🤖</span>
            <span id="cost">50</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let data = JSON.parse(localStorage.getItem('megaFarm')) || {
            coins: 0,
            pps: 0,
            pwr: 1,
            cost: 50
        };

        function ui() {
            document.getElementById('bal').innerText = Math.floor(data.coins).toLocaleString();
            document.getElementById('pps').innerText = "+" + data.pps;
            document.getElementById('pwr').innerText = data.pwr;
            document.getElementById('cost').innerText = data.cost;
            document.getElementById('buy').disabled = data.coins < data.cost;
            localStorage.setItem('megaFarm', JSON.stringify(data));
        }

        // Clicker - Multi-touch qo'shildi
        document.getElementById('tap').addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.targetTouches.length; i++) {
                data.coins += data.pwr;
                const t = e.targetTouches[i];
                const anim = document.createElement('div');
                anim.className = 'tap';
                anim.innerText = "+" + data.pwr;
                anim.style.left = t.clientX + "px";
                anim.style.top = t.clientY + "px";
                document.body.appendChild(anim);
                setTimeout(() => anim.remove(), 700);
            }
            tg.HapticFeedback.impactOccurred('medium');
            ui();
        });

        // Upgrade
        document.getElementById('buy').onclick = () => {
            if (data.coins >= data.cost) {
                data.coins -= data.cost;
                data.pps += 1;
                data.cost = Math.floor(data.cost * 1.5);
                tg.HapticFeedback.notificationOccurred('success');
                ui();
            }
        };

        // Avto-daromad
        setInterval(() => {
            if (data.pps > 0) {
                data.coins += data.pps;
                ui();
            }
        }, 1000);

        ui();
    </script>
</body>
</html>
