<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mega Farm 3D - GOD MODE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #f3ba2f; --bg: #050505; --panel: rgba(255, 255, 255, 0.05); --combo: #ff4747; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .test-badge { position: fixed; top: 15px; left: 15px; background: rgba(255, 0, 0, 0.6); backdrop-filter: blur(5px); padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 1000; border: 1px solid rgba(255, 0, 0, 0.3); }

        /* UI */
        .ui-container { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; pointer-events: none; z-index: 10; }
        .header { padding: 40px 20px; text-align: center; }
        .balance-card { background: var(--panel); backdrop-filter: blur(15px); display: inline-block; padding: 10px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .balance-value { font-size: 44px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(243, 186, 47, 0.6); }

        /* Combo Counter */
        #combo-ui { position: absolute; top: 150px; right: 20px; text-align: right; opacity: 0; transition: 0.3s; }
        .combo-text { font-size: 40px; font-weight: 900; color: var(--combo); font-style: italic; }

        #canvas-container { flex-grow: 1; position: relative; touch-action: none; pointer-events: auto; }

        .footer { padding: 30px 20px; pointer-events: auto; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        .hud { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--panel); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { display: block; font-size: 20px; font-weight: 800; }

        .upgrade-btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 22px; font-size: 18px; font-weight: 900; display: flex; justify-content: space-between; align-items: center; }
        .upgrade-btn:active { transform: scale(0.95); }

        .floating-n { position: absolute; font-weight: 900; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translate(-50%, 0) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150px) scale(1.8); opacity: 0; } }
    </style>
</head>
<body>

    <div class="test-badge">GOD MODE: TEST_REJIM_ON</div>

    <div class="ui-container">
        <div class="header">
            <div class="balance-card">
                <div class="balance-value" id="bal">0</div>
            </div>
        </div>

        <div id="combo-ui">
            <div class="stat-label">COMBO</div>
            <div class="combo-text" id="combo-multiplier">x1</div>
        </div>
        
        <div id="canvas-container"></div>

        <div class="footer">
            <div class="hud">
                <div class="stat-card">
                    <span class="stat-val" style="color:var(--gold)" id="pps">+0</span>
                    <span class="stat-label">Farming / s</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" style="color:#fff" id="pwr">1</span>
                    <span class="stat-label">Power / Tap</span>
                </div>
            </div>
            <button class="upgrade-btn" id="buy">
                <span>🚀 MEGA UPGRADE</span>
                <span id="cost">1</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = JSON.parse(localStorage.getItem('megaFarmGod')) || {
            coins: 0, pps: 0, pwr: 1, cost: 1, combo: 0, lastTap: 0
        };

        // --- THREE.JS ENGINE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const geometry = new THREE.OctahedronGeometry(2, 0); 
        const material = new THREE.MeshPhongMaterial({ color: 0xf3ba2f, flatShading: true, shininess: 100 });
        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        const light = new THREE.PointLight(0xffffff, 2, 50);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));
        camera.position.z = 6;

        let rotationSpeed = 0.01;
        function animate() {
            requestAnimationFrame(animate);
            core.rotation.y += rotationSpeed;
            core.rotation.x += rotationSpeed / 2;
            renderer.render(scene, camera);
        }
        animate();

        // --- FARMING LOGIC ---
        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(state.coins).toLocaleString();
            document.getElementById('pps').innerText = `+${(state.pps).toFixed(1)}`;
            document.getElementById('pwr').innerText = state.pwr;
            document.getElementById('buy').disabled = state.coins < (1); 
            localStorage.setItem('megaFarmGod', JSON.stringify(state));
        }

        container.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            
            // Combo Tizimi
            if (now - state.lastTap < 300) {
                state.combo++;
            } else {
                state.combo = 0;
            }
            state.lastTap = now;

            const multiplier = 1 + Math.floor(state.combo / 5);
            const isCrit = Math.random() < 0.1;
            const finalPwr = state.pwr * multiplier * (isCrit ? 5 : 1);

            state.coins += finalPwr;

            // Visual Reaksiya
            core.scale.set(1.4, 1.4, 1.4);
            setTimeout(() => core.scale.set(1, 1, 1), 100);
            rotationSpeed = 0.01 + (state.combo * 0.005);
            
            // UI Combo
            const comboUI = document.getElementById('combo-ui');
            if(state.combo > 2) {
                comboUI.style.opacity = 1;
                document.getElementById('combo-multiplier').innerText = `x${multiplier}`;
            } else {
                comboUI.style.opacity = 0;
            }

            // Floating Numbers
            for (let i = 0; i < e.targetTouches.length; i++) {
                const t = e.targetTouches[i];
                const n = document.createElement('div');
                n.className = 'floating-n';
                n.innerText = `+${finalPwr}`;
                n.style.color = isCrit ? '#ff4747' : '#fff';
                n.style.fontSize = isCrit ? '45px' : '30px';
                n.style.left = `${t.clientX}px`;
                n.style.top = `${t.clientY}px`;
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 600);
            }

            tg.HapticFeedback.impactOccurred(isCrit ? 'heavy' : 'medium');
            updateUI();
        });

        // Upgrade (Test Rejimida doim 1)
        document.getElementById('buy').onclick = () => {
            if (state.coins >= 1) {
                state.coins -= 1;
                state.pps += 1.5; // Auto farmingni kuchaytirdik
                state.pwr += 2;   // Tapni kuchaytirdik
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        };

        // Smooth Auto-Farming (Har 100ms da bir marta)
        setInterval(() => {
            if (state.pps > 0) {
                state.coins += (state.pps / 10);
                updateUI();
            }
        }, 100);

        updateUI();
    </script>
</body>
</html>
