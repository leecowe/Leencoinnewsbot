<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol V1.0 - Ultra HD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS ENGINE V3.0 --- */
        :root {
            --cyan: #00f2ff;
            --pink: #ff007f;
            --gold: #ffea00;
            --deep: #050a10;
            --glass: rgba(0, 242, 255, 0.05);
            --border: rgba(0, 242, 255, 0.2);
            --shadow: 0 0 25px rgba(0, 242, 255, 0.4);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
            user-select: none;
        }

        body {
            background: var(--deep);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 50% 50%, #0a1f35 0%, #050a10 100%);
        }

        /* Ambient Background Particles */
        #fx-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            filter: blur(1px);
        }

        /* --- HIGH-END UI HEADER --- */
        .test-indicator {
            background: var(--gold);
            color: #000;
            font-family: 'Orbitron';
            font-size: 8px;
            text-align: center;
            padding: 4px;
            font-weight: 900;
            letter-spacing: 3px;
            box-shadow: 0 5px 15px rgba(255, 234, 0, 0.3);
            z-index: 1000;
        }

        .header-ui {
            padding: 40px 20px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header-ui::after {
            content: '';
            position: absolute;
            bottom: 0; left: 15%; width: 70%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        }

        .balance-container {
            margin: 15px 0;
        }

        .balance-label {
            font-family: 'Orbitron';
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 5px;
            opacity: 0.8;
        }

        .main-balance {
            font-family: 'Orbitron';
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 30%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(0, 242, 255, 0.6));
            letter-spacing: -2px;
        }

        .hud-grid {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 5px;
        }

        .hud-item {
            font-family: 'Orbitron';
            font-size: 10px;
            text-transform: uppercase;
        }

        .hud-item b { color: var(--cyan); text-shadow: 0 0 5px var(--cyan); }
        .hud-item.flow b { color: var(--pink); text-shadow: 0 0 5px var(--pink); }

        /* --- VIEWPORT ENGINE --- */
        .viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .scene {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            padding: 20px;
            overflow-y: auto;
            mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
        }

        .scene.active { display: block; animation: sceneEnter 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1); }

        @keyframes sceneEnter {
            from { opacity: 0; transform: scale(1.05) translateY(10px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* --- CORE PAGE: ROBOT 2.0 --- */
        .robot-stage {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .orb-outer {
            width: 280px; height: 280px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            position: relative;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 75%);
            box-shadow: inset 0 0 50px rgba(0, 242, 255, 0.1);
        }

        .orb-inner {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            background: #000;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            transition: 0.1s;
            cursor: pointer;
            z-index: 5;
        }

        .orb-inner:active { transform: scale(0.92) rotate(3deg); border-color: #fff; }

        .svg-robot { width: 120px; filter: drop-shadow(0 0 10px var(--cyan)); }

        /* --- MARKET & NFT CARDS REDESIGN --- */
        .section-title {
            font-family: 'Orbitron';
            font-size: 14px;
            color: var(--cyan);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .cyber-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .cyber-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--cyan);
        }

        .cyber-card.nft::before { background: var(--pink); }

        .card-meta b { font-family: 'Orbitron'; font-size: 15px; display: block; margin-bottom: 4px; }
        .card-meta span { font-size: 11px; color: #7a8c99; font-weight: 600; text-transform: uppercase; }

        .btn-prime {
            background: var(--cyan);
            color: #000;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-family: 'Orbitron';
            font-weight: 800;
            font-size: 11px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .btn-prime:disabled { background: #1a1a1a; color: #444; box-shadow: none; }

        /* --- NFT GRID SYSTEM --- */
        .nft-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-bottom: 100px;
        }

        .nft-item {
            background: rgba(10, 20, 30, 0.8);
            border: 1px solid rgba(255, 0, 127, 0.2);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .nft-item.active { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .nft-icon {
            width: 60px; height: 60px;
            margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(255,0,127,0.1), transparent);
            border-radius: 50%;
        }

        .nft-item.active .nft-icon { background: radial-gradient(circle, rgba(0,242,255,0.1), transparent); }

        /* --- NAVIGATION --- */
        .bottom-nav {
            height: 90px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--border);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
            backdrop-filter: blur(20px);
        }

        .nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4b5a67;
            font-family: 'Orbitron';
            font-size: 9px;
            gap: 6px;
            transition: 0.3s;
            position: relative;
        }

        .nav-link.active { color: var(--cyan); }
        .nav-link.active::after {
            content: ''; position: absolute; top: -1px; width: 40px; height: 3px; background: var(--cyan); border-radius: 0 0 5px 5px; box-shadow: 0 0 10px var(--cyan);
        }

        /* --- ANIMATIONS --- */
        .tap-pop {
            position: absolute;
            font-family: 'Orbitron';
            font-weight: 900;
            color: var(--cyan);
            font-size: 28px;
            pointer-events: none;
            animation: popUp 0.7s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            text-shadow: 0 0 10px var(--cyan);
            z-index: 100;
        }

        @keyframes popUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="test-indicator">SYSTEM STATUS: FULL TEST ACCESS 🧪</div>
<canvas id="fx-canvas"></canvas>

<div class="header-ui">
    <div class="balance-label">TOTAL CAPITAL</div>
    <div class="balance-container">
        <span class="main-balance" id="display-balance">0.00</span>
    </div>
    <div class="hud-grid">
        <div class="hud-item">Power: <b id="ui-tap">1</b></div>
        <div class="hud-item flow">Mining: <b id="ui-flow">0</b>/s</div>
    </div>
</div>

<div class="viewport">
    <div id="view-core" class="scene active">
        <div class="robot-stage">
            <div class="orb-outer">
                <div class="orb-inner" id="main-tap-zone">
                    <svg class="svg-robot" viewBox="0 0 100 100">
                        <path d="M20 40 Q50 30 80 40 L80 70 Q50 80 20 70 Z" fill="none" stroke="var(--cyan)" stroke-width="2"/>
                        <rect x="35" y="48" width="10" height="4" rx="2" fill="var(--cyan)">
                            <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
                        </rect>
                        <rect x="55" y="48" width="10" height="4" rx="2" fill="var(--cyan)">
                            <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
                        </rect>
                        <path d="M40 65 Q50 68 60 65" stroke="var(--cyan)" fill="none" stroke-width="1.5"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div id="view-market" class="scene">
        <h2 class="section-title">Upgrade Matrix</h2>
        <div id="market-injector"></div>
    </div>

    <div id="view-nft" class="scene">
        <h2 class="section-title">Aira NFT Units</h2>
        <div class="nft-container" id="nft-injector"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-link active" onclick="switchView('core', this)">CORE</div>
    <div class="nav-link" onclick="switchView('market', this)">MARKET</div>
    <div class="nav-link" onclick="switchView('nft', this)">NFT</div>
</div>

<script>
    /* --- AIRA ENGINE V4.0 --- */
    const tg = window.Telegram.WebApp;
    const storage = tg.CloudStorage;
    tg.expand();
    tg.setHeaderColor('#050a10');

    let state = {
        coins: parseFloat(localStorage.getItem('aira_c')) || 0,
        upgrades: JSON.parse(localStorage.getItem('aira_u')) || { u1: 0, u2: 0, u3: 0 },
        nfts: JSON.parse(localStorage.getItem('aira_n')) || []
    };

    const marketMap = [
        { id: 'u1', name: 'Neural Link', bonus: 10, info: 'Enhances tap capacity via synapse connection.' },
        { id: 'u2', name: 'Nano Swarm', bonus: 25, info: 'Self-replicating drones for background mining.' },
        { id: 'u3', name: 'Quantum Node', bonus: 150, info: 'Sub-atomic processing for massive yield.' }
    ];

    // Jami 100 ta NFT generatsiyasi
    const nftCatalog = Array.from({length: 100}, (_, i) => ({
        id: 'nft_' + i,
        name: 'Sentinel X-' + (i + 1),
        power: Math.floor(25 * Math.pow(1.12, i)),
        desc: 'Class ' + (i < 30 ? 'C' : i < 70 ? 'B' : 'A') + ' autonomous mining unit.'
    }));

    /* --- BALANS FORMATTER (K, M, B, T) --- */
    function formatBal(num) {
        if (num < 1e3) return num.toFixed(2);
        if (num < 1e6) return (num / 1e3).toFixed(2) + 'K';
        if (num < 1e9) return (num / 1e6).toFixed(2) + 'M';
        if (num < 1e12) return (num / 1e9).toFixed(2) + 'B';
        return (num / 1e12).toFixed(2) + 'T';
    }

    function getStats() {
        let tap = 1, flow = 0;
        marketMap.forEach(m => {
            const lvl = state.upgrades[m.id] || 0;
            if(m.id === 'u1') tap += lvl * m.bonus;
            else flow += lvl * m.bonus;
        });
        state.nfts.forEach(id => {
            const item = nftCatalog.find(x => x.id === id);
            if(item) flow += item.power;
        });
        return { tap, flow };
    }

    function switchView(id, el) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'market') renderMarket();
        if(id === 'nft') renderNFTs();
        tg.HapticFeedback.impactOccurred('light');
    }

    function renderMarket() {
        document.getElementById('market-injector').innerHTML = marketMap.map(m => {
            const lvl = state.upgrades[m.id] || 0;
            const isMax = lvl >= 10;
            return `
                <div class="cyber-card">
                    <div class="card-meta">
                        <b>${m.name}</b>
                        <span>Lvl ${lvl}/10 • +${m.bonus} Boost</span>
                    </div>
                    <button class="btn-prime" onclick="buyU('${m.id}')" ${isMax ? 'disabled' : ''}>
                        ${isMax ? 'MAX' : 'INSTALL'}
                    </button>
                </div>`;
        }).join('');
    }

    function renderNFTs() {
        document.getElementById('nft-injector').innerHTML = nftCatalog.map(n => {
            const owned = state.nfts.includes(n.id);
            return `
                <div class="nft-item ${owned ? 'active' : ''}">
                    <div class="nft-icon">
                        <svg width="30" viewBox="0 0 100 100">
                            <rect x="20" y="20" width="60" height="60" stroke="${owned?'var(--cyan)':'var(--pink)'}" fill="none" stroke-width="3"/>
                            <circle cx="50" cy="50" r="10" fill="${owned?'var(--cyan)':'var(--pink)'}"/>
                        </svg>
                    </div>
                    <b style="font-size:11px; font-family:Orbitron;">${n.name}</b>
                    <div style="font-size:10px; color:var(--cyan); margin:5px 0;">⚡ ${formatBal(n.power)}/s</div>
                    <button class="btn-prime" style="width:100%; font-size:9px; padding:8px;" onclick="buyN('${n.id}')" ${owned ? 'disabled' : ''}>
                        ${owned ? 'ACTIVE' : 'TEST-FREE'}
                    </button>
                </div>`;
        }).join('');
    }

    window.buyU = (id) => { state.upgrades[id]++; sync(); renderMarket(); tg.HapticFeedback.notificationOccurred('success'); };
    window.buyN = (id) => { state.nfts.push(id); sync(); renderNFTs(); tg.HapticFeedback.notificationOccurred('success'); };

    function updateUI() {
        const s = getStats();
        document.getElementById('display-balance').innerText = formatBal(state.coins);
        document.getElementById('ui-tap').innerText = formatBal(s.tap);
        document.getElementById('ui-flow').innerText = formatBal(s.flow);
    }

    function sync() {
        const payload = JSON.stringify(state);
        localStorage.setItem('aira_c', state.coins);
        localStorage.setItem('aira_u', JSON.stringify(state.upgrades));
        localStorage.setItem('aira_n', JSON.stringify(state.nfts));
        storage.setItem('aira_cloud_v4', payload);
        updateUI();
    }

    // Tap Handling
    document.getElementById('main-tap-zone').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const s = getStats();
        state.coins += s.tap;
        updateUI();

        const t = e.touches[0];
        const p = document.createElement('div');
        p.className = 'tap-pop';
        p.innerText = '+' + formatBal(s.tap);
        p.style.left = (t.clientX - 20) + 'px';
        p.style.top = (t.clientY - 20) + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);

        tg.HapticFeedback.impactOccurred('medium');
    });

    // Global FX Engine
    const canvas = document.getElementById('fx-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = Array.from({length: 60}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: Math.random() * 2 + 1,
        v: Math.random() * 0.5 + 0.1,
        o: Math.random()
    }));

    function renderFX() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            ctx.fillStyle = `rgba(0, 242, 255, ${p.o})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
            ctx.fill();
            p.y -= p.v;
            if(p.y < -10) p.y = canvas.height + 10;
        });
        requestAnimationFrame(renderFX);
    }

    // Farming Pulse (Har 100ms)
    setInterval(() => {
        state.coins += getStats().flow / 10;
        updateUI();
    }, 100);

    renderFX();
    updateUI();
</script>
</body>
</html>
