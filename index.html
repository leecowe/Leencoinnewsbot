<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova: Anime Era</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Mochi+iyom:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff007f;
            --cyan: #00e5ff;
            --purple: #7000ff;
            --glass: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            font-family: 'Poppins', sans-serif; color: #fff; overflow: hidden;
            /* Anime uslubidagi orqa fon */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://wallpaperaccess.com/full/1513515.jpg') no-repeat center center;
            background-size: cover;
        }

        /* Dashboard - Anime Style */
        .header {
            padding: 20px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--pink); box-shadow: 0 5px 20px rgba(255, 0, 127, 0.3);
        }
        .balance-container { position: relative; display: inline-block; }
        .score { 
            font-size: 55px; font-weight: 900; color: #fff;
            text-shadow: 3px 3px 0px var(--pink), -2px -2px 0px var(--cyan);
            margin: 0; letter-spacing: 2px;
        }
        .pps-tag { font-size: 14px; color: var(--cyan); text-transform: uppercase; font-weight: bold; }

        /* Asosiy Kristal / Personaj maydoni */
        .game-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .main-target {
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, var(--pink), var(--purple));
            box-shadow: 0 0 50px var(--pink), inset 0 0 20px #fff;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.1s transform; z-index: 5;
            border: 5px solid #fff;
        }
        .main-target:active { transform: scale(0.9) rotate(5deg); }
        .main-target img { width: 120px; filter: drop-shadow(0 0 10px #fff); }

        /* Do'kon - Silliq dizayn */
        .anime-shop {
            background: var(--glass); border-radius: 30px 30px 0 0;
            padding: 20px; border-top: 4px solid var(--cyan);
            max-height: 40%; overflow-y: auto;
        }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 15px; margin-bottom: 12px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-info h3 { margin: 0; font-size: 16px; color: var(--cyan); }
        .card-info p { margin: 2px 0 0; font-size: 11px; color: #ddd; }

        .btn-buy {
            background: linear-gradient(45deg, var(--pink), var(--purple));
            border: none; padding: 10px 18px; border-radius: 12px;
            color: #fff; font-weight: 900; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 0, 127, 0.4);
        }
        .btn-buy:disabled { filter: grayscale(1); opacity: 0.5; }

        /* Floating Text */
        .pop-text {
            position: absolute; color: #fff; font-weight: 900; font-size: 30px;
            pointer-events: none; animation: animePop 0.8s ease-out forwards;
            text-shadow: 2px 2px 0px var(--pink);
        }
        @keyframes animePop {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.5) rotate(10deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container">
            <h1 class="score" id="balance">0</h1>
        </div>
        <div class="pps-tag">✨ Energy Rate: +<span id="pps">0</span>/s</div>
    </div>

    <div class="game-zone">
        <div class="main-target" id="clicker">
            <img src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png" alt="anime-icon">
        </div>
    </div>

    <div class="anime-shop">
        <div id="shop-list">
            </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // MA'LUMOTLARNI SAQLASH (Eternal Storage)
        let state = {
            score: parseFloat(localStorage.getItem('anime_score')) || 0,
            tapPower: parseInt(localStorage.getItem('anime_tap')) || 1,
            autoRate: parseFloat(localStorage.getItem('anime_auto')) || 0,
            upgrades: JSON.parse(localStorage.getItem('anime_upgrades')) || { power: 1, auto: 0 }
        };

        const shopItems = [
            { id: 'power', name: 'SUPER STRENGTH', desc: 'Tap kuchini oshirish', base: 50, growth: 1.6, value: 2, type: 'tap' },
            { id: 'auto', name: 'KAWAII BOT', desc: 'Avtomatik yig‘ish +10/s', base: 200, growth: 1.5, value: 10, type: 'auto' }
        ];

        function saveGame() {
            localStorage.setItem('anime_score', state.score);
            localStorage.setItem('anime_tap', state.tapPower);
            localStorage.setItem('anime_auto', state.autoRate);
            localStorage.setItem('anime_upgrades', JSON.stringify(state.upgrades));
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('pps').innerText = state.autoRate;
            renderShop();
            saveGame();
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            shopItems.forEach(item => {
                let lvl = state.upgrades[item.id] || 0;
                let price = Math.floor(item.base * Math.pow(item.growth, lvl));
                
                list.innerHTML += `
                    <div class="upgrade-card">
                        <div class="card-info">
                            <h3>${item.name} (Lvl ${lvl})</h3>
                            <p>${item.desc}</p>
                        </div>
                        <button class="btn-buy" onclick="buy('${item.id}', ${price})" ${state.score < price ? 'disabled' : ''}>
                            💰 ${price.toLocaleString()}
                        </button>
                    </div>
                `;
            });
        }

        function buy(id, price) {
            if(state.score >= price) {
                state.score -= price;
                state.upgrades[id]++;
                let item = shopItems.find(i => i.id === id);
                if(item.type === 'tap') state.tapPower += item.value;
                if(item.type === 'auto') state.autoRate += item.value;
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        }

        document.getElementById('clicker').onclick = (e) => {
            state.score += state.tapPower;
            createPop(e);
            tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        };

        function createPop(e) {
            const p = document.createElement('div');
            p.className = 'pop-text';
            p.innerText = `+${state.tapPower}`;
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        // Avto-mining Loop
        setInterval(() => {
            state.score += (state.autoRate / 10);
            updateUI();
        }, 100); // Silliq o'sish uchun har 100ms da yangilanadi

        updateUI();
    </script>
</body>
</html>
