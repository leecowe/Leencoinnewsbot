<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mega Farm AI - v1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #f3ba2f; /* Binance Gold */
            --bg-color: #1a1a1a;
            --card-bg: #2b2b2b;
            --text-color: #ffffff;
            --hint-color: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Header qismi */
        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, #252525 0%, var(--bg-color) 100%);
        }

        #user-name {
            color: var(--primary-color);
            font-weight: bold;
        }

        .balance-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .coin-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(243, 186, 47, 0.4);
        }

        #balance {
            font-size: 36px;
            font-weight: 800;
        }

        /* Asosiy o'yin tugmasi */
        .main-tap-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .circle-btn {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #444 0%, #222 100%);
            border: 8px solid #333;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            transition: transform 0.05s;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .circle-btn:active {
            transform: scale(0.95);
        }

        /* Upgrade (Menu) qismi */
        .menu {
            width: 100%;
            background: var(--card-bg);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 20px;
            box-sizing: border-box;
        }

        .stats-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--hint-color);
        }

        .upgrade-card {
            background: #3d3d3d;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-info h4 { margin: 0; font-size: 16px; }
        .upgrade-info p { margin: 5px 0 0; font-size: 12px; color: var(--primary-color); }

        .btn-buy {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-buy:disabled {
            background: #555;
            color: #888;
        }

        /* Floating text effekti */
        .floating-text {
            position: absolute;
            color: white;
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.8s ease-out forwards;
        }

        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>Salom, <span id="user-name">Fermer</span>!</div>
        <div class="balance-container">
            <div class="coin-icon">💰</div>
            <span id="balance">0</span>
        </div>
    </div>

    <div class="main-tap-area" id="tap-zone">
        <div class="circle-btn" id="clicker">🚜</div>
    </div>

    <div class="menu">
        <div class="stats-info">
            <div>Profit per sec: <span id="pps" style="color:white">+0</span></div>
            <div>Tap power: <span id="tap-power" style="color:white">1</span></div>
        </div>

        <div class="upgrade-card">
            <div class="upgrade-info">
                <h4>Avto-Kombayn</h4>
                <p>Narxi: <span id="upgrade-cost">50</span> 💰</p>
            </div>
            <button class="btn-buy" id="buy-btn">Sotib olish</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Foydalanuvchi ismini o'rnatish
        const firstName = tg.initDataUnsafe?.user?.first_name || "Fermer";
        document.getElementById('user-name').innerText = firstName;

        // O'yin ma'lumotlari (Database o'rniga LocalStorage)
        let state = JSON.parse(localStorage.getItem('farmData')) || {
            coins: 0,
            pps: 0,
            upgradeCost: 50,
            tapPower: 1
        };

        function saveState() {
            localStorage.setItem('farmData', JSON.stringify(state));
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.coins);
            document.getElementById('pps').innerText = "+" + state.pps;
            document.getElementById('upgrade-cost').innerText = state.upgradeCost;
            document.getElementById('tap-power').innerText = state.tapPower;

            const buyBtn = document.getElementById('buy-btn');
            buyBtn.disabled = state.coins < state.upgradeCost;
        }

        // Click funksiyasi
        const clicker = document.getElementById('clicker');
        const tapZone = document.getElementById('tap-zone');

        clicker.addEventListener('touchstart', (e) => {
            e.preventDefault();
            state.coins += state.tapPower;
            
            // Floating text effekti
            const touch = e.touches[0];
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = `+${state.tapPower}`;
            text.style.left = `${touch.clientX}px`;
            text.style.top = `${touch.clientY}px`;
            document.body.appendChild(text);
            
            setTimeout(() => text.remove(), 800);
            
            updateUI();
            saveState();
        });

        // Upgrade sotib olish
        document.getElementById('buy-btn').addEventListener('click', () => {
            if (state.coins >= state.upgradeCost) {
                state.coins -= state.upgradeCost;
                state.pps += 1;
                state.upgradeCost = Math.floor(state.upgradeCost * 1.6);
                updateUI();
                saveState();
                tg.HapticFeedback.notificationOccurred('success');
            }
        });

        // Avto-farming (Har soniyada)
        setInterval(() => {
            if (state.pps > 0) {
                state.coins += state.pps;
                updateUI();
                saveState();
            }
        }, 1000);

        // Birinchi marta UI ni yuklash
        updateUI();

    </script>
</body>
</html>
