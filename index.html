<body>
    <canvas id="bg-canvas"></canvas>
    
    <div id="tap-zone" style="position: fixed; inset: 0; z-index: 50; cursor: pointer;"></div>

    <div class="ui-root" style="position: fixed; inset: 0; z-index: 100; pointer-events: none;">
        <div class="top-hud" style="pointer-events: auto;">
            <div class="life-sign" id="life-status">BIO-SIGN: STABLE</div>
            <div class="life-sign" style="border-color: var(--bio-cyan); color: var(--bio-cyan);">DNA: x<span id="mult-ui">1.0</span></div>
        </div>

        <div class="balance-box">
            <h1 class="ariai-count" id="ariai-bal">0.00</h1>
            <p class="stats-label">TOTAL $ARIAI SYNCED</p>
        </div>

        <div class="footer-hud" style="pointer-events: auto;">
            <div class="bar-wrap">
                <div class="bar-info"><span>PLASMA</span><span id="mana-text">1000 / 1000</span></div>
                <div class="bar-rail"><div class="bar-flow" id="mana-bar" style="background: var(--bio-cyan); width: 100%;"></div></div>
            </div>
            <div class="bar-wrap">
                <div class="bar-info"><span>EVOLUTION</span><span id="xp-text">LVL 1</span></div>
                <div class="bar-rail"><div class="bar-flow" id="xp-bar" style="background: var(--bio-pink); width: 0%;"></div></div>
            </div>
        </div>
    </div>

    <div id="panel-genome" class="panel" style="z-index: 200; pointer-events: auto;">
        </div>

    <nav class="nav" style="z-index: 300; pointer-events: auto;">
        </nav>

    <script>
        // ... (oldingi script kodi) ...

        // Tap Logic uchun muhim tuzatish:
        document.getElementById('tap-zone').onclick = (e) => {
            // Agar panel ochiq bo'lsa, bosish ishlamasligi kerak
            if(document.getElementById('panel-genome').classList.contains('active')) return;

            if (state.mana < 2) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            // O'yin mantiqi
            state.bal += state.pwr;
            state.mana -= 2;
            state.xp += 10;

            // Vizual effekt: 3D ob'ektni sakratish
            if(core) {
                core.scale.set(1.5, 1.5, 1.5);
                setTimeout(() => core.scale.set(1, 1, 1), 100);
            }

            // Pop-up effekti
            const pop = document.createElement('div');
            pop.className = 'dna-pop';
            pop.innerText = `+${state.pwr.toFixed(1)}`;
            pop.style.left = e.clientX + 'px';
            pop.style.top = e.clientY + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 600);

            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        };

        // Panelni ochganda bosishni o'chirish uchun tab funksiyasini yangilang:
        function tab(t, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (t === 'genome') {
                document.getElementById('panel-genome').classList.add('active');
                document.getElementById('tap-zone').style.display = 'none'; // Tapni o'chirish
                renderCells();
            } else {
                closePanel();
            }
        }

        function closePanel() {
            document.getElementById('panel-genome').classList.remove('active');
            document.getElementById('tap-zone').style.display = 'block'; // Tapni yoqish
        }
    </script>
</body>
