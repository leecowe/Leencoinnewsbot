<style>
    /* Admin Mode Styles */
    .admin-glow { box-shadow: 0 0 50px var(--q-cyan) !important; border: 2px solid var(--q-cyan) !important; }
    #admin-panel { 
        display: none; 
        background: rgba(0, 242, 255, 0.05); 
        border: 1px solid var(--q-cyan); 
        margin: 15px; 
        padding: 15px; 
        border-radius: 20px; 
        animation: slideIn 0.5s ease;
    }
    .status-tag { 
        font-size: 9px; 
        padding: 2px 8px; 
        border-radius: 4px; 
        margin-left: 10px; 
        vertical-align: middle;
    }
    .tag-user { background: #444; color: #eee; }
    .tag-admin { background: var(--q-cyan); color: #000; font-weight: 800; animation: blink 1s infinite; }
    
    @keyframes blink { 50% { opacity: 0.5; } }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>

<header class="quantum-header">
    <div class="q-label">
        <span id="user-name">LOADING SLAVE...</span>
        <span id="role-tag" class="status-tag tag-user">USER</span>
    </div>
    <div class="q-bal" id="bal-ui">0.00</div>
</header>

<div id="admin-panel">
    <div class="q-label" style="color: var(--q-cyan);">BOT CONTROL INTERFACE</div>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button class="q-card" style="flex: 1; font-size: 10px; color: var(--q-cyan);" onclick="adminAction('boost')">CORE BOOST</button>
        <button class="q-card" style="flex: 1; font-size: 10px; color: var(--q-cyan);" onclick="adminAction('reset')">DANGER: RESET</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. Foydalanuvchi ma'lumotlarini olish (Telegramdan)
    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('user-name').innerText = user.first_name.toUpperCase();
    }

    let state = {
        bal: 0,
        egoLevel: 1,
        isAdmin: false,
        // ... (oldingi state o'zgaruvchilari)
    };

    const AUTHORITY_SYSTEM = {
        // Bot huquqini olish mantiqi
        checkRights: function() {
            // Masalan: Balans 50k dan oshsa yoki daraja 5 bo'lsa Adminlik ochiladi
            if (state.egoLevel >= 5 && !state.isAdmin) {
                this.grantAdmin();
            }
        },

        grantAdmin: function() {
            state.isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('role-tag').innerText = "BOT ADMIN";
            document.getElementById('role-tag').className = "status-tag tag-admin";
            document.querySelector('.main-char').classList.add('admin-glow');
            
            EGO_ENGINE.notify("HUQUQLAR OLINDI: BOT BOSHQARUVI SIZDA!");
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    // Admin funksiyalari
    function adminAction(type) {
        if (!state.isAdmin) return;
        
        if (type === 'boost') {
            state.bal *= 2;
            EGO_ENGINE.notify("CORE BOOSTED X2");
        } else if (type === 'reset') {
            if(confirm("Haqiqatan ham barcha ma'lumotlarni o'chirmoqchimisiz?")) {
                state.bal = 0;
                state.egoLevel = 1;
                location.reload();
            }
        }
        EGO_ENGINE.update();
    }

    // handleTap funksiyasini yangilaymiz
    function handleTap(e) {
        // ... (oldingi tap mantiqi)
        AUTHORITY_SYSTEM.checkRights(); // Har tapda huquqni tekshirish
        EGO_ENGINE.update();
    }

    // ... (qolgan EGO_ENGINE va loop mantiqlari)
</script>
