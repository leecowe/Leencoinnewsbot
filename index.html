<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Neural Interface</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- 1. PROFESSIONAL NEON ENGINE --- */
        :root {
            --cyan: #00f2ff;
            --pink: #ff007f;
            --bg: #050a10;
            --border: rgba(0, 242, 255, 0.2);
            --glow: 0 0 25px rgba(0, 242, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 50%, #0a1a25 0%, #050a10 100%);
        }

        /* Stats Header */
        .header {
            padding: 40px 20px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .bal-title {
            font-family: 'Orbitron';
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .main-val {
            font-family: 'Orbitron';
            font-size: 60px;
            font-weight: 900;
            text-shadow: var(--glow);
            margin: 5px 0;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-family: 'Orbitron';
            font-size: 12px;
        }

        /* Navigation */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: rgba(0,0,0,0.95);
            display: flex;
            border-top: 1px solid var(--border);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
            font-family: 'Orbitron';
            font-size: 10px;
            transition: 0.3s;
        }

        .nav-btn.active {
            color: var(--cyan);
            border-top: 3px solid var(--cyan);
            background: linear-gradient(0deg, rgba(0,242,255,0.1) 0%, transparent 100%);
        }

        /* Main Content Views */
        .view {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 100px;
        }

        .view.active { display: block; }

        /* Robot Stage */
        .stage {
            height: 45vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: #4d8ccf; /* Siz so'ragan havo rang */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 0 30px rgba(77, 140, 207, 0.5);
            cursor: pointer;
            transition: transform 0.05s;
        }

        .orb:active { transform: scale(0.95); }

        .robot-face {
            width: 120px;
            height: 80px;
            background: #1a2a3a;
            border-radius: 40px 40px 20px 20px;
            border: 2px solid var(--cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .eyes { display: flex; gap: 20px; }
        .eye { width: 16px; height: 16px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 10px var(--cyan); }
        .mouth { width: 40px; height: 5px; background: #000; border-radius: 10px; }

        /* Market Cards */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .buy-btn {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--cyan);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-family: 'Orbitron';
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="bal-title">Aira Protocol v1.0.9</div>
        <div class="main-val" id="coins">0.00</div>
        <div class="stats-grid">
            <div style="color:var(--cyan)">TAP: +<span id="t-pow">1.0</span></div>
            <div style="color:var(--pink)">AUTO: <span id="a-pow">0.0</span>/s</div>
        </div>
    </header>

    <div id="core" class="view active">
        <div class="stage">
            <div class="orb" id="tap-btn">
                <div class="robot-face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="mouth"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="market" class="view">
        <div id="m-container"></div>
    </div>

    <div id="nft" class="view">
        <h2 style="text-align:center; font-family:'Orbitron'; color:var(--pink); margin-top:100px;">NFT SECTOR LOCKED</h2>
    </div>

    <nav class="nav-bar">
        <div class="nav-btn active" onclick="showTab('core', this)">CORE</div>
        <div class="nav-btn" onclick="showTab('market', this)">MARKET</div>
        <div class="nav-btn" onclick="showTab('nft', this)">NFT</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 2. DATA SYSTEM (LOC Record uchun kengaytirilgan)
    let state = {
        balance: 0,
        tap: 1,
        auto: 0
    };

    const marketData = [
        { id: 'm1', name: "Neural Link v1", desc: "Basic tap boost", cost: 150, power: 2, isTap: true },
        { id: 'm2', name: "Neural Link v2", desc: "Improved data stream", cost: 750, power: 8, isTap: true },
        { id: 'm3', name: "Cyber Nerve", desc: "Quantum connection", cost: 2500, power: 25, isTap: true },
        { id: 'a1', name: "Nano Miner", desc: "Auto mining unit", cost: 1000, power: 10, isTap: false },
        { id: 'a2', name: "Server Farm", desc: "Decentralized hub", cost: 5000, power: 60, isTap: false },
        { id: 'a3', name: "Quantum Rig", desc: "Infinite mining power", cost: 50000, power: 500, isTap: false }
    ];

    function format(n) {
        if (n < 1000) return n.toFixed(1);
        if (n < 1000000) return (n/1000).toFixed(1) + 'K';
        return (n/1000000).toFixed(1) + 'M';
    }

    function update() {
        document.getElementById('coins').innerText = format(state.balance);
        document.getElementById('t-pow').innerText = format(state.tap);
        document.getElementById('a-pow').innerText = format(state.auto);
    }

    document.getElementById('tap-btn').onpointerdown = () => {
        state.balance += state.tap;
        update();
        tg.HapticFeedback.impactOccurred('medium');
    };

    function showTab(tabId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        if(tabId === 'market') renderMarket();
    }

    function renderMarket() {
        const cont = document.getElementById('m-container');
        cont.innerHTML = '';
        marketData.forEach(item => {
            cont.innerHTML += `
                <div class="card">
                    <div>
                        <b style="font-size:18px">${item.name}</b><br>
                        <small style="color:#888">${item.desc}</small>
                    </div>
                    <div class="buy-btn" onclick="buy('${item.id}')">${format(item.cost)}</div>
                </div>
            `;
        });
    }

    window.buy = (id) => {
        const item = marketData.find(x => x.id === id);
        if(state.balance >= item.cost) {
            state.balance -= item.cost;
            if(item.isTap) state.tap += item.power;
            else state.auto += item.power;
            item.cost = Math.floor(item.cost * 1.7);
            update();
            renderMarket();
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    // Auto Mining Heartbeat
    setInterval(() => {
        if(state.auto > 0) {
            state.balance += state.auto / 10;
            update();
        }
    }, 100);

    update();
</script>

</body>
</html>
