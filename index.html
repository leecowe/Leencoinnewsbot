<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Farm Update</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --pink: #ff007f;
            --bg: #050a10;
            --glass: rgba(0, 242, 255, 0.07);
            --border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .test-banner {
            background: rgba(255, 0, 127, 0.2); color: var(--pink); text-align: center;
            font-family: 'Orbitron'; font-size: 10px; padding: 10px; border-bottom: 1px solid var(--pink);
        }

        .header { padding: 20px; text-align: center; }
        .bal-val { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; text-shadow: 0 0 15px var(--primary); }

        .view-content { flex: 1; display: none; padding: 20px; overflow-y: auto; flex-direction: column; align-items: center; }
        .view-content.active { display: flex; }

        .card {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px;
        }

        .farm-status { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: var(--primary); }

        .btn-main {
            background: var(--primary); color: #000; border: none; padding: 15px;
            border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; width: 100%; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .nav { height: 80px; background: #000; display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; font-family: 'Orbitron'; }
        .nav-item.active { color: var(--primary); border-top: 3px solid var(--primary); }
        
        .level-badge { background: var(--pink); color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; }
    </style>
</head>
<body>

    <div class="test-banner">⚠️ TEST REJIMI: MA'LUMOTLAR SAQLANMAYDI!</div>

    <header class="header">
        <div class="bal-val" id="total-bal">0</div>
        <div style="font-family:'Orbitron'; font-size:12px; color:var(--primary); margin-top:5px;">
            AUTO APS: <span id="aps-display">50</span>/300ms
        </div>
    </header>

    <div id="view-hack" class="view-content active">
        <div class="card">
            <h3 style="font-family:'Orbitron'; color:var(--primary);">MINING CORE</h3>
            <div style="font-size:36px; font-family:'Orbitron'; margin:15px 0;" id="current-mining">0</div>
            <button class="btn-main" onclick="claimMining()">ACHKOLARNI YIG'ISH</button>
        </div>
    </div>

    <div id="view-farm" class="view-content">
        <div class="card">
            <h3 style="font-family:'Orbitron'; color:var(--primary);">FARM UPGRADE</h3>
            <div class="farm-status">
                <span>Current Level:</span>
                <span class="level-badge" id="farm-lvl">LVL 1</span>
            </div>
            <p style="font-size: 12px; opacity: 0.7;" id="next-perk">Keyingi daraja: +25 achko/300ms</p>
            <button class="btn-main" id="upgrade-btn" onclick="upgradeFarm()">LVL UP (<span id="upgrade-cost">5000</span>)</button>
        </div>

        <div class="card" style="border-color: var(--pink);">
            <p style="font-size: 11px; color: var(--pink); font-family: 'Orbitron'; margin: 0;">
                📢 OGOHLANTIRISH: Hozircha maksimal LVL 5. Keyingi yangilanishda yangi darajalar qo'shiladi!
            </p>
        </div>
    </div>

    <div id="view-stake" class="view-content">
        <div class="card">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin:0;">STAKING HUB</h2>
            <p style="font-size:14px; opacity:0.7;">1 daqiqada +10% foyda</p>
            <div id="timer" style="font-size:32px; color:var(--pink); font-family:'Orbitron'; margin:15px 0;">TAYYOR</div>
            <button class="btn-main" id="stake-btn" onclick="startStake()">STAKE ALL</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('hack', this)">CORE</div>
        <div class="nav-item" onclick="switchTab('farm', this)">FARM</div>
        <div class="nav-item" onclick="switchTab('stake', this)">STAKE</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 0;
    let sessionCoins = 0;
    let farmLevel = 1;
    let aps = 50; // Achko per 300ms
    let upgradeCost = 5000;
    let isStaking = false;

    // 1. DYNAMIK MINING
    let miningInterval = setInterval(runMining, 300);

    function runMining() {
        sessionCoins += aps;
        document.getElementById('current-mining').innerText = sessionCoins;
    }

    function claimMining() {
        balance += sessionCoins;
        sessionCoins = 0;
        updateUI();
        tg.HapticFeedback.impactOccurred('heavy');
    }

    // 2. FARM UPGRADE SYSTEM (MAX LVL 5)
    function upgradeFarm() {
        if (farmLevel >= 5) {
            tg.showAlert("Hozircha maksimal darajadasiz!");
            return;
        }

        if (balance >= upgradeCost) {
            balance -= upgradeCost;
            farmLevel++;
            aps += 25; // Har bir LVL uchun +25 tezlik
            upgradeCost *= 2; // Narx ikki barobar oshadi
            
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert(`Tabriklaymiz! Ferma LVL ${farmLevel} ga ko'tarildi!`);
        } else {
            tg.showAlert("Mablag' yetarli emas!");
        }
    }

    // 3. STAKING (1 MINUTE)
    function startStake() {
        if (isStaking || balance <= 0) return;
        let amount = balance;
        balance = 0;
        isStaking = true;
        updateUI();

        let timeLeft = 60;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(countdown);
                balance += Math.floor(amount * 1.1);
                isStaking = false;
                document.getElementById('timer').innerText = "TAYYOR";
                updateUI();
                tg.showPopup({ title: "Foyda!", message: "Staking muvaffaqiyatli yakunlandi." });
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('total-bal').innerText = Math.floor(balance);
        document.getElementById('aps-display').innerText = aps;
        document.getElementById('farm-lvl').innerText = "LVL " + farmLevel;
        document.getElementById('upgrade-cost').innerText = upgradeCost;
        
        if (farmLevel >= 5) {
            document.getElementById('upgrade-btn').innerText = "MAX LEVEL";
            document.getElementById('next-perk').innerText = "Keyingi yangilanishni kuting...";
        } else {
            document.getElementById('next-perk').innerText = `Keyingi daraja: +25 achko/300ms`;
        }
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        el.classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
