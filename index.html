<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Strategic Hack</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff007f;
            --bg: #050a10;
            --glass: rgba(0, 242, 255, 0.05);
            --border: rgba(0, 242, 255, 0.2);
            --glow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 50% 50%, #0a1a25 0%, #050a10 100%);
        }

        .header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .bal-label { font-family: 'Orbitron'; font-size: 10px; color: var(--cyan); letter-spacing: 4px; }
        .bal-val { font-family: 'Orbitron'; font-size: 52px; font-weight: 900; text-shadow: var(--glow); margin: 5px 0; }

        /* STRATEGIC GAME AREA */
        .game-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .grid-container {
            display: grid; grid-template-columns: repeat(3, 80px); gap: 15px;
            padding: 20px; border: 1px solid var(--border); border-radius: 20px; background: var(--glass);
        }
        .node {
            width: 80px; height: 80px; background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--border); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 24px; cursor: pointer; transition: 0.3s;
        }
        .node.active { border-color: var(--cyan); box-shadow: var(--glow); transform: scale(1.05); background: rgba(0, 242, 255, 0.2); }
        .node.match { border-color: var(--pink); box-shadow: 0 0 20px var(--pink); background: rgba(255, 0, 127, 0.2); }

        .game-info { margin-top: 20px; text-align: center; font-family: 'Orbitron'; font-size: 14px; color: var(--cyan); }

        /* NAVIGATION */
        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); display: flex; border-top: 1px solid var(--border); }
        .n-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-family: 'Orbitron'; font-size: 10px; }
        .n-btn.active { color: var(--cyan); border-top: 3px solid var(--cyan); background: linear-gradient(0deg, rgba(0,242,255,0.1), transparent); }
    </style>
</head>
<body>

    <header class="header">
        <div class="bal-label">AIRA PROTOCOL V2.0</div>
        <div class="bal-val" id="score">0</div>
        <div id="status" style="color: var(--pink); font-size: 12px; font-family: 'Orbitron';">TIZIMNI BUZIB KIRING...</div>
    </header>

    <div class="game-stage" id="game-view">
        <div class="grid-container" id="grid">
            </div>
        <div class="game-info" id="timer">VAQT: 30s</div>
    </div>

    <div class="nav">
        <div class="n-btn active">HACK</div>
        <div class="n-btn" onclick="tg.showAlert('Tez kunda!')">MARKET</div>
        <div class="n-btn" onclick="tg.showAlert('Tez kunda!')">NFT</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // MALUMOTLARNI SAQLASH (LocalStorage)
    let score = parseInt(localStorage.getItem('aira_score')) || 0;
    let sequence = [];
    let userSequence = [];
    let timeLeft = 30;
    let gameActive = false;

    const scoreEl = document.getElementById('score');
    const gridEl = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');

    function initGrid() {
        gridEl.innerHTML = '';
        for(let i=0; i<9; i++) {
            const node = document.createElement('div');
            node.className = 'node';
            node.dataset.id = i;
            node.innerText = '?';
            node.onclick = () => handleNodeClick(i, node);
            gridEl.appendChild(node);
        }
        scoreEl.innerText = score;
    }

    function startGame() {
        sequence = Array.from({length: 3}, () => Math.floor(Math.random() * 9));
        userSequence = [];
        showSequence();
    }

    function showSequence() {
        let i = 0;
        gameActive = false;
        const interval = setInterval(() => {
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(n => n.classList.remove('active'));
            nodes[sequence[i]].classList.add('active');
            
            i++;
            if(i >= sequence.length) {
                clearInterval(interval);
                setTimeout(() => {
                    nodes.forEach(n => n.classList.remove('active'));
                    statusEl.innerText = "KETMA-KETLIKNI QAYTARING!";
                    gameActive = true;
                }, 1000);
            }
        }, 800);
    }

    function handleNodeClick(id, node) {
        if(!gameActive) return;

        userSequence.push(id);
        node.classList.add('active');
        setTimeout(() => node.classList.remove('active'), 300);

        if(userSequence[userSequence.length-1] !== sequence[userSequence.length-1]) {
            tg.HapticFeedback.notificationOccurred('error');
            statusEl.innerText = "XATO! QAYTADAN BOSHLANG.";
            startGame();
            return;
        }

        if(userSequence.length === sequence.length) {
            score += 10;
            localStorage.setItem('aira_score', score); // SAQLASH
            scoreEl.innerText = score;
            tg.HapticFeedback.notificationOccurred('success');
            statusEl.innerText = "MUVAFFAQIYATLI HACK! +10";
            setTimeout(startGame, 1000);
        }
    }

    // Timer logic
    setInterval(() => {
        if(timeLeft > 0) {
            timeLeft--;
            timerEl.innerText = `VAQT: ${timeLeft}s`;
        } else {
            timeLeft = 30;
            startGame();
        }
    }, 1000);

    initGrid();
    startGame();
</script>
</body>
</html>
