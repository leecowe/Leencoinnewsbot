<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leenova | Cyber Ego</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505;
            --neon-gold: #f3ba2f;
            --neon-cyan: #00f2ff;
            --neon-pink: #ff0055;
            --panel-bg: rgba(20, 20, 20, 0.8);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            font-family: 'JetBrains Mono', monospace; 
            overflow: hidden; 
            height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        /* Glitch Effekti */
        .glitch {
            text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { transform: skew(0deg); }
            20% { transform: skew(2deg); }
            40% { transform: skew(-1deg); }
            100% { transform: skew(0deg); }
        }

        /* Header & Balance */
        .header { text-align: center; padding: 40px 20px 0; }
        #ego-chatter { 
            color: var(--neon-cyan); 
            font-size: 11px; 
            height: 20px; 
            letter-spacing: 1px;
            background: rgba(0, 242, 255, 0.1);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 4px;
        }

        .balance-container { margin: 15px 0; }
        .balance { 
            font-family: 'Orbitron', sans-serif;
            font-size: 50px; 
            font-weight: 900; 
            color: var(--neon-gold);
            text-shadow: 0 0 20px rgba(243, 186, 47, 0.4);
        }

        /* Progress Bar */
        .xp-bar-container {
            width: 80%;
            height: 4px;
            background: #222;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
        }
        #xp-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-gold));
            transition: width 0.3s;
        }

        /* Avatar Section */
        .main-container { position: relative; height: 35vh; display: flex; align-items: center; justify-content: center; }
        .main-char { 
            width: 160px; 
            filter: drop-shadow(0 0 10px var(--neon-gold));
            transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .main-char:active { transform: scale(0.85) rotate(5deg); }
        
        .admin-mode .main-char { filter: drop-shadow(0 0 25px var(--neon-cyan)); }

        /* Stats Card */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { 
            background: var(--panel-bg); 
            border-radius: 12px; 
            padding: 15px; 
            border-left: 3px solid var(--neon-gold);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: 800; color: #eee; }

        /* Buttons */
        .controls { padding: 0 20px; }
        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            border: none; 
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; 
            font-size: 14px; 
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-evolve { 
            background: linear-gradient(45deg, var(--neon-gold), #b38600);
            color: #000;
            box-shadow: 0 4px 15px rgba(243, 186, 47, 0.3);
        }
        .btn:disabled { background: #1a1a1a; color: #444; box-shadow: none; }

        /* Admin Panel */
        #admin-panel { 
            display: none; 
            margin: 10px 20px; 
            padding: 15px; 
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 242, 255, 0.05);
            border-radius: 12px;
        }

        /* Floating Text */
        .tap-msg {
            position: fixed;
            pointer-events: none;
            font-weight: 900;
            color: var(--neon-cyan);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="user-mode">

    <div class="header">
        <div id="ego-chatter" class="glitch">SYSTEM READY...</div>
        <div class="balance-container">
            <div class="balance" id="bal-ui">0.0</div>
        </div>
        <div class="xp-bar-container">
            <div id="xp-progress"></div>
        </div>
    </div>

    <div class="main-container">
        <img src="https://cdn-icons-png.flaticon.com/512/6028/6028676.png" class="main-char" id="main-avatar" onclick="handleTap(event)">
    </div>

    <div id="admin-panel">
        <div style="font-size: 9px; color: var(--neon-cyan); margin-bottom: 8px;">CORE ACCESS GRANTED</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="padding: 10px; font-size: 10px; background: var(--neon-cyan);" onclick="adminAction('boost')">BOOTSTRAP +100K</button>
            <button class="btn" style="padding: 10px; font-size: 10px; background: var(--neon-pink);" onclick="adminAction('reset')">PURGE ALL</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Neural Level</div>
            <div class="stat-value" id="lvl-ui">1</div>
        </div>
        <div class="stat-card" style="border-left-color: var(--neon-cyan);">
            <div class="stat-label">AI Status</div>
            <div class="stat-value" id="worth-ui" style="font-size: 12px;">NEOPHYTE</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-evolve" id="evo-btn" onclick="evolve()">Unlock Potential</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = "#050505";

    let state = {
        bal: 0,
        lvl: 1,
        isAdmin: false,
        tapCount: 0,
        phrases: [
            "Yana bos!", "Sekinsan-ku?", "Adminlik yaqin...", 
            "Evolyutsiya qil!", "Tizim qizimoqda", "Sening darajang past"
        ]
    };

    function format(n) {
        if (n < 1000) return n.toFixed(1);
        const u = ["", "k", "M", "B", "T"];
        const i = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, i)).toFixed(1) + u[i];
    }

    const ENGINE = {
        updateUI: function() {
            document.getElementById('bal-ui').innerText = format(state.bal);
            document.getElementById('lvl-ui').innerText = state.lvl;
            
            // Progress bar mantiqi
            let cost = 100 * Math.pow(2.2, state.lvl - 1);
            let progress = Math.min((state.bal / cost) * 100, 100);
            document.getElementById('xp-progress').style.width = progress + "%";

            // Status yangilash
            const statusMap = ["NEOPHYTE", "CYPHER", "REBEL", "GHOST", "OVERLORD", "ARCHITECT"];
            let idx = Math.min(Math.floor(state.lvl / 2), statusMap.length - 1);
            document.getElementById('worth-ui').innerText = statusMap[idx];

            const btn = document.getElementById('evo-btn');
            btn.innerText = state.bal >= cost ? "EXECUTE EVOLUTION" : `NEED ${format(cost)}`;
            btn.disabled = state.bal < cost;

            if (state.lvl >= 10 && !state.isAdmin) this.enableAdmin();
        },

        enableAdmin: function() {
            state.isAdmin = true;
            document.body.classList.replace('user-mode', 'admin-mode');
            document.getElementById('admin-panel').style.display = 'block';
            this.speak("STATUS: ARCHITECT. SYSTEM IS YOURS.");
            tg.HapticFeedback.notificationOccurred('success');
        },

        speak: function(msg) {
            const chat = document.getElementById('ego-chatter');
            chat.innerText = msg;
            chat.classList.add('glitch');
            setTimeout(() => chat.classList.remove('glitch'), 500);
        }
    };

    function handleTap(e) {
        let gain = 1 * (1 + (state.lvl * 0.5));
        state.bal += gain;
        state.tapCount++;

        // Floating Number
        const float = document.createElement('div');
        float.className = 'tap-msg';
        float.innerText = `+${gain.toFixed(1)}`;
        float.style.left = e.clientX + "px";
        float.style.top = e.clientY + "px";
        document.body.appendChild(float);
        setTimeout(() => float.remove(), 800);

        // Random Chatter
        if (state.tapCount % 20 === 0) {
            let p = state.phrases[Math.floor(Math.random() * state.phrases.length)];
            ENGINE.speak(p);
        }

        tg.HapticFeedback.impactOccurred('light');
        ENGINE.updateUI();
    }

    function evolve() {
        let cost = 100 * Math.pow(2.2, state.lvl - 1);
        if (state.bal >= cost) {
            state.bal -= cost;
            state.lvl++;
            ENGINE.speak(`LEVEL ${state.lvl} REACHED. ACCESS EXPANDED.`);
            tg.HapticFeedback.notificationOccurred('success');
            ENGINE.updateUI();
        }
    }

    function adminAction(type) {
        if (!state.isAdmin) return;
        if (type === 'boost') state.bal += 100000;
        if (type === 'reset') {
            if(confirm("FULL SYSTEM WIPE?")) {
                state.bal = 0; state.lvl = 1; location.reload();
            }
        }
        ENGINE.updateUI();
    }

    // Passive Income
    setInterval(() => {
        state.bal += (state.lvl * 0.2);
        ENGINE.updateUI();
    }, 1000);

    ENGINE.updateUI();
</script>
</body>
</html>
