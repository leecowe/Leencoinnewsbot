<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aira: Cyber Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --dark: #01080e; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow: hidden; display: flex; flex-direction: column; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* HUD */
        .top-hud { padding: 40px 20px 10px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); text-align: center; z-index: 100; }
        .bot-name { font-family: 'Orbitron'; color: var(--blue); font-size: 14px; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .balance { font-family: 'Orbitron'; font-size: 42px; text-shadow: 0 0 20px var(--blue); margin-bottom: 5px; transition: 0.3s; }
        .balance.boost { color: var(--gold); text-shadow: 0 0 30px var(--gold); transform: scale(1.1); }

        /* HERO ZONE */
        .hero-zone { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        
        .character-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .aira-avatar {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--blue);
            z-index: 2;
            box-shadow: 0 0 25px var(--blue);
            animation: floating 4s ease-in-out infinite;
            background: #01080e; /* Rasm yuklanguncha qora fon */
        }

        .glow-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.2) 0%, transparent 70%);
            filter: blur(15px);
            z-index: 1;
            animation: pulse 2s infinite alternate;
        }

        /* ANIMATSIYALAR */
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulse { from { opacity: 0.4; transform: scale(0.95); } to { opacity: 0.8; transform: scale(1.05); } }

        /* NAV VA PANEL */
        .market-panel { position: fixed; bottom: -75vh; left: 0; width: 100%; height: 75vh; background: rgba(1, 8, 14, 0.98); border-top: 3px solid var(--blue); border-radius: 30px 30px 0 0; transition: 0.5s; z-index: 2000; padding: 25px; overflow-y: auto; }
        .market-panel.open { bottom: 0; }
        .nav { display: flex; height: 80px; background: #000; border-top: 2px solid var(--blue); z-index: 3000; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 10px; color: #444; }
        .nav-item.active { color: var(--blue); background: rgba(0,242,255,0.1); border-top: 4px solid var(--blue); }

        .pop { position: absolute; color: var(--blue); font-family: 'Orbitron'; pointer-events: none; animation: fly 0.6s forwards; z-index: 4000; }
        @keyframes fly { to { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="top-hud">
        <div class="bot-name">Aira Protocol</div>
        <div class="balance" id="bal">0</div>
        <div style="display:flex; justify-content:center; gap:15px; font-family:Orbitron; font-size:12px;">
            <div style="color:var(--blue)">TAP: +<span id="t-pow">0</span></div>
            <div style="color:var(--pink)">AUTO: +<span id="a-pow">0</span>/s</div>
        </div>
    </div>

    <div class="hero-zone">
        <div class="character-container" id="tap-btn">
            <div class="glow-ring"></div>
            <img class="aira-avatar" src="https://i.ibb.co/LzrYv5M/aira-avatar.png" alt="Aira">
        </div>
    </div>

    <div id="market-panel" class="market-panel">
        <h3 style="text-align:center; font-family:Orbitron; color:var(--blue);">MARKET</h3>
        <div id="up-list"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="toggleM(false)">CITY</div>
        <div class="nav-item" onclick="toggleM(true)">MARKET</div>
        <div class="nav-item">NFT</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let data = {
            m: parseFloat(localStorage.getItem('aira_m')) || 0,
            l: JSON.parse(localStorage.getItem('aira_l')) || {u1:1, u2:0, u3:0},
            isBoosted: false
        };

        const ups = [
            { id: 'u1', name: 'Neural Link', base: 50, val: 2, type: 'tap' },
            { id: 'u2', name: 'Aira Bot', base: 500, val: 10, type: 'auto' },
            { id: 'u3', name: 'Quantum CPU', base: 2000, val: 40, type: 'auto' }
        ];

        function getStats() {
            let t = 1, a = 0;
            ups.forEach(u => { 
                if(u.type==='tap') t += data.l[u.id]*u.val; 
                else a += data.l[u.id]*u.val;
            });
            return { t, a };
        }

        function updateUI(full = false) {
            const s = getStats();
            document.getElementById('bal').innerText = Math.floor(data.m).toLocaleString();
            document.getElementById('t-pow').innerText = s.t;
            document.getElementById('a-pow').innerText = s.a;
            if(full) {
                const container = document.getElementById('up-list');
                container.innerHTML = '';
                ups.forEach(u => {
                    const cost = Math.floor(u.base * Math.pow(1.5, data.l[u.id]));
                    container.innerHTML += `<div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                        <span>${u.name}</span>
                        <button onclick="buyU('${u.id}', ${cost})">${cost}</button>
                    </div>`;
                });
            }
            localStorage.setItem('aira_m', data.m);
            localStorage.setItem('aira_l', JSON.stringify(data.l));
        }

        window.buyU = (id, c) => {
            if(data.m >= c) { data.m -= c; data.l[id]++; updateUI(true); }
        };

        function toggleM(open) {
            document.getElementById('market-panel').classList.toggle('open', open);
        }

        document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const s = getStats(); data.m += s.t;
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        });

        setInterval(() => { data.m += getStats().a / 10; updateUI(); }, 100);
        updateUI(true);
    </script>
</body>
</html>
