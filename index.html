<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol V1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff007f;
            --bg: #000000;
            --card-bg: rgba(13, 27, 42, 0.7);
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Moving Star Background */
        #star-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        /* Header UI */
        .header {
            padding: 50px 20px 10px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,242,255,0.1), transparent);
        }

        .brand {
            font-family: 'Orbitron';
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--cyan);
            text-shadow: var(--neon-glow);
            margin-bottom: 5px;
        }

        .main-balance {
            font-family: 'Orbitron';
            font-size: 58px;
            font-weight: 700;
            margin: 10px 0;
            background: linear-gradient(to bottom, #fff, var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,242,255,0.4));
        }

        .mini-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-family: 'Orbitron';
            font-size: 10px;
        }

        .stat-item span { color: var(--cyan); }
        .stat-item.pink span { color: var(--pink); }

        /* Content Area */
        .content { flex: 1; position: relative; overflow: hidden; }
        .page {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            padding: 20px;
            overflow-y: auto;
        }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Character Core */
        .hero-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-tap-btn {
            position: relative;
            width: 280px; height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            border: 2px solid rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.2);
            transition: 0.1s;
        }

        .main-tap-btn:active { transform: scale(0.92); }

        .robot-head {
            width: 180px; height: 180px;
            filter: drop-shadow(0 0 15px var(--cyan));
        }

        /* Market Cards - Professional Style */
        .market-title {
            font-family: 'Orbitron';
            text-align: center;
            margin-bottom: 25px;
            color: var(--cyan);
            letter-spacing: 2px;
        }

        .upgrade-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .up-info b { font-family: 'Orbitron'; font-size: 16px; color: #fff; display: block; }
        .up-info span { font-size: 12px; color: #888; }

        .buy-btn {
            background: linear-gradient(45deg, #0b1a2d, #1a3a5d);
            border: 1px solid var(--cyan);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-size: 13px;
            min-width: 90px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .buy-btn:disabled { opacity: 0.4; border-color: #333; }

        /* Navigation Bar */
        .nav {
            height: 90px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid rgba(0,242,255,0.1);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
            font-family: 'Orbitron';
            font-size: 10px;
            gap: 5px;
            transition: 0.3s;
        }

        .nav-tab.active {
            color: var(--cyan);
            background: linear-gradient(to top, rgba(0,242,255,0.1), transparent);
            border-top: 3px solid var(--cyan);
        }

        /* Particle effect for tap */
        .tap-particle {
            position: absolute;
            color: var(--cyan);
            font-family: 'Orbitron';
            font-weight: bold;
            pointer-events: none;
            animation: flyUp 0.6s ease-out forwards;
            z-index: 1000;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<div class="header">
    <div class="brand">AIRA PROTOCOL V1.0</div>
    <div class="main-balance" id="balance">0</div>
    <div class="mini-stats">
        <div class="stat-item">TAP: +<span id="tap-val">1</span></div>
        <div class="stat-item pink">AUTO: +<span id="auto-val">0</span>/s</div>
    </div>
</div>

<div class="content">
    <div id="core" class="page active">
        <div class="hero-container">
            <div class="main-tap-btn" id="tap-trigger">
                <svg class="robot-head" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#00f2ff" stroke-width="1" stroke-dasharray="5,5"/>
                    <path d="M25 40 Q50 35 75 40 L75 60 Q50 65 25 60 Z" fill="#1a3a5d" stroke="#00f2ff" stroke-width="2"/>
                    <circle cx="40" cy="50" r="5" fill="#00f2ff">
                        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="60" cy="50" r="5" fill="#00f2ff">
                        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                    <rect x="35" y="55" width="30" height="2" fill="#00f2ff" />
                </svg>
            </div>
        </div>
    </div>

    <div id="market" class="page">
        <h3 class="market-title">SYSTEM MARKET</h3>
        <div id="upgrade-list"></div>
    </div>

    <div id="nft" class="page">
        <h3 class="market-title" style="color:var(--pink)">NFT GEAR</h3>
        <div style="text-align:center; margin-top:100px; color:#444; font-family:Orbitron;">
            COMING SOON
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-tab active" onclick="showPage('core', this)">
        <span>CORE</span>
    </div>
    <div class="nav-tab" onclick="showPage('market', this)">
        <span>MARKET</span>
    </div>
    <div class="nav-tab" onclick="showPage('nft', this)">
        <span>NFT</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        coins: parseFloat(localStorage.getItem('aira_coins')) || 0,
        upgrades: JSON.parse(localStorage.getItem('aira_upgrades')) || { u1: 0, u2: 0, u3: 0 }
    };

    const shopData = [
        { id: 'u1', name: 'Neural Link', base: 100, bonus: 2, type: 'tap' },
        { id: 'u2', name: 'Aira Drone', base: 500, bonus: 5, type: 'auto' },
        { id: 'u3', name: 'Quantum CPU', base: 2500, bonus: 25, type: 'auto' }
    ];

    function getPower() {
        let t = 1, a = 0;
        shopData.forEach(u => {
            const lvl = state.upgrades[u.id] || 0;
            if(u.type === 'tap') t += lvl * u.bonus;
            else a += lvl * u.bonus;
        });
        return { t, a };
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'market') renderMarket();
        tg.HapticFeedback.impactOccurred('light');
    }

    function renderMarket() {
        const container = document.getElementById('upgrade-list');
        container.innerHTML = shopData.map(u => {
            const lvl = state.upgrades[u.id] || 0;
            const cost = Math.floor(u.base * Math.pow(1.5, lvl));
            return `
                <div class="upgrade-card">
                    <div class="up-info">
                        <b>${u.name}</b>
                        <span>Lvl ${lvl} • +${u.bonus} ${u.type}</span>
                    </div>
                    <button class="buy-btn" onclick="buyUpgrade('${u.id}', ${cost})" ${state.coins < cost ? 'disabled' : ''}>
                        ${cost >= 1000 ? (cost/1000).toFixed(1)+'K' : cost}
                    </button>
                </div>
            `;
        }).join('');
    }

    window.buyUpgrade = (id, cost) => {
        if(state.coins >= cost) {
            state.coins -= cost;
            state.upgrades[id]++;
            save();
            updateUI();
            renderMarket();
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    function updateUI() {
        const p = getPower();
        document.getElementById('balance').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('tap-val').innerText = p.t;
        document.getElementById('auto-val').innerText = p.a;
    }

    function save() {
        localStorage.setItem('aira_coins', state.coins);
        localStorage.setItem('aira_upgrades', JSON.stringify(state.upgrades));
    }

    // Tap logic
    document.getElementById('tap-trigger').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const p = getPower();
        state.coins += p.t;
        updateUI();
        save();

        const touch = e.touches[0];
        const part = document.createElement('div');
        part.className = 'tap-particle';
        part.innerText = '+' + p.t;
        part.style.left = touch.clientX + 'px';
        part.style.top = touch.clientY + 'px';
        document.body.appendChild(part);
        setTimeout(() => part.remove(), 600);

        tg.HapticFeedback.impactOccurred('medium');
    });

    // Background Stars
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let stars = Array.from({length: 80}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: Math.random() * 2,
        v: Math.random() * 0.5 + 0.2
    }));

    function animate() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = '#00f2ff';
        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
            ctx.fill();
            s.y += s.v;
            if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(animate);
    }

    setInterval(() => {
        state.coins += getPower().a / 10;
        updateUI();
    }, 100);

    animate();
    updateUI();
</script>
</body>
</html>
