<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol V1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --pink: #ff007f; --bg: #000; --card: rgba(13, 27, 42, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* UI Header */
        .header { padding: 45px 20px 10px; text-align: center; z-index: 10; }
        .brand { font-family: 'Orbitron'; font-size: 14px; color: var(--cyan); letter-spacing: 2px; }
        .balance { font-family: 'Orbitron'; font-size: 54px; font-weight: 700; text-shadow: 0 0 15px var(--cyan); margin: 5px 0; }
        .stats { display: flex; justify-content: center; gap: 15px; font-family: 'Orbitron'; font-size: 11px; }

        /* Content Pages */
        .content { flex: 1; position: relative; }
        .page { position: absolute; width: 100%; height: 100%; display: none; padding: 20px; overflow-y: auto; }
        .page.active { display: block; }

        /* NFT Cards Styling */
        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .nft-card { 
            background: var(--card); border: 1px solid rgba(255, 0, 127, 0.3); border-radius: 15px; 
            padding: 10px; text-align: center; position: relative; transition: 0.3s;
        }
        .nft-card.owned { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .nft-img { width: 100%; border-radius: 10px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--pink)); }
        .nft-card.owned .nft-img { filter: drop-shadow(0 0 5px var(--cyan)); }
        .nft-name { font-family: 'Orbitron'; font-size: 12px; margin-bottom: 5px; }
        .nft-rate { font-size: 10px; color: var(--cyan); margin-bottom: 10px; display: block; }

        .buy-nft-btn { 
            width: 100%; padding: 8px; border-radius: 8px; border: none; 
            background: var(--pink); color: #fff; font-family: 'Orbitron'; font-size: 10px;
        }
        .buy-nft-btn.owned { background: #1a3a5d; color: var(--cyan); border: 1px solid var(--cyan); }

        /* Navigation */
        .nav { height: 85px; background: #000; border-top: 1px solid rgba(0, 242, 255, 0.2); display: flex; padding-bottom: env(safe-area-inset-bottom); }
        .nav-tab { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-family: 'Orbitron'; font-size: 11px; transition: 0.3s; }
        .nav-tab.active { color: var(--cyan); border-top: 3px solid var(--cyan); background: linear-gradient(to top, rgba(0, 242, 255, 0.1), transparent); }

        #star-canvas { position: fixed; top: 0; z-index: -1; }
    </style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<div class="header">
    <div class="brand">AIRA PROTOCOL V1.0</div>
    <div class="balance" id="balance">0</div>
    <div class="stats">
        <div style="color:var(--cyan)">TAP: +<span id="tap-val">1</span></div>
        <div style="color:var(--pink)">AUTO-FLOW: +<span id="auto-val">0</span>/s</div>
    </div>
</div>

<div class="content">
    <div id="core" class="page active">
        <div style="display:flex; justify-content:center; align-items:center; height:80%;">
            <div id="tap-btn" style="width:260px; height:260px; border-radius:50%; border:2px solid var(--cyan); display:flex; align-items:center; justify-content:center; background:radial-gradient(circle, rgba(0,242,255,0.1), transparent);">
                <svg width="150" height="150" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" fill="#1a3a5d" stroke="var(--cyan)" stroke-width="2"/>
                    <rect x="30" y="45" width="40" height="15" rx="5" fill="#000"/>
                    <circle cx="40" cy="52" r="4" fill="var(--cyan)"/>
                    <circle cx="60" cy="52" r="4" fill="var(--cyan)"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="nft" class="page">
        <h3 style="font-family:Orbitron; text-align:center; color:var(--pink)">NFT FARMERS</h3>
        <div class="nft-grid" id="nft-list"></div>
    </div>
</div>

<div class="nav">
    <div class="nav-tab active" onclick="showPage('core', this)">CORE</div>
    <div class="nav-tab" onclick="showPage('market', this)">MARKET</div>
    <div class="nav-tab" onclick="showPage('nft', this)">NFT</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        coins: parseFloat(localStorage.getItem('aira_c')) || 0,
        ownedNfts: JSON.parse(localStorage.getItem('aira_nfts')) || []
    };

    const nftMarket = [
        { id: 'n1', name: 'Aira Mini-Bot', price: 1000, flow: 5 },
        { id: 'n2', name: 'Cyber Harvester', price: 5000, flow: 20 },
        { id: 'n3', name: 'Quantum Miner', price: 15000, flow: 75 },
        { id: 'n4', name: 'Protocol Core', price: 50000, flow: 250 }
    ];

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'nft') renderNFTs();
        tg.HapticFeedback.impactOccurred('light');
    }

    function renderNFTs() {
        const list = document.getElementById('nft-list');
        list.innerHTML = nftMarket.map(n => {
            const isOwned = state.ownedNfts.includes(n.id);
            return `
                <div class="nft-card ${isOwned ? 'owned' : ''}">
                    <div style="height:80px; display:flex; align-items:center; justify-content:center;">
                        <svg class="nft-img" viewBox="0 0 100 100" width="60">
                            <rect x="20" y="20" width="60" height="60" rx="10" fill="${isOwned ? '#00f2ff22' : '#ff007f22'}" stroke="${isOwned ? '#00f2ff' : '#ff007f'}"/>
                            <circle cx="50" cy="50" r="15" fill="${isOwned ? '#00f2ff' : '#ff007f'}"/>
                        </svg>
                    </div>
                    <div class="nft-name">${n.name}</div>
                    <span class="nft-rate">+${n.flow}/s flow</span>
                    <button class="buy-nft-btn ${isOwned ? 'owned' : ''}" onclick="buyNFT('${n.id}', ${n.price})">
                        ${isOwned ? 'ACTIVE' : n.price >= 1000 ? (n.price/1000)+'K' : n.price}
                    </button>
                </div>
            `;
        }).join('');
    }

    window.buyNFT = (id, price) => {
        if(!state.ownedNfts.includes(id) && state.coins >= price) {
            state.coins -= price;
            state.ownedNfts.push(id);
            localStorage.setItem('aira_nfts', JSON.stringify(state.ownedNfts));
            updateUI();
            renderNFTs();
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    function updateUI() {
        let autoRate = 0;
        state.ownedNfts.forEach(id => {
            const nft = nftMarket.find(n => n.id === id);
            if(nft) autoRate += nft.flow;
        });
        
        document.getElementById('balance').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('auto-val').innerText = autoRate;
        localStorage.setItem('aira_c', state.coins);
    }

    // Farming Loop: Har 1 soniyada NFTlar tanga olib keladi
    setInterval(() => {
        let autoRate = 0;
        state.ownedNfts.forEach(id => {
            const nft = nftMarket.find(n => n.id === id);
            if(nft) autoRate += nft.flow;
        });
        state.coins += autoRate / 10; // 100ms interval uchun
        updateUI();
    }, 100);

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        state.coins += 1; // Base tap
        updateUI();
        tg.HapticFeedback.impactOccurred('medium');
    });

    // Star Background logic (avvalgi koddan)
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let stars = Array.from({length: 50}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*0.5 }));
    function anim() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#00f2ff';
        stars.forEach(s => { ctx.fillRect(s.x, s.y, 1, 1); s.y += s.v; if(s.y > canvas.height) s.y = 0; });
        requestAnimationFrame(anim);
    }
    anim(); updateUI();
</script>
</body>
</html>
