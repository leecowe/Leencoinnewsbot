<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --pink: #ff007f;
            --bg: #050a10;
            --glass: rgba(0, 242, 255, 0.07);
            --border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* TEST REJIMI BANNER */
        .test-banner {
            background: rgba(255, 0, 127, 0.2); color: var(--pink); text-align: center;
            font-family: 'Orbitron'; font-size: 10px; padding: 10px; border-bottom: 1px solid var(--pink);
        }

        .header { padding: 20px; text-align: center; }
        .bal-val { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; text-shadow: 0 0 15px var(--primary); }

        .view-content { flex: 1; display: none; padding: 20px; overflow-y: auto; flex-direction: column; align-items: center; }
        .view-content.active { display: flex; }

        /* MINING & STAKING CARDS */
        .card {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px;
        }

        .btn-main {
            background: var(--primary); color: #000; border: none; padding: 15px;
            border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; width: 100%; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .nav { height: 80px; background: #000; display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; font-family: 'Orbitron'; }
        .nav-item.active { color: var(--primary); border-top: 3px solid var(--primary); }
    </style>
</head>
<body>

    <div class="test-banner">⚠️ TEST REJIMI: MA'LUMOTLAR SAQLANIB QOLMAYDI!</div>

    <header class="header">
        <div class="bal-val" id="total-bal">0.0</div>
        <div style="font-family:'Orbitron'; font-size:12px; color:var(--primary); margin-top:5px;">
            STAKED: <span id="staked-display">0</span>
        </div>
    </header>

    <div id="view-hack" class="view-content active">
        <div class="card">
            <h3 style="font-family:'Orbitron'; color:var(--primary);">MINING CORE</h3>
            <p id="mining-status">ACHKO YIG'ISHGA TAYYOR</p>
            <div style="font-size:30px; font-family:'Orbitron'; margin:15px 0;" id="current-session">0.0</div>
            <button class="btn-main" onclick="claimCoins()">COINLARNI YIG'ISH</button>
        </div>
    </div>

    <div id="view-stake" class="view-content">
        <div class="card">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin:0;">STAKING HUB</h2>
            <p style="font-size:14px; opacity:0.7;">Har 1 daqiqada +10% daromad</p>
            <div id="timer" style="font-size:24px; color:var(--pink); font-family:'Orbitron'; margin:10px 0;">TAYYOR</div>
            <button class="btn-main" id="stake-btn" onclick="startFastStake()">STAKE ALL ASSETS</button>
        </div>
        
        <div class="card" style="border-color: var(--pink);">
            <h4 style="font-family:'Orbitron'; color:var(--pink); margin:0;">ROADMAP V4.0</h4>
            <p style="font-size:11px; opacity:0.6; margin:5px 0;">PvP Janglar • NFT Bozor • AI Bot</p>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('hack', this)">CORE</div>
        <div class="nav-item" onclick="switchTab('stake', this)">STAKING</div>
        <div class="nav-item" onclick="tg.showAlert('Tez kunda!')">INFO</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 0.0;
    let stakedAmount = 0;
    let sessionCoins = 0.0;
    let isStaking = false;

    // 1. AUTO MINING (Xatoliklar to'g'rilangan)
    setInterval(() => {
        sessionCoins += 0.1; // Har soniyada 1.0 achko qo'shiladi
        document.getElementById('current-session').innerText = sessionCoins.toFixed(1);
    }, 100);

    function claimCoins() {
        balance += sessionCoins;
        sessionCoins = 0;
        updateUI();
        tg.HapticFeedback.impactOccurred('medium');
    }

    // 2. 1 DAQIQA STAKING (60 soniya)
    function startFastStake() {
        if (isStaking || balance <= 0) {
            tg.showAlert(balance <= 0 ? "Mablag' yetarli emas!" : "Staking davom etmoqda...");
            return;
        }

        stakedAmount = Math.floor(balance);
        balance = 0;
        isStaking = true;
        updateUI();

        let timeLeft = 60; // 1 daqiqa
        const stakeBtn = document.getElementById('stake-btn');
        stakeBtn.disabled = true;
        stakeBtn.style.opacity = "0.5";

        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";

            if (timeLeft <= 0) {
                clearInterval(countdown);
                balance += stakedAmount * 1.1; // +10% daromad
                stakedAmount = 0;
                isStaking = false;
                document.getElementById('timer').innerText = "TAYYOR";
                stakeBtn.disabled = false;
                stakeBtn.style.opacity = "1";
                updateUI();
                tg.showPopup({ title: "Staking Tugadi!", message: "Siz +10% foyda oldingiz!" });
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('total-bal').innerText = balance.toFixed(1);
        document.getElementById('staked-display').innerText = stakedAmount;
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        el.classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
