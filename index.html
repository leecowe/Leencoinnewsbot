<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol | Minimalist</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-grey: #2c2c2c;
            --light-grey: #a0a0a0;
            --bg: #121212;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #e0e0e0; font-family: 'Rajdhani', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .bal-val { font-size: 48px; font-weight: 700; color: #fff; letter-spacing: -1px; }
        .sub-stats { font-size: 12px; color: var(--light-grey); margin-top: 5px; text-transform: uppercase; }

        .view-content { flex: 1; display: none; padding: 20px; overflow-y: auto; }
        .view-content.active { display: flex; flex-direction: column; }

        .glass-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px);
        }

        .btn-grey {
            background: var(--main-grey); color: #fff; border: none; padding: 14px;
            border-radius: 12px; font-weight: 600; width: 100%; cursor: pointer;
            transition: 0.3s; font-size: 14px; text-transform: uppercase;
        }
        .btn-grey:active { transform: scale(0.98); opacity: 0.8; }

        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .nft-item { background: var(--glass); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid var(--border); }
        .nft-name { font-size: 13px; margin: 8px 0; font-weight: 600; }

        .nav { height: 75px; background: rgba(0,0,0,0.5); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--light-grey); font-size: 11px; font-weight: 600; }
        .nav-item.active { color: #fff; border-top: 2px solid #fff; }

        .info-msg { font-size: 10px; color: var(--light-grey); text-align: center; margin-top: 10px; opacity: 0.6; }
    </style>
</head>
<body>

    <header class="header">
        <div class="bal-val" id="total-bal">0</div>
        <div class="sub-stats">
            APS: <span id="aps-display">50</span> | STAKED: <span id="staked-display">0</span>
        </div>
    </header>

    <div id="view-core" class="view-content active">
        <div class="glass-card">
            <div style="font-size: 14px; color: var(--light-grey); margin-bottom: 10px;">MINING POOL</div>
            <div style="font-size: 32px; font-weight: 700; margin-bottom: 15px;" id="current-mining">0</div>
            <button class="btn-grey" onclick="claimMining()">Yig'ib olish</button>
        </div>

        <div class="glass-card">
            <div style="font-size: 14px; color: var(--light-grey); margin-bottom: 10px;">STAKING (MAX LVL 5)</div>
            <div id="stake-status" style="font-size: 18px; margin-bottom: 15px;">TAYYOR (+10%)</div>
            <button class="btn-grey" onclick="startStake()" id="stake-btn">STAKE ALL</button>
        </div>

        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px;">
                <span>FARM LVL: <b id="farm-lvl">1</b>/10</span>
                <span>NARX: <b id="upgrade-cost">5000</b></span>
            </div>
            <button class="btn-grey" onclick="upgradeFarm()" id="up-btn">UPGRADE FARM</button>
        </div>
    </div>

    <div id="view-market" class="view-content">
        <div class="nft-grid">
            <div class="nft-item">
                <div class="nft-name">ARIA NFT #01</div>
                <button class="btn-grey" style="font-size: 10px;" onclick="buyNFT(10000)">10K</button>
            </div>
            <div class="nft-item">
                <div class="nft-name">ARIA NFT #02</div>
                <button class="btn-grey" style="font-size: 10px;" onclick="buyNFT(25000)">25K</button>
            </div>
            <div class="nft-item">
                <div class="nft-name">ARIA NFT #03</div>
                <button class="btn-grey" style="font-size: 10px;" onclick="buyNFT(50000)">50K</button>
            </div>
            <div class="nft-item">
                <div class="nft-name">ARIA NFT #04</div>
                <button class="btn-grey" style="font-size: 10px;" onclick="buyNFT(100000)">100K</button>
            </div>
        </div>
        <p class="info-msg">📢 KEYINGI YANGILANISHDA REYTING REJIMI QO'SHILADI!</p>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('core', this)">CORE</div>
        <div class="nav-item" onclick="switchTab('market', this)">MARKET</div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    // Ma'lumotlarni eslab qolish (LocalStorage)
    let balance = parseFloat(localStorage.getItem('aira_bal')) || 0;
    let farmLevel = parseInt(localStorage.getItem('aira_farm')) || 1;
    let aps = 50 + (farmLevel - 1) * 25;
    let upgradeCost = 5000 * Math.pow(2, farmLevel - 1);
    
    let sessionCoins = 0;
    let stakedCoins = 0;
    let isStaking = false;

    setInterval(() => {
        sessionCoins += aps;
        document.getElementById('current-mining').innerText = Math.floor(sessionCoins);
    }, 300);

    function claimMining() {
        balance += sessionCoins;
        sessionCoins = 0;
        saveData();
        updateUI();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function startStake() {
        if (isStaking || balance <= 0) return;
        stakedCoins = balance;
        balance = 0;
        isStaking = true;
        updateUI();

        let timeLeft = 10;
        const btn = document.getElementById('stake-btn');
        const status = document.getElementById('stake-status');

        const timer = setInterval(() => {
            timeLeft--;
            status.innerText = timeLeft + "s KUTING...";
            if (timeLeft <= 0) {
                clearInterval(timer);
                balance += Math.floor(stakedCoins * 1.1);
                stakedCoins = 0;
                isStaking = false;
                status.innerText = "TAYYOR (+10%)";
                saveData();
                updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            }
        }, 1000);
    }

    function upgradeFarm() {
        if (farmLevel >= 10) return;
        if (balance >= upgradeCost) {
            balance -= upgradeCost;
            farmLevel++;
            aps += 25;
            upgradeCost *= 2;
            saveData();
            updateUI();
        } else {
            tg.showAlert("Mablag' yetarli emas!");
        }
    }

    function buyNFT(price) {
        if (balance >= price) {
            balance -= price;
            saveData();
            updateUI();
            tg.showPopup({ title: "Sotib olindi!", message: "ARIA NFT kolleksiyangizga qo'shildi." });
        } else {
            tg.showAlert("Mablag' yetarli emas!");
        }
    }

    function saveData() {
        localStorage.setItem('aira_bal', balance);
        localStorage.setItem('aira_farm', farmLevel);
    }

    function updateUI() {
        document.getElementById('total-bal').innerText = Math.floor(balance);
        document.getElementById('staked-display').innerText = Math.floor(stakedCoins);
        document.getElementById('aps-display').innerText = aps;
        document.getElementById('farm-lvl').innerText = farmLevel;
        document.getElementById('upgrade-cost').innerText = upgradeCost;
        if(farmLevel >= 10) document.getElementById('up-btn').innerText = "MAX LEVEL";
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        el.classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
