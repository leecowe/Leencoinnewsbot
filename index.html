<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova: Cyber Evolution</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --violet: #bc13fe;
            --gold: #ffcc00;
            --bg: #030308;
        }

        body {
            background: var(--bg); color: #fff; text-align: center;
            font-family: 'Rajdhani', sans-serif; margin: 0; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Yuqori Panel: Yorqinlik effekti bilan */
        .header {
            padding: 30px 20px;
            background: radial-gradient(circle at top, rgba(0, 242, 255, 0.15), transparent);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }
        .score-display { 
            font-size: 65px; font-weight: 700; color: var(--gold); 
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.6); margin: 0;
            letter-spacing: -2px;
        }
        .profit-line { font-size: 14px; color: var(--neon); opacity: 0.8; text-transform: uppercase; margin-top: 5px; }

        /* Asosiy Markaz: Animatsiyalangan Core */
        .main-stage { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .core-wrapper {
            width: 260px; height: 260px; position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .core-glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
            opacity: 0.3; animation: pulse 3s infinite;
        }
        .main-core-img {
            width: 160px; z-index: 2; cursor: pointer;
            filter: drop-shadow(0 0 25px var(--neon));
            transition: 0.1s cubic-bezier(0.1, 0.8, 0.2, 1.2);
        }
        .main-core-img:active { transform: scale(0.85); filter: drop-shadow(0 0 50px var(--violet)); }

        /* Shop: Premium Kartalar */
        .cyber-shop {
            background: rgba(10, 10, 20, 0.98);
            border-top: 2px solid var(--violet); border-radius: 40px 40px 0 0;
            padding: 25px; max-height: 45%; overflow-y: auto;
            box-shadow: 0 -15px 40px rgba(188, 19, 254, 0.2);
        }

        .card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; padding: 18px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.05), transparent);
            transition: 0.5s;
        }
        .card:hover::after { left: 100%; }

        .card-data { text-align: left; }
        .card-data h3 { margin: 0; font-size: 18px; color: var(--neon); }
        .card-data p { margin: 4px 0 0; font-size: 12px; color: #888; }

        .buy-button {
            background: linear-gradient(135deg, var(--violet), #7000ff);
            border: none; padding: 12px 22px; border-radius: 12px;
            color: #fff; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(112, 0, 255, 0.4);
        }
        .buy-button:disabled { opacity: 0.2; filter: grayscale(1); }

        /* Effektlar */
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.2; } 50% { transform: scale(1.1); opacity: 0.4; } 100% { transform: scale(0.9); opacity: 0.2; } }
        .tap-particle {
            position: absolute; color: #fff; font-weight: 700; font-size: 28px;
            pointer-events: none; animation: rise 0.7s ease-out forwards;
            text-shadow: 0 0 10px var(--neon);
        }
        @keyframes rise { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="score-display" id="balance">0</h1>
        <div class="profit-line">⚡ SYSTEM PROFIT: +<span id="pps">0</span>/SEC</div>
    </div>

    <div class="main-stage">
        <div class="core-wrapper">
            <div class="core-glow"></div>
            <img src="https://cdn-icons-png.flaticon.com/512/6530/6530342.png" id="core" class="main-core-img">
        </div>
    </div>

    <div class="cyber-shop">
        <div id="shop-content">
            </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // O'yin ma'lumotlari (Struktura)
        let state = {
            score: parseInt(localStorage.getItem('cy_score')) || 0,
            tapPwr: parseInt(localStorage.getItem('cy_tap')) || 1,
            autoRate: parseInt(localStorage.getItem('cy_auto')) || 0,
            upgrades: JSON.parse(localStorage.getItem('cy_up')) || { core: 1, miner: 0, cpu: 0 }
        };

        const upgradesData = [
            { id: 'core', name: 'CORE EVOLUTION', desc: 'Tap kuchini oshiradi', basePrice: 50, growth: 1.7, effect: 2, type: 'tap' },
            { id: 'miner', name: 'NEURAL MINER', desc: 'Avto-daromad +50/s', basePrice: 500, growth: 1.5, effect: 50, type: 'auto' },
            { id: 'cpu', name: 'QUANTUM CPU', desc: 'Avto-daromad +200/s', basePrice: 2000, growth: 1.6, effect: 200, type: 'auto' }
        ];

        function renderShop() {
            const container = document.getElementById('shop-content');
            container.innerHTML = '';
            
            upgradesData.forEach(item => {
                let currentLvl = state.upgrades[item.id] || 0;
                let price = Math.floor(item.basePrice * Math.pow(item.growth, currentLvl));
                
                container.innerHTML += `
                    <div class="card">
                        <div class="card-data">
                            <h3>${item.name} [Lvl ${currentLvl}]</h3>
                            <p>${item.desc}</p>
                        </div>
                        <button class="buy-button" onclick="buyUpgrade('${item.id}', ${price})" ${state.score < price ? 'disabled' : ''}>
                            💰 ${price.toLocaleString()}
                        </button>
                    </div>
                `;
            });
        }

        function buyUpgrade(id, price) {
            if (state.score >= price) {
                state.score -= price;
                state.upgrades[id] = (state.upgrades[id] || 0) + 1;
                
                let item = upgradesData.find(i => i.id === id);
                if (item.type === 'tap') state.tapPwr += item.effect;
                if (item.type === 'auto') state.autoRate += item.effect;
                
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('pps').innerText = state.autoRate;
            renderShop();
            save();
        }

        function save() {
            localStorage.setItem('cy_score', state.score);
            localStorage.setItem('cy_tap', state.tapPwr);
            localStorage.setItem('cy_auto', state.autoRate);
            localStorage.setItem('cy_up', JSON.stringify(state.upgrades));
        }

        document.getElementById('core').onclick = (e) => {
            state.score += state.tapPwr;
            
            const p = document.createElement('div');
            p.className = 'tap-particle';
            p.innerText = `+${state.tapPwr}`;
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        };

        setInterval(() => {
            state.score += state.autoRate;
            updateUI();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
