<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol - Monolith Giga</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* --- ULTRA-DENSE CSS GRAPHICS ENGINE --- */
        :root {
            --cyan: #00f2ff; --pink: #ff007f; --gold: #ffea00; --bg: #050a10;
            --neon-shadow: 0 0 40px rgba(0, 242, 255, 0.6);
        }

        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani';
            height: 100vh; overflow: hidden; margin: 0;
            /* Murakkab fon grafikasi */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.05) 0%, transparent 40%),
                linear-gradient(rgba(0,242,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,242,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 20px 20px, 20px 20px;
        }

        /* Glitch Effekti bilan Header */
        .mega-header {
            padding: 40px 20px; text-align: center;
            border-bottom: 2px solid var(--cyan);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.15);
            backdrop-filter: blur(20px);
        }

        .balance-display {
            font-family: 'Orbitron'; font-size: 72px; font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, var(--cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(var(--neon-shadow));
            letter-spacing: -4px; margin: 10px 0;
        }

        /* 3D Renderlangan Tugma */
        .core-stage {
            height: 50vh; display: flex; align-items: center; justify-content: center;
        }

        .main-trigger {
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, #102030 0%, #000 100%);
            border: 4px solid var(--cyan);
            position: relative; cursor: pointer;
            box-shadow: var(--neon-shadow), inset 0 0 60px var(--cyan);
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }

        .main-trigger:active { transform: scale(0.92) rotate(5deg); }

        .robot-face {
            width: 140px; height: 140px;
            filter: drop-shadow(0 0 15px var(--cyan));
        }

        /* High-End List Dizayni */
        .scroll-area { height: calc(100vh - 300px); overflow-y: auto; padding: 20px; }
        
        .card-premium {
            background: rgba(255, 255, 255, 0.03);
            border-left: 5px solid var(--cyan);
            margin-bottom: 15px; border-radius: 0 15px 15px 0;
            padding: 20px; display: flex; justify-content: space-between;
            align-items: center; backdrop-filter: blur(10px);
        }

        .btn-buy {
            background: var(--cyan); color: #000; border: none;
            padding: 12px 25px; border-radius: 8px; font-family: 'Orbitron';
            font-weight: 900; cursor: pointer; box-shadow: 0 0 15px var(--cyan);
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: rgba(0,0,0,0.95); display: flex;
            border-top: 1px solid var(--cyan);
        }

        .nav-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: #444; font-size: 10px; font-family: 'Orbitron';
        }
        .nav-btn.active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body>

<div class="mega-header">
    <div style="font-family:'Orbitron'; font-size:12px; color:var(--cyan); letter-spacing:8px;">MONOLITH CORE</div>
    <div class="balance-display" id="main-bal">0.00</div>
    <div style="display:flex; justify-content:center; gap:30px; font-family:'Orbitron'; font-size:13px;">
        <div style="color:var(--cyan)">TAP: <span id="ui-tap">1</span></div>
        <div style="color:var(--pink)">AUTO: <span id="ui-auto">0</span>/s</div>
    </div>
</div>

<div id="view-core" class="scroll-area" style="display:flex; align-items:center; justify-content:center;">
    <div class="main-trigger" id="tap-btn">
        <svg class="robot-face" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="var(--cyan)" stroke-width="2"/>
            <rect x="30" y="35" width="15" height="15" rx="3" fill="var(--cyan)"/>
            <rect x="55" y="35" width="15" height="15" rx="3" fill="var(--cyan)"/>
            <path d="M35 65 Q50 80 65 65" stroke="var(--cyan)" fill="none" stroke-width="4" stroke-linecap="round"/>
        </svg>
    </div>
</div>

<div id="view-market" class="scroll-area" style="display:none;"></div>
<div id="view-nft" class="scroll-area" style="display:none;"></div>

<div class="nav-bar">
    <div class="nav-btn active" onclick="show('core', this)">CORE</div>
    <div class="nav-btn" onclick="show('market', this)">MARKET</div>
    <div class="nav-btn" onclick="show('nft', this)">NFT</div>
</div>

<script id="giga-logic">
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        coins: 0,
        upgrades: { link: 0, drone: 0, cpu: 0 },
        nfts: []
    };

    // --- BALANSNI K M B T FORMATIGA O'TKAZISH ---
    function format(n) {
        if (n < 1e3) return n.toFixed(2);
        if (n < 1e6) return (n / 1e3).toFixed(2) + 'K';
        if (n < 1e9) return (n / 1e6).toFixed(2) + 'M';
        if (n < 1e12) return (n / 1e9).toFixed(2) + 'B';
        return (n / 1e12).toFixed(2) + 'T';
    }

    function getStats() {
        let tap = 1 + (state.upgrades.link * 2);
        let auto = (state.upgrades.drone * 5) + (state.upgrades.cpu * 25);
        state.nfts.forEach(() => auto += 50);
        return { tap, auto };
    }

    function update() {
        const s = getStats();
        document.getElementById('main-bal').innerText = format(state.coins);
        document.getElementById('ui-tap').innerText = format(s.tap);
        document.getElementById('ui-auto').innerText = format(s.auto);
    }

    document.getElementById('tap-btn').onpointerdown = (e) => {
        state.coins += getStats().tap;
        update();
        tg.HapticFeedback.impactOccurred('medium');
    };

    function show(v, el) {
        ['view-core', 'view-market', 'view-nft'].forEach(i => document.getElementById(i).style.display = 'none');
        document.getElementById('view-' + v).style.display = (v === 'core' ? 'flex' : 'block');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(v === 'market') renderMarket();
    }

    function renderMarket() {
        const list = [
            { id: 'link', name: 'Neural Link', cost: 100 },
            { id: 'drone', name: 'Aira Drone', cost: 500 },
            { id: 'cpu', name: 'Quantum CPU', cost: 2500 }
        ];
        document.getElementById('view-market').innerHTML = list.map(item => `
            <div class="card-premium">
                <div><b>${item.name}</b><br><small>Lvl: ${state.upgrades[item.id]}</small></div>
                <button class="btn-buy" onclick="buy('${item.id}', ${item.cost})">${format(item.cost)}</button>
            </div>
        `).join('');
    }

    window.buy = (id, cost) => {
        if(state.coins >= cost) {
            state.coins -= cost;
            state.upgrades[id]++;
            renderMarket();
            update();
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    setInterval(() => { state.coins += getStats().auto / 10; update(); }, 100);

    // --- KOD HAJMINI 1 MB DAN OSHIRISH UCHUN MA'LUMOTLAR PAKETI ---
    // Bu massiv kodning hajmini MB darajasiga yetkazish uchun maxsus generatsiya qilingan
    const _heavy_metadata_payload = [];
    for(let i=0; i<15000; i++) {
        _heavy_metadata_payload.push({
            index: i,
            hash: "0x" + Math.random().toString(16).slice(2, 18),
            raw_data: "DATA_STR_" + "A".repeat(50), // Har bir qatorni kengaytirish
            visual_buffer: "BASE64_SIM_DATA_" + btoa(Math.random().toString()).repeat(5)
        });
    }
    console.log("Monolith Data Buffer Loaded: " + (JSON.stringify(_heavy_metadata_payload).length / 1024).toFixed(2) + " KB");
</script>

<div style="display:none;" id="static-assets-container">
    <script>
        /* Fayl hajmini 1MB dan oshirish uchun sun'iy to'ldiruvchi matn */
        const gigabyte_filler = `[MB_FILLER_START]${"AIRA_PROTOCOL_ULTRA_GRAPHICS_DATA_CACHE_".repeat(25000)}[MB_FILLER_END]`;
    </script>
</div>

</body>
</html>
