<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leenova Ultima Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --purple: #bc00ff; --gold: #ffcc00; --dark: #01080e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden; background: #01080e; display: flex; flex-direction: column; }

        /* HUD */
        .hud { padding: 40px 20px 15px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--blue); z-index: 100; }
        .balance { font-family: 'Orbitron'; font-size: 34px; font-weight: 700; text-shadow: 0 0 15px var(--blue); color: #fff; text-align: center; }
        
        /* WINDOW SYSTEM */
        .window { display: none; flex-grow: 1; overflow-y: auto; padding: 20px 20px 100px; }
        .window.active { display: block; }

        /* CLICKER */
        .core-zone { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #02162b 0%, #01080e 100%); }
        .main-btn { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--blue); box-shadow: 0 0 30px var(--blue); display: flex; justify-content: center; align-items: center; transition: 0.1s; position: relative; }
        .main-btn img { width: 120px; filter: drop-shadow(0 0 10px var(--blue)); }
        
        /* CARDS & ITEMS */
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,242,255,0.2); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--blue); color: #fff; padding: 8px 12px; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; }
        .btn:disabled { opacity: 0.3; }

        /* SPECIAL SECTIONS */
        .daily-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .day-box { background: #000; border: 1px solid #333; padding: 10px 5px; text-align: center; border-radius: 8px; font-size: 10px; }
        .day-box.active { border-color: var(--gold); background: rgba(255, 204, 0, 0.1); }

        .spin-wheel { width: 200px; height: 200px; border: 5px solid var(--gold); border-radius: 50%; margin: 20px auto; position: relative; transition: 4s cubic-bezier(0.1, 0, 0, 1); }
        .spin-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 20px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        /* NAV */
        .nav { display: flex; background: #000; border-top: 1px solid var(--blue); position: fixed; bottom: 0; width: 100%; z-index: 100; }
        .nav-item { flex: 1; padding: 15px 5px; text-align: center; font-family: 'Orbitron'; font-size: 8px; color: #555; }
        .nav-item.active { color: var(--blue); background: rgba(0,242,255,0.1); }

        /* ANIMATIONS */
        .pop { position: absolute; color: var(--blue); font-family: 'Orbitron'; font-weight: bold; pointer-events: none; animation: fly 0.7s forwards; }
        @keyframes fly { to { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="hud">
        <div class="balance" id="bal">0</div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
            <div class="btn" style="font-size:9px">TAP: +<span id="t-pow">1</span></div>
            <div class="btn" style="font-size:9px">AUTO: +<span id="a-pow">0</span>/s</div>
        </div>
    </div>

    <div id="win-city" class="window active">
        <div class="core-zone">
            <div class="main-btn" id="tap-btn">
                <img id="core-img" src="https://cdn-icons-png.flaticon.com/512/11550/11550085.png">
            </div>
            <p style="margin-top:20px; color:var(--blue); font-family:Orbitron; font-size:12px;">LEVEL: <span id="user-lvl">1</span></p>
        </div>
    </div>

    <div id="win-tasks" class="window">
        <h3 style="font-family:Orbitron; color:var(--gold)">DAILY BONUS</h3>
        <div class="daily-grid" id="daily-grid"></div>
        
        <h3 style="font-family:Orbitron; color:var(--blue)">TASKS</h3>
        <div id="task-list"></div>
    </div>

    <div id="win-market" class="window">
        <h3 style="font-family:Orbitron; color:var(--blue)">UPGRADES</h3>
        <div id="up-list"></div>
        
        <h3 style="font-family:Orbitron; color:var(--pink)">SKINS</h3>
        <div id="skin-list"></div>
    </div>

    <div id="win-spin" class="window" style="text-align:center">
        <h3 style="font-family:Orbitron; color:var(--gold)">LUCK SPIN</h3>
        <div class="spin-arrow"></div>
        <div class="spin-wheel" id="wheel" style="background: conic-gradient(var(--blue) 0deg 90deg, var(--purple) 90deg 180deg, var(--pink) 180deg 270deg, var(--gold) 270deg 360deg);"></div>
        <button class="btn" id="spin-btn" onclick="spinWheel()" style="margin-top:20px; width:150px; font-size:14px">SPIN (FREE)</button>
    </div>

    <div id="win-leader" class="window">
        <h3 style="font-family:Orbitron; color:var(--blue)">LEADERBOARD</h3>
        <div id="leader-list"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="tab('win-city', this)">CITY</div>
        <div class="nav-item" onclick="tab('win-tasks', this)">TASKS</div>
        <div class="nav-item" onclick="tab('win-market', this)">MARKET</div>
        <div class="nav-item" onclick="tab('win-spin', this)">SPIN</div>
        <div class="nav-item" onclick="tab('win-leader', this)">TOP</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();

        let game = {
            m: parseFloat(localStorage.getItem('v3_m')) || 0,
            l: JSON.parse(localStorage.getItem('v3_l')) || {u1:0, u2:0},
            t: JSON.parse(localStorage.getItem('v3_t')) || [], // Tasks
            d: parseInt(localStorage.getItem('v3_d')) || 0, // Daily day
            lastD: localStorage.getItem('v3_lastD') || "",
            skin: localStorage.getItem('v3_skin') || "https://cdn-icons-png.flaticon.com/512/11550/11550085.png"
        };

        const upgrades = [
            { id: 'u1', name: 'Neural Chip', base: 50, val: 2, type: 'tap' },
            { id: 'u2', name: 'Auto Drone', base: 200, val: 5, type: 'auto' }
        ];

        const skins = [
            { name: 'Neon Blue', cost: 0, img: 'https://cdn-icons-png.flaticon.com/512/11550/11550085.png' },
            { name: 'Ruby Core', cost: 50000, img: 'https://cdn-icons-png.flaticon.com/512/11550/11550047.png' },
            { name: 'Gold Master', cost: 250000, img: 'https://cdn-icons-png.flaticon.com/512/11550/11550100.png' }
        ];

        const tasks = [
            { id: 1, text: "Join Channel", reward: 5000 },
            { id: 2, text: "Follow Twitter", reward: 3000 },
            { id: 3, text: "Invite 5 Friends", reward: 20000 }
        ];

        function getStats() {
            let t = 1, a = 0;
            upgrades.forEach(u => { let lvl = game.l[u.id]; if(u.type==='tap') t += lvl*u.val; else a += lvl*u.val; });
            return { t, a };
        }

        function render() {
            const s = getStats();
            document.getElementById('bal').innerText = Math.floor(game.m).toLocaleString();
            document.getElementById('t-pow').innerText = s.t;
            document.getElementById('a-pow').innerText = s.a;
            document.getElementById('core-img').src = game.skin;
            document.getElementById('user-lvl').innerText = Math.floor(game.m / 10000) + 1;

            // Tasks Render
            const tl = document.getElementById('task-list'); tl.innerHTML = '';
            tasks.forEach(task => {
                const done = game.t.includes(task.id);
                tl.innerHTML += `<div class="card"><div>${task.text}<br><small>+${task.reward}</small></div>
                <button class="btn" onclick="doTask(${task.id}, ${task.reward})" ${done ? 'disabled' : ''}>${done ? 'DONE' : 'GO'}</button></div>`;
            });

            // Daily Render
            const dg = document.getElementById('daily-grid'); dg.innerHTML = '';
            for(let i=1; i<=8; i++){
                dg.innerHTML += `<div class="day-box ${game.d >= i ? 'active' : ''}">Day ${i}<br>🎁</div>`;
            }

            // Upgrades Render
            const ul = document.getElementById('up-list'); ul.innerHTML = '';
            upgrades.forEach(u => {
                let cost = Math.floor(u.base * Math.pow(1.8, game.l[u.id]));
                ul.innerHTML += `<div class="card"><div>${u.name}<br><small>Lvl ${game.l[u.id]}</small></div>
                <button class="btn" onclick="buyU('${u.id}', ${cost})">${cost.toLocaleString()}</button></div>`;
            });

            // Skins Render
            const sl = document.getElementById('skin-list'); sl.innerHTML = '';
            skins.forEach(sk => {
                sl.innerHTML += `<div class="card"><div>${sk.name}</div>
                <button class="btn" onclick="setSkin('${sk.img}', ${sk.cost})" ${game.skin === sk.img ? 'disabled' : ''}>${sk.cost === 0 ? 'FREE' : sk.cost}</button></div>`;
            });

            save();
        }

        function save() {
            localStorage.setItem('v3_m', game.m);
            localStorage.setItem('v3_l', JSON.stringify(game.l));
            localStorage.setItem('v3_t', JSON.stringify(game.t));
            localStorage.setItem('v3_d', game.d);
            localStorage.setItem('v3_skin', game.skin);
        }

        window.buyU = (id, c) => { if(game.m >= c){ game.m -= c; game.l[id]++; render(); } };
        window.doTask = (id, r) => { game.m += r; game.t.push(id); render(); tg.HapticFeedback.notificationOccurred('success'); };
        window.setSkin = (img, c) => { if(game.m >= c){ if(c > 0 && game.skin !== img) game.m -= c; game.skin = img; render(); } };

        // SPIN LOGIC
        let spinning = false;
        window.spinWheel = () => {
            if(spinning) return;
            spinning = true;
            const deg = Math.floor(3000 + Math.random() * 3000);
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                spinning = false;
                const win = Math.floor(Math.random() * 50000);
                game.m += win;
                alert(`Siz ${win.toLocaleString()} kredit yutdingiz!`);
                render();
            }, 4000);
        };

        // CLICK LOGIC
        document.getElementById('tap-btn').onclick = (e) => {
            const s = getStats(); game.m += s.t;
            const p = document.createElement('div'); p.className = 'pop'; p.innerText = `+${s.t}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 700);
            render(); tg.HapticFeedback.impactOccurred('light');
        };

        window.tab = (id, el) => {
            document.querySelectorAll('.window, .nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            render();
        };

        setInterval(() => { const s = getStats(); if(s.a > 0){ game.m += s.a/10; document.getElementById('bal').innerText = Math.floor(game.m).toLocaleString(); }}, 100);

        render();
    </script>
</body>
</html>
