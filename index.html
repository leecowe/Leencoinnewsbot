<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aira Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff007f; --dark: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; background: var(--dark); color: #fff; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        #bg-canvas { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; z-index: -1; pointer-events: none; will-change: transform; }

        .top-hud { padding: 45px 20px 10px; text-align: center; z-index: 100; flex-shrink: 0; }
        .bot-name { font-family: 'Orbitron'; color: var(--blue); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
        .balance { font-family: 'Orbitron'; font-size: 52px; text-shadow: 0 0 15px var(--blue); margin: 5px 0; }
        .stats-bar { display: flex; justify-content: center; gap: 15px; font-family: 'Orbitron'; font-size: 11px; }

        /* BO'LIMLAR KONTEYNERI */
        #content-area { flex-grow: 1; position: relative; overflow: hidden; }
        .section { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 20px; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .section.active { display: flex; }

        /* CORE */
        .hero-zone { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .character-box { 
            width: 260px; height: 260px; border-radius: 50%; border: 2px solid var(--blue); 
            display: flex; align-items: center; justify-content: center; position: relative;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            transition: transform 0.05s ease-out; transform: translateZ(0);
        }
        .character-box:active { transform: scale(0.94); }
        .character-img { width: 85%; height: 85%; pointer-events: none; }

        /* MARKET */
        .up-card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); 
            border-radius: 12px; padding: 15px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .up-info b { font-family: 'Orbitron'; font-size: 14px; display: block; }
        .up-info span { font-size: 11px; color: #888; }
        .buy-btn { 
            background: #111; border: 1px solid #333; color: #fff; 
            padding: 8px 15px; border-radius: 8px; font-family: 'Orbitron'; font-size: 12px;
        }
        .buy-btn.active { border-color: var(--blue); background: rgba(0, 242, 255, 0.1); }

        /* NAVIGATSIYA */
        .nav { 
            display: flex; height: 80px; background: #000; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            font-family: 'Orbitron'; font-size: 10px; color: #444; cursor: pointer;
            transition: 0.3s;
        }
        .nav-item.active { 
            color: var(--blue); border-top: 3px solid var(--blue); 
            background: linear-gradient(to top, rgba(0,242,255,0.05), transparent); 
        }

        .pop { position: absolute; color: var(--blue); font-family: 'Orbitron'; font-weight: bold; font-size: 24px; pointer-events: none; animation: fly 0.4s ease-out forwards; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="top-hud">
    <div class="bot-name">Aira Protocol V1.0</div>
    <div class="balance" id="bal">0</div>
    <div class="stats-bar">
        <div style="color:var(--blue)">TAP: +<span id="t-pow">1</span></div>
        <div style="color:var(--pink)">AUTO: +<span id="a-pow">0</span>/s</div>
    </div>
</div>

<div id="content-area">
    <div id="core-sec" class="section active">
        <div class="hero-zone">
            <div class="character-box" id="tap-btn">
                <svg class="character-img" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#5897fb" />
                    <rect x="25" y="40" width="50" height="25" rx="12" fill="#0b1a2d" />
                    <circle cx="40" cy="52" r="6" fill="#00f2ff" />
                    <circle cx="60" cy="52" r="6" fill="#00f2ff" />
                    <rect x="35" y="70" width="30" height="8" rx="2" fill="#0b1a2d" />
                </svg>
            </div>
        </div>
    </div>

    <div id="market-sec" class="section">
        <h2 style="font-family:Orbitron; text-align:center; margin-bottom:20px; color:var(--blue)">SYSTEM MARKET</h2>
        <div id="market-list"></div>
    </div>

    <div id="nft-sec" class="section">
        <h2 style="font-family:Orbitron; text-align:center; margin-bottom:20px; color:var(--pink)">NFT GEAR</h2>
        <p style="text-align:center; color:#555; margin-top:50px;">Tez kunda...</p>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="switchSection('core', this)">CORE</div>
    <div class="nav-item" onclick="switchSection('market', this)">MARKET</div>
    <div class="nav-item" onclick="switchSection('nft', this)">NFT</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        money: parseInt(localStorage.getItem('aira_m')) || 0,
        upgrades: JSON.parse(localStorage.getItem('aira_u')) || { u1: 0, u2: 0, u3: 0 }
    };

    const shop = [
        { id: 'u1', name: 'Neural Link', base: 100, bonus: 2, type: 'tap' },
        { id: 'u2', name: 'Aira Drone', base: 500, bonus: 5, type: 'auto' },
        { id: 'u3', name: 'Quantum CPU', base: 2000, bonus: 20, type: 'auto' }
    ];

    function getStats() {
        let t = 1, a = 0;
        shop.forEach(i => {
            const lvl = state.upgrades[i.id] || 0;
            if(i.type === 'tap') t += lvl * i.bonus;
            else a += lvl * i.bonus;
        });
        return { t, a };
    }

    function switchSection(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(id + '-sec').classList.add('active');
        el.classList.add('active');
        
        if(id === 'market') renderMarket();
        tg.HapticFeedback.impactOccurred('light');
    }

    function renderMarket() {
        const list = document.getElementById('market-list');
        list.innerHTML = shop.map(i => {
            const lvl = state.upgrades[i.id] || 0;
            const cost = Math.floor(i.base * Math.pow(1.5, lvl));
            return `
                <div class="up-card">
                    <div class="up-info">
                        <b>${i.name}</b>
                        <span>Lvl ${lvl} | +${i.bonus} ${i.type}</span>
                    </div>
                    <button class="buy-btn ${state.money >= cost ? 'active' : ''}" onclick="buy('${i.id}', ${cost})">
                        ${cost >= 1000 ? (cost/1000).toFixed(1) + 'K' : cost}
                    </button>
                </div>`;
        }).join('');
    }

    window.buy = (id, cost) => {
        if(state.money >= cost) {
            state.money -= cost;
            state.upgrades[id]++;
            save();
            updateUI();
            renderMarket();
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    function updateUI() {
        const s = getStats();
        document.getElementById('bal').innerText = Math.floor(state.money).toLocaleString();
        document.getElementById('t-pow').innerText = s.t;
        document.getElementById('a-pow').innerText = s.a;
    }

    function save() {
        localStorage.setItem('aira_m', state.money);
        localStorage.setItem('aira_u', JSON.stringify(state.upgrades));
    }

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const s = getStats();
        state.money += s.t;
        updateUI();
        save();

        const t = e.touches[0];
        const p = document.createElement('div');
        p.className = 'pop'; p.innerText = '+' + s.t;
        p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 400);
        tg.HapticFeedback.impactOccurred('medium');
    });

    // Parallax & Background
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth * 1.2;
    canvas.height = window.innerHeight * 1.2;
    let stars = Array.from({length: 50}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2 }));

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#00f2ff55';
        stars.forEach(s => { ctx.fillRect(s.x, s.y, s.s, s.s); s.y += 0.2; if(s.y > canvas.height) s.y = 0; });
        requestAnimationFrame(draw);
    }

    window.addEventListener('deviceorientation', (e) => {
        canvas.style.transform = `translate(${e.gamma/2}px, ${(e.beta-45)/2}px)`;
    });

    setInterval(() => { state.money += getStats().a / 10; updateUI(); }, 100);
    draw(); updateUI();
</script>
</body>
</html>
