<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leenova Kombat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --panel-color: #1c1f24;
            --accent-yellow: #f5bb5f;
            --text-main: #ffffff;
            --text-sub: #85827d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { background: var(--bg-color); color: var(--text-main); font-family: 'Roboto', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .header { padding: 15px; display: flex; align-items: center; gap: 10px; background: #1c1f24; border-bottom: 1px solid #32363c; }
        .avatar-box { width: 45px; height: 45px; background: var(--accent-yellow); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; font-size: 20px; }
        .user-meta { flex-grow: 1; }
        .user-meta h4 { font-size: 14px; margin-bottom: 2px; }
        
        /* RANK STYLE */
        .rank-container { display: flex; align-items: center; gap: 8px; width: 100%; }
        .rank-text { font-size: 11px; color: var(--accent-yellow); font-weight: 700; white-space: nowrap; }
        .rank-progress-mini { flex-grow: 1; height: 6px; background: #32363c; border-radius: 10px; overflow: hidden; max-width: 100px; }
        .rank-fill-mini { height: 100%; background: var(--accent-yellow); width: 0%; transition: width 0.3s; }
        .rank-lvl-num { font-size: 11px; color: var(--text-main); font-weight: 700; }

        .settings-btn { cursor: pointer; padding: 5px; font-size: 20px; }

        /* TOP STATS */
        .top-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px 15px; }
        .stat-item { background: var(--panel-color); padding: 8px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 9px; color: var(--text-sub); text-transform: uppercase; }
        .stat-value { font-size: 11px; font-weight: 700; display: block; }

        /* VIEW PORT */
        .view-port { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .section { display: none; padding: 20px; }
        .section.active { display: block; }

        /* EXCHANGE SECTION */
        .balance-main { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 30px 0; font-size: 48px; font-weight: 900; }
        .coin-img { width: 50px; height: 50px; background: var(--accent-yellow); border-radius: 50%; box-shadow: 0 0 20px rgba(245,187,95,0.4); }
        .clicker-box { display: flex; justify-content: center; margin-top: 20px; }
        .main-button { width: 280px; height: 280px; background: radial-gradient(circle, #32363c, #000); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 8px solid #1c1f24; transition: transform 0.1s; }
        .main-button:active { transform: scale(0.95); }
        .robot-img { width: 200px; height: 200px; background: #5a6b75; clip-path: circle(); position: relative; }

        /* MINE/CARDS SECTION */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--panel-color); padding: 15px; border-radius: 16px; border: 1px solid #333; }
        .card-name { font-size: 14px; margin-bottom: 5px; }
        .card-profit { color: #4ade80; font-size: 12px; margin-bottom: 10px; }
        .buy-btn { width: 100%; background: #32363c; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; }
        .buy-btn.active { background: var(--accent-yellow); color: black; }

        /* PROGRESS BAR */
        .energy-hud { padding: 0 20px 20px; }
        .energy-info { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .bar-bg { height: 12px; background: #32363c; border-radius: 10px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #f5bb5f, #fffb12); width: 100%; border-radius: 10px; transition: width 0.3s; }

        /* NAVBAR */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #272a30; display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 0; border-top: 1px solid #333; }
        .nav-tab { text-align: center; color: var(--text-sub); font-size: 10px; cursor: pointer; }
        .nav-tab.active { color: white; }
        .nav-tab i { display: block; font-size: 20px; margin-bottom: 4px; }

        /* ANIMATION */
        .tap-anim { position: absolute; color: white; font-size: 28px; font-weight: 900; pointer-events: none; animation: fly 0.7s forwards; z-index: 1000; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }

        /* MODAL SETTINGS */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; }
        .modal-content { background: var(--panel-color); border-radius: 20px; padding: 20px; margin-top: 50px; border: 1px solid #333; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-modal { font-size: 24px; cursor: pointer; }
        .setting-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Sozlamalar</h3>
                <span class="close-modal" onclick="closeSettings()">✕</span>
            </div>
            <div class="setting-row">
                <span>Vibratsiya</span>
                <input type="checkbox" id="vib-switch" checked onchange="toggleVibration(this)">
            </div>
            <div class="setting-row" style="border:none">
                <span>Versiya</span>
                <span style="color:var(--accent-yellow)">3.5.0 Gold</span>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="avatar-box" id="user-initial">?</div>
        <div class="user-meta">
            <h4 id="user-name">Loading...</h4>
            <div class="rank-container">
                <span class="rank-text" id="rank-name">Bronze</span>
                <div class="rank-progress-mini">
                    <div class="rank-fill-mini" id="rank-fill"></div>
                </div>
                <span class="rank-lvl-num" id="rank-lvl">1 / 10</span>
            </div>
        </div>
        <div class="settings-btn" onclick="openSettings()">⚙️</div>
    </div>

    <div class="top-stats">
        <div class="stat-item">
            <span class="stat-label">Profit per tap</span>
            <span class="stat-value" id="ui-pwt">+1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Next Rank at</span>
            <span class="stat-value" id="ui-next-rank" style="color:#f5bb5f">5K</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Profit/hr</span>
            <span class="stat-value" id="ui-pph" style="color:#4ade80">+0</span>
        </div>
    </div>

    <div class="view-port">
        <section id="exchange" class="section active">
            <div class="balance-main">
                <div class="coin-img"></div>
                <span id="ui-bal">0</span>
            </div>
            <div class="clicker-box">
                <div class="main-button" id="tap-target">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Leenova" class="robot-img" alt="bot">
                </div>
            </div>
        </section>

        <section id="mine" class="section">
            <h2 style="margin-bottom:20px">Mining Cards</h2>
            <div class="card-grid">
                <div class="card">
                    <div class="card-name">Data Center</div>
                    <div class="card-profit">+500/hr</div>
                    <button class="buy-btn" onclick="buyCard(2000, 500)">💰 2,000</button>
                </div>
                <div class="card">
                    <div class="card-name">AI Neural</div>
                    <div class="card-profit">+1.2K/hr</div>
                    <button class="buy-btn" onclick="buyCard(5000, 1200)">💰 5,000</button>
                </div>
            </div>
        </section>

        <section id="friends" class="section">
            <h2>Friends</h2>
            <p style="color:var(--text-sub); margin: 20px 0;">Referral tizimi faol.</p>
            <button class="buy-btn active">Invite a friend</button>
        </section>

        <section id="airdrop" class="section" style="text-align:center">
            <div class="coin-img" style="margin: 0 auto 20px; width:80px; height:80px;"></div>
            <h2>Airdrop</h2>
            <p style="color:var(--text-sub); margin-top:10px;">Listing yaqin orada!</p>
        </section>
    </div>

    <div class="energy-hud">
        <div class="energy-info">
            <span>⚡ <span id="ui-energy">1000</span> / 1000</span>
        </div>
        <div class="bar-bg">
            <div class="bar-fill" id="ui-bar"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-tab active" onclick="showSection('exchange', this)"><i>🏠</i>Exchange</div>
        <div class="nav-tab" onclick="showSection('mine', this)"><i>⛏️</i>Mine</div>
        <div class="nav-tab" onclick="showSection('friends', this)"><i>👥</i>Friends</div>
        <div class="nav-tab" onclick="showSection('airdrop', this)"><i>🐹</i>Airdrop</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let useHaptic = true;

        // RANK BOSQICHLARI
        const RANKS = [
            { name: "Bronze", min: 0 },
            { name: "Silver", min: 5000 },
            { name: "Gold", min: 25000 },
            { name: "Platinum", min: 100000 },
            { name: "Diamond", min: 500000 },
            { name: "Epic", min: 1000000 },
            { name: "Legendary", min: 5000000 },
            { name: "Master", min: 10000000 },
            { name: "Grandmaster", min: 50000000 },
            { name: "Lord", min: 100000000 }
        ];

        function setupUser() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('user-name').innerText = user.first_name;
                document.getElementById('user-initial').innerText = user.first_name.charAt(0).toUpperCase();
            } else {
                document.getElementById('user-name').innerText = "Mehmon";
                document.getElementById('user-initial').innerText = "M";
            }
        }

        function openSettings() {
            if(useHaptic) tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('settings-modal').style.display = 'block';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function toggleVibration(el) {
            useHaptic = el.checked;
        }

        let state = JSON.parse(localStorage.getItem('leenova_v3')) || {
            bal: 0,
            energy: 1000,
            pwt: 1,
            pph: 0
        };

        function updateUI() {
            const bal = Math.floor(state.bal);
            document.getElementById('ui-bal').innerText = bal.toLocaleString();
            document.getElementById('ui-energy').innerText = Math.floor(state.energy);
            document.getElementById('ui-bar').style.width = (state.energy / 10) + "%";
            document.getElementById('ui-pph').innerText = "+" + (state.pph).toLocaleString();
            document.getElementById('ui-pwt').innerText = "+" + state.pwt;

            // RANK HISOB-KITOBI
            let currentRankIdx = 0;
            for (let i = RANKS.length - 1; i >= 0; i--) {
                if (bal >= RANKS[i].min) {
                    currentRankIdx = i;
                    break;
                }
            }

            const currentRank = RANKS[currentRankIdx];
            const nextRank = RANKS[currentRankIdx + 1] || currentRank;
            
            // Rank UI yangilash
            document.getElementById('rank-name').innerText = currentRank.name;
            document.getElementById('rank-lvl').innerText = (currentRankIdx + 1) + " / 10";
            
            // Keyingi rankka progress
            if (currentRankIdx < RANKS.length - 1) {
                const diff = nextRank.min - currentRank.min;
                const progress = ((bal - currentRank.min) / diff) * 100;
                document.getElementById('rank-fill').style.width = Math.min(100, progress) + "%";
                document.getElementById('ui-next-rank').innerText = nextRank.min >= 1000000 ? (nextRank.min/1000000).toFixed(1) + "M" : (nextRank.min/1000).toFixed(0) + "K";
            } else {
                document.getElementById('rank-fill').style.width = "100%";
                document.getElementById('ui-next-rank').innerText = "MAX";
            }

            localStorage.setItem('leenova_v3', JSON.stringify(state));
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(useHaptic) tg.HapticFeedback.impactOccurred('light');
        }

        document.getElementById('tap-target').addEventListener('touchstart', (e) => {
            if (state.energy < state.pwt) return;
            for (let i = 0; i < e.targetTouches.length; i++) {
                const touch = e.targetTouches[i];
                state.bal += state.pwt;
                state.energy -= state.pwt;
                const anim = document.createElement('div');
                anim.className = 'tap-anim';
                anim.innerText = "+" + state.pwt;
                anim.style.left = touch.clientX + "px";
                anim.style.top = touch.clientY + "px";
                document.body.appendChild(anim);
                setTimeout(() => anim.remove(), 700);
            }
            if(useHaptic) tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        });

        window.buyCard = (cost, profit) => {
            if (state.bal >= cost) {
                state.bal -= cost;
                state.pph += profit;
                if(useHaptic) tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            } else {
                if(useHaptic) tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Mablag' yetarli emas!");
            }
        };

        setInterval(() => {
            if (state.energy < 1000) state.energy = Math.min(1000, state.energy + 2);
            if (state.pph > 0) state.bal += (state.pph / 3600);
            updateUI();
        }, 1000);

        setupUser();
        updateUI();
    </script>
</body>
</html>
