<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leenova | Quantum OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Mono&family=SF+Pro+Display:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000000;
            --gold: #f3ba2f;
            --cyan: #00f2ff;
            --card-bg: #111111;
        }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'SF Pro Display', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Header */
        .header { text-align: center; padding: 40px 20px 10px; }
        #ego-chatter { color: var(--gold); font-family: 'SF Mono'; font-size: 10px; height: 15px; text-transform: uppercase; }
        .balance { font-size: 48px; font-weight: 800; margin: 10px 0; letter-spacing: -2px; }
        
        /* Avatar Area */
        .main-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; }
        .main-char { width: 180px; height: 180px; cursor: pointer; transition: transform 0.1s; z-index: 5; }
        .main-char:active { transform: scale(0.95); }
        .glow-effect { filter: drop-shadow(0 0 15px var(--cyan)); }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid #222; }
        .stat-label { font-size: 9px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 20px; font-weight: 800; margin-top: 5px; }

        /* Admin & Controls */
        #admin-panel { display: none; background: rgba(0, 242, 255, 0.1); margin: 0 20px; padding: 15px; border-radius: 15px; border: 1px dashed var(--cyan); }
        .btn { width: calc(100% - 40px); margin: 10px 20px; padding: 18px; border-radius: 15px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-admin { background: var(--cyan); color: #000; font-size: 12px; margin: 5px 0; width: 100%; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        @keyframes floatText { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div class="header">
    <div id="ego-chatter">INITIALIZING...</div>
    <div class="balance" id="bal-ui">0.0</div>
    <div style="font-size: 10px; color: #555;">LEENOVA QUANTUM BALANCE</div>
</div>

<div class="main-container">
    <img src="https://cdn-icons-png.flaticon.com/512/6028/6028676.png" class="main-char" id="main-avatar" onclick="handleTap(event)">
</div>

<div id="admin-panel">
    <div style="font-size: 10px; color: var(--cyan); margin-bottom: 5px; font-weight: 800;">ADMIN SUPREMACY</div>
    <button class="btn-admin" onclick="adminAction('boost')">注入 INJECT +100K</button>
    <button class="btn-admin" style="background: #ff3b30" onclick="adminAction('reset')">抹除 SYSTEM RESET</button>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">System Level</div>
        <div class="stat-value" id="lvl-ui">1</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Worthiness</div>
        <div class="stat-value" id="worth-ui" style="font-size: 14px;">SCRUB</div>
    </div>
</div>

<button class="btn btn-gold" id="evo-btn" onclick="evolve()">INITIATE EVOLUTION</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. STATE MANAGEMENT
    let state = {
        bal: 0,
        lvl: 1,
        isAdmin: false,
        worths: ["SCRUB", "MINIMAL", "AVERAGE", "WORTHY", "ELITE", "ADMIN"]
    };

    // 2. FORMATTING (Tuzatilgan - undefined chiqmaydi)
    function format(num) {
        if (num === undefined || isNaN(num)) return "0.0";
        if (num < 1000) return num.toFixed(1);
        const units = ["", "k", "M", "B", "T"];
        const i = Math.floor(Math.log10(num) / 3);
        return (num / Math.pow(1000, i)).toFixed(1) + units[i];
    }

    // 3. ENGINE
    const ENGINE = {
        updateUI: function() {
            document.getElementById('bal-ui').innerText = format(state.bal);
            document.getElementById('lvl-ui').innerText = state.lvl;
            
            let worthIdx = Math.min(Math.floor(state.bal / 10000), state.worths.length - 1);
            document.getElementById('worth-ui').innerText = state.worths[worthIdx];

            let cost = 100 * Math.pow(2.5, state.lvl - 1);
            const btn = document.getElementById('evo-btn');
            btn.innerText = state.bal >= cost ? "EVOLVE SYSTEM" : `LACKING ${format(cost)}`;
            btn.disabled = state.bal < cost;

            if ((state.lvl >= 5 || state.bal >= 50000) && !state.isAdmin) this.enableAdmin();
        },

        enableAdmin: function() {
            state.isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('main-avatar').classList.add('glow-effect');
            this.speak("ADMIN PRIVILEGES GRANTED.");
            tg.HapticFeedback.notificationOccurred('success');
        },

        speak: function(msg) {
            document.getElementById('ego-chatter').innerText = msg;
        }
    };

    // 4. USER ACTIONS
    function handleTap(e) {
        let gain = 1 * state.lvl;
        state.bal += gain;

        // Visual Float
        const f = document.createElement('div');
        f.innerText = `+${gain}`;
        f.style.cssText = `position:fixed; left:${e.clientX}px; top:${e.clientY}px; color:var(--cyan); font-weight:800; animation: floatText 0.6s forwards; pointer-events:none; z-index:100;`;
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 600);

        tg.HapticFeedback.impactOccurred('medium');
        ENGINE.updateUI();
    }

    function evolve() {
        let cost = 100 * Math.pow(2.5, state.lvl - 1);
        if (state.bal >= cost) {
            state.bal -= cost;
            state.lvl++;
            ENGINE.speak("EVOLUTION COMPLETE. MORE POWER.");
            ENGINE.updateUI();
        }
    }

    function adminAction(act) {
        if (!state.isAdmin) return;
        if (act === 'boost') state.bal += 100000;
        if (act === 'reset') { state.bal = 0; state.lvl = 1; location.reload(); }
        ENGINE.updateUI();
    }

    // Auto-save & Load simulyatsiyasi (ixtiyoriy)
    setInterval(() => {
        state.bal += (state.lvl * 0.5); // Passive income
        ENGINE.updateUI();
    }, 1000);

    ENGINE.updateUI();
</script>
</body>
</html>
